<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תפסתי! - הדילים הכי חמים עכשיו</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #F9FAFB; }
        .city-tag.active { background-color: #2563EB; color: white; border-color: #2563EB; }
        .deal-card { transition: all 0.3s ease; cursor: pointer; }
        .deal-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-blur: 4px; }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <div id="dealModal" class="modal" onclick="closeModal(event)">
        <div class="bg-white w-full max-w-2xl rounded-[40px] overflow-hidden shadow-2xl transition-all relative" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 left-6 bg-white/90 w-10 h-10 rounded-full flex items-center justify-center font-bold shadow-lg z-10">✕</button>
            <img id="modalImg" src="" class="w-full h-72 object-cover">
            <div class="p-8">
                <div id="modalRegion" class="text-blue-600 font-black text-xs uppercase mb-2"></div>
                <h2 id="modalTitle" class="text-3xl font-black mb-4 text-gray-900 leading-tight"></h2>
                <div class="flex items-center gap-4 mb-6 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">מחיר תפסתי</p>
                        <span id="modalDisc" class="text-3xl font-black text-blue-600"></span>
                        <span id="modalOrig" class="text-sm text-gray-300 line-through mr-2 font-bold"></span>
                    </div>
                    <div class="mr-auto text-left">
                        <p class="text-[10px] text-gray-400 font-bold uppercase">תקף עד</p>
                        <span id="modalTime" class="text-lg font-black text-red-500 italic"></span>
                    </div>
                </div>
                <div class="mb-8">
                    <h4 class="font-bold text-gray-900 mb-2">תיאור הדיל:</h4>
                    <p id="modalDesc" class="text-gray-500 leading-relaxed font-medium"></p>
                </div>
                <div id="modalAction"></div>
            </div>
        </div>
    </div>

    <header class="bg-white border-b py-8 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-4xl font-black text-blue-600 italic tracking-tighter">תפסתי!</h1>
                <div class="flex gap-3">
                    <button onclick="toggleExpired()" id="expBtn" class="px-6 py-3 rounded-2xl font-black text-sm bg-gray-100 text-gray-500 hover:bg-gray-200 transition-all">היסטוריית דילים</button>
                    <a href="sup.html" class="px-6 py-3 rounded-2xl font-black text-sm bg-blue-600 text-white shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">אזור ספקים ←</a>
                </div>
            </div>
            
            <div class="flex flex-col gap-5">
                <div class="relative group">
                    <span class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-blue-600 transition-colors text-xl">🔍</span>
                    <input type="text" id="searchInput" placeholder="חפש מלון, עיר או הצעה שווה..." class="w-full bg-gray-50 border-2 border-gray-100 rounded-3xl py-5 pr-14 pl-6 outline-none font-bold focus:border-blue-500 focus:bg-white transition-all shadow-inner">
                </div>
                <div class="flex gap-3 overflow-x-auto no-scrollbar py-2">
                    <button onclick="filterBy('הכל')" class="city-tag active px-8 py-4 rounded-2xl font-black bg-white text-gray-500 border-2 border-gray-100 whitespace-nowrap transition-all">הכל</button>
                    <button onclick="filterBy('מרכז')" class="city-tag px-8 py-4 rounded-2xl font-black bg-white text-gray-500 border-2 border-gray-100 whitespace-nowrap transition-all">מרכז</button>
                    <button onclick="filterBy('צפון')" class="city-tag px-8 py-4 rounded-2xl font-black bg-white text-gray-500 border-2 border-gray-100 whitespace-nowrap transition-all">צפון</button>
                    <button onclick="filterBy('דרום')" class="city-tag px-8 py-4 rounded-2xl font-black bg-white text-gray-500 border-2 border-gray-100 whitespace-nowrap transition-all">דרום</button>
                    <button onclick="filterBy('שפלה')" class="city-tag px-8 py-4 rounded-2xl font-black bg-white text-gray-500 border-2 border-gray-100 whitespace-nowrap transition-all">שפלה</button>
                    <button onclick="filterBy('ירושלים')" class="city-tag px-8 py-4 rounded-2xl font-black bg-white text-gray-500 border-2 border-gray-100 whitespace-nowrap transition-all">ירושלים</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div id="deals-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.appspot.com", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDeals = [];
        let showExpired = false;
        let currentFilter = 'הכל';

        async function loadDeals() {
            const q = query(collection(db, "offers"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            allDeals = [];
            snap.forEach(doc => allDeals.push({ id: doc.id, ...doc.data() }));
            render();
        }

        window.openDeal = (id) => {
            const deal = allDeals.find(d => d.id === id);
            const today = new Date().toISOString().split('T')[0];
            const isExpired = deal.expiryDate < today;

            document.getElementById('modalImg').src = deal.imageUrl;
            document.getElementById('modalTitle').innerText = deal.title;
            document.getElementById('modalRegion').innerText = deal.region;
            document.getElementById('modalDisc').innerText = '₪' + deal.discountPrice;
            document.getElementById('modalOrig').innerText = '₪' + deal.originalPrice;
            document.getElementById('modalTime').innerText = deal.time;
            document.getElementById('modalDesc').innerText = deal.description || 'אין תיאור נוסף לדיל זה.';

            const phone = deal.phone || "";
            const cleanPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
            const whatsappLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent('היי, אני מעוניין בדיל: ' + deal.title)}`;

            document.getElementById('modalAction').innerHTML = `
                <a href="${isExpired ? '#' : whatsappLink}" target="_blank" 
                   class="flex items-center justify-center gap-3 w-full ${isExpired ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-[#25D366] text-white shadow-xl shadow-green-100'} py-5 rounded-3xl font-black text-xl transition-all">
                   ${isExpired ? 'הדיל נגמר' : 'תפסתי בוואטסאפ!'}
                </a>
            `;
            document.getElementById('dealModal').classList.add('active');
        };

        window.closeModal = (e) => {
            document.getElementById('dealModal').classList.remove('active');
        };

        function render() {
            const container = document.getElementById('deals-container');
            const today = new Date().toISOString().split('T')[0];
            container.innerHTML = '';

            let filtered = allDeals.filter(d => {
                const matchSearch = d.title.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase());
                const matchRegion = currentFilter === 'הכל' || d.region === currentFilter;
                if(!showExpired && d.expiryDate < today) return false;
                return matchSearch && matchRegion;
            });

            filtered.forEach(data => {
                const isExpired = data.expiryDate < today;
                container.innerHTML += `
                    <div onclick="openDeal('${data.id}')" class="deal-card ${isExpired ? 'opacity-60 grayscale' : ''} bg-white rounded-[40px] overflow-hidden shadow-sm border border-gray-100 flex flex-col h-full relative">
                        <img src="${data.imageUrl}" class="w-full h-60 object-cover" onerror="this.src='https://placehold.co/400x300?text=תפסתי!'">
                        <div class="absolute top-5 right-5 bg-white/95 px-4 py-1.5 rounded-2xl text-[10px] font-black text-blue-600 shadow-sm border border-blue-50">${data.region}</div>
                        <div class="p-8 flex flex-col flex-grow">
                            <h3 class="text-2xl font-black mb-3 text-gray-900 leading-tight">${data.title}</h3>
                            <div class="flex justify-between items-end mt-auto">
                                <div>
                                    <span class="text-3xl font-black text-blue-600 tracking-tighter">₪${data.discountPrice}</span>
                                    <span class="text-sm text-gray-300 line-through mr-1 font-bold">₪${data.originalPrice}</span>
                                </div>
                                <div class="text-[10px] font-black text-red-500 bg-red-50 px-3 py-1.5 rounded-xl border border-red-100">עד: ${data.time}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.filterBy = (region) => {
            currentFilter = region;
            document.querySelectorAll('.city-tag').forEach(b => b.classList.toggle('active', b.innerText === region));
            render();
        };

        window.toggleExpired = () => {
            showExpired = !showExpired;
            document.getElementById('expBtn').innerText = showExpired ? 'חזרה לדילים פעילים' : 'היסטוריית דילים';
            render();
        };

        document.getElementById('searchInput').addEventListener('input', render);
        loadDeals();
    </script>
</body>
</html>
