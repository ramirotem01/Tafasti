<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUP | Bento Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #f5f5f7; padding-bottom: 100px; }
        .bento-card { background: #fff; border-radius: 28px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.01); }
        .input-bento { background: #f9f9fb; border: 2px solid #f1f1f4; border-radius: 18px; padding: 16px; width: 100%; font-weight: 600; outline: none; transition: 0.2s; }
        .input-bento:focus { border-color: #6366f1; background: #fff; }
        .nav-island { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 300px; background: #1d1d1f; border-radius: 32px; height: 64px; display: flex; justify-content: space-around; items-center; z-index: 100; }
        .page { display: none; animation: bentoIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes bentoIn { from { opacity: 0; scale: 0.98; } to { opacity: 1; scale: 1; } }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-indigo-600 z-[200] flex items-center justify-center p-8">
        <div class="bento-card w-full max-w-sm text-center">
            <h1 class="text-3xl font-black text-indigo-600 italic mb-2">SUP portal</h1>
            <p class="text-slate-400 font-bold mb-8">ניהול דילים ספונטניים</p>
            
            <div id="login-form">
                <input type="text" id="pid" placeholder="קוד ספק (SUP-XXXX)" class="input-bento text-center mb-4 font-mono">
                <button onclick="login()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg">כניסה</button>
                <button onclick="document.getElementById('login-form').classList.add('hidden'); document.getElementById('reg-form').classList.remove('hidden');" class="mt-4 text-sm font-bold text-slate-400 underline">אין לי קוד? הרשמה</button>
            </div>

            <div id="reg-form" class="hidden">
                <input type="email" id="remail" placeholder="כתובת אימייל" class="input-bento text-center mb-4">
                <button onclick="register()" class="w-full bg-green-500 text-white py-5 rounded-2xl font-black text-lg">צור קוד חדש</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden max-w-[500px] mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black">היי, ספק 👋</h2>
            <button onclick="localStorage.removeItem('tafasti_pid'); location.reload()" class="bg-red-50 text-red-500 p-3 rounded-2xl">✕</button>
        </header>

        <main id="add" class="page active">
            <div class="bento-card space-y-4">
                <input type="text" id="title" placeholder="כותרת הדיל" class="input-bento">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="city" placeholder="עיר" class="input-bento text-sm">
                    <input type="text" id="time" placeholder="שעה" class="input-bento text-sm">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="orig" placeholder="מחיר רגיל" class="input-bento">
                    <input type="number" id="disc" placeholder="מחיר דיל" class="input-bento bg-indigo-50 border-indigo-100">
                </div>
                <input type="url" id="img" placeholder="לינק לתמונה" class="input-bento">
                <textarea id="desc" placeholder="תיאור קצר..." class="input-bento h-32"></textarea>
                <button onclick="publish()" id="pubBtn" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg">פרסם דיל עכשיו!</button>
            </div>
        </main>

        <main id="list" class="page">
            <h3 class="text-xl font-black mb-4">הדילים שלי</h3>
            <div id="my-list" class="space-y-4"></div>
        </main>

        <nav class="nav-island">
            <button onclick="switchTab('add')" class="text-2xl">➕</button>
            <button onclick="switchTab('list')" class="text-2xl">📋</button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, where, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.firebasestorage.app", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let pid = localStorage.getItem('tafasti_pid');

        window.login = async () => {
            const input = document.getElementById('pid').value.toUpperCase();
            const snap = await getDoc(doc(db, "providers", input));
            if(snap.exists()) { pid = input; saveStart(); } else alert('קוד לא נמצא');
        };

        window.register = async () => {
            const email = document.getElementById('remail').value;
            const newID = 'SUP-' + Math.random().toString(36).substr(2, 4).toUpperCase();
            await setDoc(doc(db, "providers", newID), { email: email });
            alert('הקוד שלך: ' + newID);
            pid = newID; saveStart();
        };

        function saveStart() {
            localStorage.setItem('tafasti_pid', pid);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            loadMyDeals();
        }

        if(pid) saveStart();

        window.switchTab = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'list') loadMyDeals();
        };

        window.publish = async () => {
            const btn = document.getElementById('pubBtn');
            btn.innerText = 'מפרסם...'; btn.disabled = true;
            await addDoc(collection(db, "offers"), {
                title: document.getElementById('title').value, city: document.getElementById('city').value,
                time: document.getElementById('time').value, originalPrice: Number(document.getElementById('orig').value),
                discountPrice: Number(document.getElementById('disc').value), imageUrl: document.getElementById('img').value,
                description: document.getElementById('desc').value, providerID: pid, status: "active", createdAt: serverTimestamp()
            });
            alert('פורסם!'); btn.innerText = 'פרסם דיל עכשיו!'; btn.disabled = false;
            switchTab('list');
        };

        async function loadMyDeals() {
            const q = query(collection(db, "offers"), where("providerID", "==", pid));
            const snap = await getDocs(q);
            const list = document.getElementById('my-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                    <div class="bento-card flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <img src="${data.imageUrl}" class="w-12 h-12 rounded-xl object-cover">
                            <div><h4 class="font-bold text-sm">${data.title}</h4><p class="text-indigo-600 text-xs font-black">₪${data.discountPrice}</p></div>
                        </div>
                        <button onclick="del('${d.id}')" class="bg-red-50 text-red-500 p-2 rounded-xl text-xs font-bold">הסר</button>
                    </div>`;
            });
        }
        window.del = async (id) => { if(confirm('למחוק?')) { await deleteDoc(doc(db, "offers", id)); loadMyDeals(); } }
    </script>
</body>
</html>
