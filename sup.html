<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת ספקים | תפסתי!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F9FAFB; --accent: #2563EB; --text-dark: #111827; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text-dark); margin: 0; }
        .premium-card { background: white; border-radius: 24px; border: 1px solid #F3F4F6; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.04); }
        .input-style { 
            width: 100%; padding: 14px 18px; border-radius: 16px; border: 2px solid #F3F4F6; 
            outline: none; transition: 0.3s; font-weight: 600; background: white;
        }
        .input-style:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }
        .btn-primary { background: var(--accent); color: white; border-radius: 16px; font-weight: 800; transition: 0.3s; cursor: pointer; border: none; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        #custom-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); transition: 0.5s ease; z-index: 1000; }
        #custom-toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="custom-toast" class="bg-gray-900 text-white px-8 py-4 rounded-2xl font-bold shadow-2xl flex items-center gap-3">
        <span id="toast-icon">✨</span> <span id="toast-msg"></span>
    </div>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="premium-card w-full max-w-md p-8 text-center">
            <div class="flex justify-center mb-6">
                <div class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center text-2xl font-black italic shadow-lg">ת</div>
            </div>
            <h1 class="text-3xl font-black mb-2">כניסת ספקים</h1>
            
            <div id="login-form" class="space-y-4">
                <input type="text" id="pidInput" placeholder="מספר ספק (לדוגמה: TAF-1234)" class="input-style text-center uppercase tracking-widest">
                <button onclick="login()" class="btn-primary w-full py-5 text-lg">כניסה למערכת</button>
                <div class="flex justify-between px-2">
                    <button onclick="toggleAuth('reg')" class="text-xs text-blue-600 font-extrabold hover:underline">רישום חדש</button>
                    <button onclick="toggleAuth('forgot')" class="text-xs text-gray-400 font-extrabold hover:underline">שחזור קוד למייל</button>
                </div>
            </div>

            <div id="reg-form" class="hidden space-y-4">
                <input type="email" id="regEmail" placeholder="אימייל עסקי" class="input-style text-center">
                <button onclick="register()" class="btn-primary w-full py-5 text-lg bg-gray-900">יצירת חשבון ושליחת קוד</button>
                <button onclick="toggleAuth('login')" class="text-xs text-gray-400 font-extrabold hover:underline">חזרה לכניסה</button>
            </div>

            <div id="forgot-form" class="hidden space-y-4">
                <input type="email" id="forgotEmail" placeholder="הזינו אימייל לשחזור" class="input-style text-center">
                <button onclick="recover()" class="btn-primary w-full py-5 text-lg bg-amber-500">שלח לי את הקוד למייל</button>
                <button onclick="toggleAuth('login')" class="text-xs text-gray-400 font-extrabold hover:underline">חזרה לכניסה</button>
            </div>

            <div id="id-display" class="hidden mt-6 p-6 bg-blue-50 border-2 border-dashed border-blue-200 rounded-3xl">
                <p class="text-blue-600 font-black text-xs mb-2 uppercase">הקוד נשלח למייל שלך!</p>
                <div id="new-id-val" class="text-3xl font-black text-gray-900 tracking-tighter mb-4"></div>
                <button onclick="startApp()" class="btn-primary px-6 py-2 text-sm">המשך ללוח הבקרה</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen">
        <header class="bg-white border-b border-gray-100 py-6 sticky top-0 z-50">
            <div class="max-w-5xl mx-auto px-6 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="bg-blue-50 p-3 rounded-xl hover:bg-blue-100 transition flex items-center gap-2" title="חזרה לתפסתי">
                        <span>🏠</span>
                        <span class="text-blue-600 font-bold text-xs hidden sm:inline">חזרה לדילים</span>
                    </a>
                    <div>
                        <h2 class="text-xl font-black leading-none">לוח בקרה</h2>
                        <p id="user-email-display" class="text-[11px] text-blue-600 font-bold mt-1 tracking-wide uppercase"></p>
                    </div>
                </div>
                <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition font-bold text-xs">התנתקות ←</button>
            </div>
        </header>

        <div class="max-w-5xl mx-auto p-6 pb-32">
            <main id="add" class="page active">
                <div class="premium-card p-6 md:p-10">
                    <h3 class="text-2xl font-black mb-6">פרסום דיל חדש</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <input type="text" id="title" placeholder="כותרת הדיל" class="input-style">
                            <input type="text" id="city" placeholder="עיר" class="input-style">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" id="orig" placeholder="מחיר רגיל" class="input-style">
                                <input type="number" id="disc" placeholder="מחיר דיל" class="input-style !border-blue-100">
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="date" id="expiryDate" class="input-style">
                                <input type="time" id="time" class="input-style">
                            </div>
                            <input type="text" id="imgUrl" placeholder="קישור לתמונה (URL)" class="input-style">
                            <input type="tel" id="phone" placeholder="טלפון לוואטספ (לדוגמה: 0501234567)" class="input-style">
                            <textarea id="desc" placeholder="תיאור קצר..." class="input-style h-20 resize-none"></textarea>
                        </div>
                    </div>
                    <button onclick="publish()" id="pubBtn" class="btn-primary w-full py-5 mt-8 text-xl">פרסם דיל עכשיו 🚀</button>
                </div>
            </main>

            <main id="list" class="page">
                <h3 class="text-2xl font-black mb-6">הדילים שלי</h3>
                <div id="my-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </main>
        </div>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-xl border border-gray-100 p-2 rounded-3xl flex gap-2 shadow-2xl z-50">
            <button onclick="switchTab('add')" id="tab-add" class="px-6 py-3 bg-blue-600 text-white rounded-2xl font-bold flex items-center gap-2 transition-all">
                <span>➕</span> <span class="hidden md:inline">הוספה</span>
            </button>
            <button onclick="switchTab('list')" id="tab-list" class="px-6 py-3 text-gray-400 rounded-2xl font-bold flex items-center gap-2 transition-all">
                <span>📋</span> <span class="hidden md:inline">ניהול</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, where, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.appspot.com", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let pid = localStorage.getItem('tafasti_pid');
        let userEmail = localStorage.getItem('tafasti_email');

        function toast(msg, icon = '✨') {
            const t = document.getElementById('custom-toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = icon;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function sendMail(to, subject, body) {
            try {
                await addDoc(collection(db, "mail"), {
                    to: to,
                    message: {
                        subject: subject,
                        text: body,
                        html: `<div dir="rtl" style="font-family: Assistant, Arial;"><h3>שלום רב,</h3><p>${body}</p></div>`
                    }
                });
            } catch (e) { console.error("Mail queue error", e); }
        }

        window.login = async () => {
            const input = document.getElementById('pidInput').value.toUpperCase().trim();
            if(!input) return toast('נא להזין קוד', '⚠️');
            const snap = await getDoc(doc(db, "providers", input));
            if(snap.exists()) { 
                pid = input; userEmail = snap.data().email; startApp(); 
            } else toast('מספר ספק לא תקין', '❌');
        };

        window.register = async () => {
            const email = document.getElementById('regEmail').value.trim();
            if(!email.includes('@')) return toast('מייל לא תקין', '📧');
            const newID = 'TAF-' + Math.floor(1000 + Math.random() * 9000);
            await setDoc(doc(db, "providers", newID), { email: email, createdAt: serverTimestamp() });
            await sendMail(email, "קוד הספק שלך בתפסתי!", `ברוכים הבאים לתפסתי! קוד הספק שלך לכניסה למערכת הוא: ${newID}`);
            pid = newID; userEmail = email;
            document.getElementById('reg-form').classList.add('hidden');
            document.getElementById('id-display').classList.remove('hidden');
            document.getElementById('new-id-val').innerText = newID;
        };

        window.recover = async () => {
            const email = document.getElementById('forgotEmail').value.trim();
            const q = query(collection(db, "providers"), where("email", "==", email));
            const snap = await getDocs(q);
            if(!snap.empty) {
                const code = snap.docs[0].id;
                await sendMail(email, "שחזור קוד ספק - תפסתי", `שלום, ביקשת לשחזר את הקוד שלך. הקוד הוא: ${code}`);
                toast('הקוד נשלח למייל שלך!', '📧');
                toggleAuth('login');
            } else toast('המייל לא נמצא במערכת', '❌');
        };

        window.publish = async () => {
            const title = document.getElementById('title').value;
            const phone = document.getElementById('phone').value;
            if(!title || !phone) return toast('חובה להזין כותרת וטלפון', '⚠️');

            const b = document.getElementById('pubBtn');
            b.innerText = 'מפרסם...'; b.disabled = true;
            
            try {
                await addDoc(collection(db, "offers"), {
                    title: title,
                    city: document.getElementById('city').value,
                    phone: phone,
                    time: document.getElementById('time').value,
                    expiryDate: document.getElementById('expiryDate').value,
                    originalPrice: Number(document.getElementById('orig').value),
                    discountPrice: Number(document.getElementById('disc').value),
                    imageUrl: document.getElementById('imgUrl').value,
                    description: document.getElementById('desc').value,
                    providerID: pid,
                    status: "active",
                    createdAt: serverTimestamp()
                });
                toast('הדיל פורסם בהצלחה!', '🚀');
                switchTab('list');
            } catch (e) { toast('שגיאה בפרסום', '❌'); }
            b.disabled = false; b.innerText = 'פרסם דיל עכשיו 🚀';
        };

window.startApp = () => {
    localStorage.setItem('tafasti_pid', pid);
    localStorage.setItem('tafasti_email', userEmail);
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('user-email-display').innerText = userEmail;
    document.getElementById('expiryDate').valueAsDate = new Date();
    // -----------------------

    loadMyDeals();
}

        if(pid && userEmail) window.startApp();
        window.logout = () => { localStorage.clear(); location.reload(); };
        window.toggleAuth = (m) => {
            ['login','reg','forgot','id-display'].forEach(x => {
                const el = document.getElementById(x+'-form');
                if(el) el.classList.add('hidden');
            });
            document.getElementById(m+'-form').classList.remove('hidden');
        };

        window.switchTab = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'list') loadMyDeals();
        };

        async function loadMyDeals() {
            const q = query(collection(db, "offers"), where("providerID", "==", pid));
            const snap = await getDocs(q);
            const list = document.getElementById('my-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `<div class="premium-card p-4 flex justify-between items-center border-r-4 border-r-blue-500">
                    <div class="flex items-center gap-4">
                        <img src="${data.imageUrl}" class="w-16 h-16 rounded-xl object-cover bg-gray-100" onerror="this.src='https://placehold.co/100x100?text=No+Img'">
                        <div><h4 class="font-bold text-gray-900">${data.title}</h4><p class="text-blue-600 font-black">₪${data.discountPrice}</p></div>
                    </div>
                    <button onclick="del('${d.id}')" class="p-3 text-red-400">🗑️</button>
                </div>`;
            });
        }
        window.del = async (id) => { if(confirm('למחוק את הדיל?')) { await deleteDoc(doc(db, "offers", id)); loadMyDeals(); } };
    </script>
</body>
</html>
