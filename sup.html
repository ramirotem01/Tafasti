<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUP | 10GAZ Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #000; color: #fff; padding-bottom: 90px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; padding: 24px; }
        .input-10gaz { background: #111; border: 1px solid #222; border-radius: 16px; padding: 18px; width: 100%; color: #fff; font-weight: 700; outline: none; transition: 0.3s; }
        .input-10gaz:focus { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59,130,246,0.1); }
        .page { display: none; }
        .page.active { display: block; animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 bg-black z-[200] flex items-center justify-center p-8">
        <div class="glass-card w-full max-w-sm text-center">
            <h1 class="text-3xl font-black italic mb-2 tracking-tighter">SUP<span class="text-blue-500">PORTAL</span></h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-[0.3em] mb-10">Verification System</p>
            
            <div id="login-form">
                <input type="text" id="pidInput" placeholder="ENTER PROVIDER ID" class="input-10gaz text-center mb-4 font-mono tracking-widest uppercase">
                <button onclick="login()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl">ACCESS ACCOUNT</button>
                <button onclick="toggleAuth('reg')" class="mt-6 text-xs text-slate-500 font-bold hover:text-white transition uppercase tracking-widest">Register New Account</button>
            </div>

            <div id="reg-form" class="hidden">
                <input type="email" id="regEmail" placeholder="ENTER YOUR EMAIL" class="input-10gaz text-center mb-4">
                <button onclick="register()" class="w-full bg-white text-black py-5 rounded-2xl font-black text-lg">GENERATE ID</button>
                <button onclick="toggleAuth('login')" class="mt-6 text-xs text-slate-500 font-bold hover:text-white transition uppercase tracking-widest">Back to login</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden max-w-lg mx-auto p-6">
        <header class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black italic">CONTROL PANEL</h2>
            <div id="id-badge" class="px-3 py-1 bg-blue-500/10 text-blue-500 rounded-lg font-mono text-[10px] border border-blue-500/20 tracking-tighter"></div>
        </header>

        <main id="add" class="page active">
            <div class="glass-card space-y-4">
                <input type="text" id="title" placeholder="כותרת הדיל" class="input-10gaz">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="city" placeholder="עיר" class="input-10gaz">
                    <input type="text" id="time" placeholder="שעה" class="input-10gaz">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="orig" placeholder="מחיר רגיל" class="input-10gaz">
                    <input type="number" id="disc" placeholder="מחיר דיל" class="input-10gaz !border-blue-500/30">
                </div>
                <input type="url" id="img" placeholder="URL תמונה" class="input-10gaz">
                <textarea id="desc" placeholder="תיאור קצר..." class="input-10gaz h-24"></textarea>
                <button onclick="publish()" id="pubBtn" class="w-full bg-blue-600 text-white py-6 rounded-2xl font-black text-xl shadow-[0_0_30px_rgba(59,130,246,0.2)]">DEPLOY LIVE</button>
            </div>
        </main>

        <main id="list" class="page">
            <h3 class="text-xl font-black mb-6">דילים פעילים</h3>
            <div id="my-list" class="space-y-4"></div>
        </main>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-[#111] border border-white/5 rounded-2xl p-2 flex gap-2">
            <button onclick="switchTab('add')" class="w-14 h-14 bg-blue-600 rounded-xl flex items-center justify-center text-xl">➕</button>
            <button onclick="switchTab('list')" class="w-14 h-14 glass rounded-xl flex items-center justify-center text-xl">📋</button>
            <button onclick="logout()" class="w-14 h-14 glass rounded-xl flex items-center justify-center text-xl text-red-500">✕</button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, where, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.firebasestorage.app", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let pid = localStorage.getItem('tafasti_pid');

        window.toggleAuth = (mode) => {
            document.getElementById('login-form').classList.toggle('hidden', mode === 'reg');
            document.getElementById('reg-form').classList.toggle('hidden', mode === 'login');
        };

        window.login = async () => {
            const input = document.getElementById('pidInput').value.toUpperCase().trim();
            const snap = await getDoc(doc(db, "providers", input));
            if(snap.exists()) { pid = input; startApp(); } else alert('INVALID PROVIDER ID');
        };

        window.register = async () => {
            const email = document.getElementById('regEmail').value;
            const newID = '10GAZ-' + Math.random().toString(36).substr(2, 4).toUpperCase();
            await setDoc(doc(db, "providers", newID), { email: email, createdAt: serverTimestamp() });
            alert('ACCOUNT CREATED!\nYOUR ID: ' + newID);
            pid = newID; startApp();
        };

        function startApp() {
            localStorage.setItem('tafasti_pid', pid);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('id-badge').innerText = pid;
            loadMyDeals();
        }

        if(pid) startApp();
        window.logout = () => { localStorage.removeItem('tafasti_pid'); location.reload(); };

        window.switchTab = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'list') loadMyDeals();
        };

        window.publish = async () => {
            const b = document.getElementById('pubBtn'); b.innerText = 'DEPLOYING...'; b.disabled = true;
            await addDoc(collection(db, "offers"), {
                title: document.getElementById('title').value, city: document.getElementById('city').value,
                time: document.getElementById('time').value, originalPrice: Number(document.getElementById('orig').value),
                discountPrice: Number(document.getElementById('disc').value), imageUrl: document.getElementById('img').value,
                description: document.getElementById('desc').value, providerID: pid, status: "active", createdAt: serverTimestamp()
            });
            alert('SYSTEM ONLINE: DEAL DEPLOYED'); b.innerText = 'DEPLOY LIVE'; b.disabled = false;
            switchTab('list');
        };

        async function loadMyDeals() {
            const q = query(collection(db, "offers"), where("providerID", "==", pid));
            const snap = await getDocs(q);
            const list = document.getElementById('my-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `<div class="glass-card flex justify-between items-center mb-4">
                    <div class="flex items-center gap-4">
                        <img src="${data.imageUrl}" class="w-14 h-14 rounded-xl object-cover grayscale">
                        <div><h4 class="font-bold text-sm uppercase">${data.title}</h4><p class="text-blue-500 font-black">₪${data.discountPrice}</p></div>
                    </div>
                    <button onclick="del('${d.id}')" class="text-red-500 text-[10px] font-black tracking-widest bg-red-500/5 px-4 py-2 rounded-lg border border-red-500/20">DELETE</button>
                </div>`;
            });
        }
        window.del = async (id) => { if(confirm('CONFIRM DELETION?')) { await deleteDoc(doc(db, "offers", id)); loadMyDeals(); } };
    </script>
</body>
</html>
