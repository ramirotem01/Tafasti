<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tafasti! | אזור ספקים (SUP)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: #0f172a; }
        
        /* 2026 Admin Style: Clean & Deep */
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .admin-card { background: #fff; border-radius: 2rem; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.01); }
        
        /* Typography */
        h1, h2 { letter-spacing: -2px; }
        
        /* Custom Inputs */
        input, textarea { background: #f1f5f9; border: 2px solid #f1f5f9; transition: 0.3s; border-radius: 1rem; padding: 1rem; font-size: 1.1rem; }
        input:focus, textarea:focus { border-color: #6366f1; background: #fff; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); outline: none; }
        
        /* Tabs */
        .tab-btn { position: relative; color: #64748b; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { color: #6366f1; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -10px; left: 0; width: 100%; h-1 bg-indigo-600 rounded-full; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-0 m-0">

    <header class="sticky top-4 z-50 max-w-7xl mx-auto px-4 mt-4">
        <div class="glass p-4 rounded-3xl shadow-lg flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black text-indigo-600 italic">Tafasti!</h1>
                <span class="text-slate-400 text-sm font-bold tracking-widest uppercase block">Supplier Portal (SUP)</span>
            </div>
            <a href="index.html" class="text-sm font-bold text-slate-500 hover:text-indigo-600 border border-slate-200 px-5 py-3 rounded-full transition hover:bg-slate-50">צפייה באתר ההורים ←</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-16 pb-24">
        
        <div class="flex gap-10 border-b border-slate-200 mb-12 pb-2 px-4">
            <button onclick="switchTab('new-deal')" id="tab-new-deal" class="tab-btn active text-xl flex items-center gap-2">
                ✨ העלאת דיל חדש
            </button>
            <button onclick="switchTab('my-deals')" id="tab-my-deals" class="tab-btn text-xl flex items-center gap-2">
                📋 הדילים הפעילים שלי
            </button>
        </div>

        <section id="new-deal-section" class="tab-content active">
            <div class="admin-card p-10 bg-white">
                <h2 class="text-3xl font-extrabold mb-8 text-slate-900 leading-tight">פרסמו הצעה ברגע האחרון <br><span class="text-indigo-600">מלאו שעות מתות</span></h2>
                
                <form id="offerForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold mb-2 text-slate-600">שם האטרקציה / כותרת הדיל (למשל: 3 כרטיסים אחרונים לסיור ב-17:00)</label>
                        <input type="text" id="title" required class="w-full">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold mb-2 text-slate-600">עיר / יישוב</label>
                        <input type="text" id="city" required class="w-full">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold mb-2 text-slate-600">שעת הפעילות (להיום)</label>
                        <input type="text" id="time" placeholder="למשל: 16:30" required class="w-full">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-2 text-slate-600">מחיר רגיל בקופה</label>
                        <input type="number" id="originalPrice" required class="w-full">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-2 text-indigo-600 font-black">מחיר "תפסתי" (אחרי ההנחה שלך)</label>
                        <input type="number" id="discountPrice" required class="w-full border-indigo-200 bg-indigo-50/50">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-2 text-slate-600">טלפון לתיאום מולכם (וואטסאפ/שיחה)</label>
                        <input type="tel" id="phone" placeholder="05x-xxxxxxx" required class="w-full">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-2 text-slate-600">קישור לתמונה יפה (URL)</label>
                        <input type="url" id="imageUrl" placeholder="https://..." required class="w-full">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold mb-2 text-slate-600">תיאור קצר (מה כוללת החוויה?)</label>
                        <textarea id="description" rows="3" class="w-full"></textarea>
                    </div>

                    <div class="md:col-span-2 mt-6">
                        <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white py-6 rounded-2xl font-black text-2xl shadow-xl hover:bg-indigo-600 hover:-translate-y-1 transition active:scale-95">פרסם הצעה לאוויר! 🔥</button>
                    </div>
                </form>
            </div>
        </section>

        <section id="my-deals-section" class="tab-content hidden">
            <div id="myDealsList" class="grid gap-6">
                <div class="admin-card h-24 animate-pulse bg-white"></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config (Keep this secure)
        const firebaseConfig = {
            apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg",
            authDomain: "tafasti-20c41.firebaseapp.com",
            projectId: "tafasti-20c41",
            storageBucket: "tafasti-20c41.firebasestorage.app",
            messagingSenderId: "457032202921",
            appId: "1:457032202921:web:8f397ae80d9506a66d07b8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Tab Switching Logic
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`${tab}-section`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            if(tab === 'my-deals') loadMyDeals();
        }

        // Form Submit to Firebase
        const form = document.getElementById('offerForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'מפרסם הצעה...';

            try {
                await addDoc(collection(db, "offers"), {
                    title: document.getElementById('title').value,
                    city: document.getElementById('city').value,
                    time: document.getElementById('time').value,
                    originalPrice: Number(document.getElementById('originalPrice').value),
                    discountPrice: Number(document.getElementById('discountPrice').value),
                    phone: document.getElementById('phone').value,
                    imageUrl: document.getElementById('imageUrl').value,
                    description: document.getElementById('description').value,
                    status: "active",
                    createdAt: serverTimestamp()
                });
                alert('ההצעה עלתה לאוויר בהצלחה!');
                form.reset();
                switchTab('my-deals');
            } catch (err) {
                alert('שגיאה בחיבור ל-Firebase. בדוק את ההגדרות ב-Console.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = 'פרסם הצעה לאוויר! 🔥';
            }
        });

        // Load Deals for Management
        async function loadMyDeals() {
            const list = document.getElementById('myDealsList');
            list.innerHTML = '<div class="text-center py-10">טוען את הרשימה...</div>';
            
            const q = query(collection(db, "offers"), where("status", "==", "active"));
            const querySnapshot = await getDocs(q);
            
            list.innerHTML = '';
            if(querySnapshot.empty) {
                list.innerHTML = '<div class="admin-card p-12 text-center italic text-slate-400">עוד לא פרסמת דילים פעילים. זה הזמן!</div>';
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const dId = docSnap.id;
                
                // 2026 Admin List Item: clean & clear action
                list.innerHTML += `
                    <div class="admin-card p-6 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="flex items-center gap-6 flex-grow">
                            <img src="${data.imageUrl}" class="w-20 h-20 rounded-2xl object-cover shadow-sm">
                            <div>
                                <h3 class="font-extrabold text-xl text-slate-900 tracking-tight">${data.title}</h3>
                                <p class="text-lg text-slate-500 font-bold">${data.city} | ${data.time} | <span class="text-indigo-600">₪${data.discountPrice}</span></p>
                            </div>
                        </div>
                        <div class="w-full md:w-auto">
                            <button onclick="window.deleteOffer('${dId}')" class="w-full md:w-auto bg-red-50 text-red-500 px-8 py-4 rounded-xl font-bold hover:bg-red-500 hover:text-white transition">הסר דיל</button>
                        </div>
                    </div>
                `;
            });
        }

        window.deleteOffer = async (id) => {
            if(confirm('למחוק את הדיל מהאתר?')) {
                await deleteDoc(doc(db, "offers", id));
                loadMyDeals();
            }
        }
    </script>
</body>
</html>
