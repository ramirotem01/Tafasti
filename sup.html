<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tafasti! | כניסת ספקים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --indigo: #6366f1; }
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .admin-card { background: #fff; border-radius: 2rem; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.01); }
        input, textarea { background: #f1f5f9; border: 2px solid #f1f5f9; transition: 0.3s; border-radius: 1rem; padding: 1rem; }
        input:focus { border-color: var(--indigo); background: #fff; outline: none; }
        .tab-btn.active { color: var(--indigo); border-bottom: 3px solid var(--indigo); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-0 m-0">

    <div id="login-overlay" class="fixed inset-0 z-[100] bg-slate-900/50 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center">
            <h1 class="text-4xl font-black text-indigo-600 mb-2 italic">Tafasti!</h1>
            <p class="text-slate-500 mb-8 font-bold">הזינו אימייל לכניסה למערכת הספקים</p>
            <input type="email" id="loginEmail" placeholder="your@email.com" class="w-full mb-4 text-center text-xl font-bold">
            <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg hover:bg-indigo-700 transition">כניסה / הרשמה</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="sticky top-4 z-50 max-w-7xl mx-auto px-4 mt-4">
            <div class="glass p-4 rounded-3xl shadow-lg flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-black text-indigo-600 italic">Tafasti! <span class="text-slate-400 text-xs font-bold block uppercase tracking-tighter">SUP Portal</span></h1>
                </div>
                <div class="flex items-center gap-4">
                    <span id="userDisplay" class="text-xs font-bold text-slate-400 hidden md:block"></span>
                    <button onclick="logout()" class="text-xs font-bold text-red-400 hover:underline">התנתק</button>
                </div>
            </div>
        </header>

        <main class="max-w-5xl mx-auto px-4 py-12">
            <div class="flex gap-8 border-b border-slate-200 mb-10 pb-2">
                <button onclick="switchTab('new-deal')" id="tab-new-deal" class="tab-btn active text-xl font-black px-4 pb-2">✨ דיל חדש</button>
                <button onclick="switchTab('my-deals')" id="tab-my-deals" class="tab-btn text-xl font-black px-4 pb-2">📋 הדילים שלי</button>
            </div>

            <section id="new-deal-section" class="tab-content">
                <div class="admin-card p-10 bg-white">
                    <form id="offerForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold mb-2 text-slate-600">שם האטרקציה / כותרת הדיל</label>
                            <input type="text" id="title" required class="w-full">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-slate-600">עיר</label>
                            <input type="text" id="city" required class="w-full">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-slate-600">שעה להיום</label>
                            <input type="text" id="time" placeholder="17:00" required class="w-full">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-slate-600">מחיר רגיל</label>
                            <input type="number" id="originalPrice" required class="w-full">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-indigo-600">מחיר "תפסתי" (הנחה)</label>
                            <input type="number" id="discountPrice" required class="w-full border-indigo-100 bg-indigo-50/30">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-slate-600">טלפון בוואטסאפ</label>
                            <input type="tel" id="phone" required class="w-full">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-slate-600">לינק לתמונה</label>
                            <input type="url" id="imageUrl" required class="w-full">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold mb-2 text-slate-600">תיאור קצר</label>
                            <textarea id="description" rows="3" class="w-full"></textarea>
                        </div>
                        <div class="md:col-span-2">
                            <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white py-6 rounded-2xl font-black text-2xl shadow-xl hover:bg-indigo-600 transition">פרסם הצעה עכשיו!</button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="my-deals-section" class="tab-content hidden">
                <div id="myDealsList" class="grid gap-6"></div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg",
            authDomain: "tafasti-20c41.firebaseapp.com",
            projectId: "tafasti-20c41",
            storageBucket: "tafasti-20c41.firebasestorage.app",
            messagingSenderId: "457032202921",
            appId: "1:457032202921:web:8f397ae80d9506a66d07b8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUserEmail = sessionStorage.getItem('tafasti_email');

        window.handleLogin = () => {
            const email = document.getElementById('loginEmail').value;
            if (email && email.includes('@')) {
                currentUserEmail = email.toLowerCase().trim();
                sessionStorage.setItem('tafasti_email', currentUserEmail);
                initApp();
            } else {
                alert('נא להזין אימייל תקין');
            }
        };

        window.logout = () => {
            sessionStorage.removeItem('tafasti_email');
            location.reload();
        };

        function initApp() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('userDisplay').innerText = `מחובר כ: ${currentUserEmail}`;
            loadMyDeals();
        }

        if (currentUserEmail) initApp();

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${tab}-section`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active');
            if (tab === 'my-deals') loadMyDeals();
        };

        const form = document.getElementById('offerForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'מפרסם...';

            try {
                await addDoc(collection(db, "offers"), {
                    title: document.getElementById('title').value,
                    city: document.getElementById('city').value,
                    time: document.getElementById('time').value,
                    originalPrice: Number(document.getElementById('originalPrice').value),
                    discountPrice: Number(document.getElementById('discountPrice').value),
                    phone: document.getElementById('phone').value,
                    imageUrl: document.getElementById('imageUrl').value,
                    description: document.getElementById('description').value,
                    providerEmail: currentUserEmail, // שיוך הדיל לאימייל
                    status: "active",
                    createdAt: serverTimestamp()
                });
                alert('פורסם בהצלחה!');
                form.reset();
                switchTab('my-deals');
            } catch (err) {
                alert('שגיאה בפרסום');
            } finally {
                btn.disabled = false;
                btn.innerText = 'פרסם הצעה עכשיו!';
            }
        });

        async function loadMyDeals() {
            const list = document.getElementById('myDealsList');
            list.innerHTML = '<div class="text-center py-10">טוען...</div>';
            
            const q = query(collection(db, "offers"), where("providerEmail", "==", currentUserEmail), where("status", "==", "active"));
            const querySnapshot = await getDocs(q);
            
            list.innerHTML = '';
            if (querySnapshot.empty) {
                list.innerHTML = '<div class="admin-card p-12 text-center text-slate-400 italic">אין לך דילים פעילים.</div>';
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                list.innerHTML += `
                    <div class="admin-card p-6 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="flex items-center gap-6 flex-grow">
                            <img src="${data.imageUrl}" class="w-20 h-20 rounded-2xl object-cover">
                            <div>
                                <h3 class="font-extrabold text-xl">${data.title}</h3>
                                <p class="text-slate-500 font-bold">${data.city} | ${data.time} | ₪${data.discountPrice}</p>
                            </div>
                        </div>
                        <button onclick="window.deleteOffer('${docSnap.id}')" class="bg-red-50 text-red-500 px-8 py-3 rounded-xl font-bold hover:bg-red-500 hover:text-white transition">הסר</button>
                    </div>
                `;
            });
        }

        window.deleteOffer = async (id) => {
            if (confirm('להסיר את הדיל?')) {
                await deleteDoc(doc(db, "offers", id));
                loadMyDeals();
            }
        };
    </script>
</body>
</html>
