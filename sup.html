<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת ספקים | תפסתי!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F9FAFB; --accent: #2563EB; --text-dark: #111827; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text-dark); margin: 0; }
        .premium-card { background: white; border-radius: 24px; border: 1px solid #F3F4F6; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.04); }
        .input-style { 
            width: 100%; padding: 14px 18px; border-radius: 16px; border: 2px solid #F3F4F6; 
            outline: none; transition: 0.3s; font-weight: 600; background: white; text-align: center;
        }
        .input-style:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }
        .btn-primary { background: var(--accent); color: white; border-radius: 16px; font-weight: 800; transition: 0.3s; cursor: pointer; border: none; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        #custom-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); transition: 0.5s ease; z-index: 1000; opacity: 0; }
        #custom-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="custom-toast" class="bg-gray-900 text-white px-8 py-4 rounded-2xl font-bold shadow-2xl flex items-center gap-3">
        <span id="toast-icon">✨</span> <span id="toast-msg"></span>
    </div>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="premium-card w-full max-w-md p-8 text-center">
            <div class="flex justify-center mb-6">
                <div class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center text-2xl font-black italic shadow-lg">ת</div>
            </div>
            <h1 class="text-3xl font-black mb-6">מערכת ספקים</h1>
            <div id="login-form" class="space-y-4">
                <input type="text" id="pidInput" placeholder="הזן קוד ספק" class="input-style uppercase tracking-widest">
                <button onclick="login()" class="btn-primary w-full py-5 text-lg">כניסה</button>
                <div class="flex justify-between px-2 text-xs font-extrabold text-gray-400">
                    <button onclick="toggleAuth('reg')" class="hover:text-blue-600 underline">רישום ספק</button>
                    <button onclick="toggleAuth('forgot')" class="hover:text-blue-600 underline">שחזור קוד</button>
                </div>
            </div>
            <div id="reg-form" class="hidden space-y-4">
                <input type="email" id="regEmail" placeholder="אימייל עסקי" class="input-style">
                <button onclick="register()" class="btn-primary w-full py-5 text-lg bg-gray-900">יצירת חשבון</button>
                <button onclick="toggleAuth('login')" class="text-xs text-gray-400 font-extrabold hover:underline block w-full">חזרה</button>
            </div>
            <div id="id-display" class="hidden mt-6 p-6 bg-blue-50 border-2 border-dashed border-blue-200 rounded-3xl">
                <p class="text-blue-600 font-black text-xs mb-2 uppercase italic">הקוד שלך הוגרל!</p>
                <div id="new-id-val" class="text-4xl font-black text-gray-900 tracking-tighter mb-4"></div>
                <button onclick="startApp()" class="btn-primary w-full py-4 text-sm">המשך לפרסום דיל 🚀</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen">
        <header class="bg-white border-b border-gray-100 py-6 sticky top-0 z-50 text-right">
            <div class="max-w-5xl mx-auto px-6 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="bg-blue-50 p-3 rounded-xl">🏠</a>
                    <div>
                        <h2 class="text-xl font-black leading-none uppercase">לוח בקרה</h2>
                        <p id="user-email-display" class="text-[10px] text-blue-600 font-bold mt-1 uppercase"></p>
                    </div>
                </div>
                <button onclick="logout()" class="text-gray-400 hover:text-red-500 font-bold text-xs">התנתקות ←</button>
            </div>
        </header>

        <div class="max-w-5xl mx-auto p-6 pb-32">
            <main id="add" class="page active">
                <div class="premium-card p-6 md:p-10">
                    <h3 class="text-2xl font-black mb-6 text-right">פרסום דיל חדש</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-right">
                        <div class="space-y-4">
                            <input type="text" id="title" placeholder="כותרת הדיל" class="input-style text-right">
                            <select id="region" class="input-style text-right">
                                <option value="" disabled selected>בחר אזור</option>
                                <option value="מרכז">מרכז</option><option value="צפון">צפון</option>
                                <option value="דרום">דרום</option><option value="השרון">השרון</option>
                                <option value="שפלה">שפלה</option><option value="ירושלים">ירושלים</option>
                            </select>
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" id="orig" placeholder="מחיר רגיל" class="input-style">
                                <input type="number" id="disc" placeholder="מחיר דיל" class="input-style !border-blue-100">
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="date" id="expiryDate" class="input-style">
                                <input type="time" id="time" class="input-style">
                            </div>
                            <input type="tel" id="phone" placeholder="טלפון לוואטסאפ" class="input-style">
                            <div class="relative">
                                <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="updateFileName(this)">
                                <button onclick="document.getElementById('fileInput').click()" class="input-style bg-gray-50 border-dashed border-2 hover:bg-blue-50 text-blue-600 transition">📸 העלה תמונת דיל</button>
                                <p id="fileNameDisplay" class="text-[10px] text-gray-400 mt-1 mr-2 font-bold"></p>
                            </div>
                            <textarea id="desc" placeholder="תיאור קצר..." class="input-style h-20 resize-none text-right"></textarea>
                        </div>
                    </div>
                    <button onclick="publish()" id="pubBtn" class="btn-primary w-full py-5 mt-8 text-xl shadow-xl shadow-blue-100">פרסם דיל עכשיו 🚀</button>
                </div>
            </main>

            <main id="list" class="page">
                <h3 class="text-2xl font-black mb-6 text-right">הדילים שלי</h3>
                <div id="my-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-right"></div>
            </main>
        </div>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-xl border border-gray-100 p-2 rounded-3xl flex gap-2 shadow-2xl z-50">
            <button onclick="switchTab('add')" id="tab-add" class="px-8 py-4 bg-blue-600 text-white rounded-2xl font-bold">➕ הוספה</button>
            <button onclick="switchTab('list')" id="tab-list" class="px-8 py-4 text-gray-400 rounded-2xl font-bold">📋 ניהול</button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, deleteDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.appspot.com", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let pid = localStorage.getItem('tafasti_pid');
        let userEmail = localStorage.getItem('tafasti_email');
        let cloudConfig = null;

        // משיכת הגדרות מה-DB (אבטחה)
        const fetchConfig = async () => {
            const snap = await getDoc(doc(db, "settings", "cloudinary"));
            if (snap.exists()) cloudConfig = snap.data();
        };

        function toast(msg, icon = '✨') {
            const t = document.getElementById('custom-toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = icon;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.updateFileName = (input) => {
            const fileName = input.files[0]?.name;
            document.getElementById('fileNameDisplay').innerText = fileName ? "קובץ נבחר: " + fileName : "";
        };

        window.login = async () => {
            const input = document.getElementById('pidInput').value.toUpperCase().trim();
            if(!input) return toast('הזן קוד', '⚠️');
            const snap = await getDoc(doc(db, "providers", input));
            if(snap.exists()) { pid = input; userEmail = snap.data().email; startApp(); } else toast('קוד לא תקין', '❌');
        };

        window.startApp = async () => {
            localStorage.setItem('tafasti_pid', pid);
            localStorage.setItem('tafasti_email', userEmail);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-email-display').innerText = userEmail;
            
            // הגדרת זמן: תאריך היום ושעה אחת קדימה
            const now = new Date();
            document.getElementById('expiryDate').valueAsDate = now;
            now.setHours(now.getHours() + 1);
            document.getElementById('time').value = now.toTimeString().slice(0,5);
            
            await fetchConfig();
            loadMyDeals();
        };

        async function uploadToCloudinary(file) {
            if(!cloudConfig) await fetchConfig();
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', cloudConfig.preset);
            const response = await fetch(cloudConfig.url, { method: 'POST', body: formData });
            const data = await response.json();
            return data.secure_url;
        }

        window.publish = async () => {
            const b = document.getElementById('pubBtn');
            const title = document.getElementById('title').value;
            const region = document.getElementById('region').value;
            const fileInput = document.getElementById('fileInput');

            if(!title || !region) return toast('מלא כותרת ואזור', '⚠️');
            b.innerText = 'מפרסם...'; b.disabled = true;

            try {
                let finalUrl = "https://tinokotnet.files.wordpress.com/2016/03/girl-812482_640.jpg";
                if (fileInput.files.length > 0) {
                    b.innerText = 'מעלה תמונה...';
                    finalUrl = await uploadToCloudinary(fileInput.files[0]);
                }

                await addDoc(collection(db, "offers"), {
                    title, region,
                    phone: document.getElementById('phone').value,
                    originalPrice: Number(document.getElementById('orig').value),
                    discountPrice: Number(document.getElementById('disc').value),
                    expiryDate: document.getElementById('expiryDate').value,
                    time: document.getElementById('time').value,
                    imageUrl: finalUrl,
                    description: document.getElementById('desc').value,
                    providerID: pid,
                    createdAt: serverTimestamp()
                });
                toast('פורסם בהצלחה!', '🚀');
                fileInput.value = ""; document.getElementById('fileNameDisplay').innerText = "";
                switchTab('list');
            } catch (e) { toast('שגיאה בתהליך', '❌'); }
            b.innerText = 'פרסם דיל עכשיו 🚀'; b.disabled = false;
        };

        window.loadMyDeals = async () => {
            const q = query(collection(db, "offers"), where("providerID", "==", pid));
            const snap = await getDocs(q);
            const list = document.getElementById('my-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `<div class="premium-card p-4 flex justify-between items-center border-r-4 border-r-blue-500">
                    <div class="flex items-center gap-4">
                        <img src="${data.imageUrl}" class="w-14 h-14 rounded-xl object-cover">
                        <div><h4 class="font-bold text-gray-800">${data.title}</h4><p class="text-blue-600 font-black">₪${data.discountPrice}</p></div>
                    </div>
                    <button onclick="del('${d.id}')" class="p-2 text-red-400 hover:bg-red-50 rounded-lg transition">🗑️</button>
                </div>`;
            });
        };

        window.del = async (id) => { if(confirm('למחוק?')) { await deleteDoc(doc(db, "offers", id)); loadMyDeals(); } };
        window.switchTab = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'list') loadMyDeals();
            document.getElementById('tab-add').className = id === 'add' ? 'px-8 py-4 bg-blue-600 text-white rounded-2xl font-bold' : 'px-8 py-4 text-gray-400 rounded-2xl font-bold';
            document.getElementById('tab-list').className = id === 'list' ? 'px-8 py-4 bg-blue-600 text-white rounded-2xl font-bold' : 'px-8 py-4 text-gray-400 rounded-2xl font-bold';
        };
        window.logout = () => { localStorage.clear(); location.reload(); };
        window.toggleAuth = (m) => {
            ['login','reg','forgot','id-display'].forEach(x => document.getElementById(x+'-form')?.classList.add('hidden') || document.getElementById(x)?.classList.add('hidden'));
            document.getElementById(m + (m === 'id-display' ? '' : '-form'))?.classList.remove('hidden');
        };

        if(pid && userEmail) startApp();
    </script>
</body>
</html>
