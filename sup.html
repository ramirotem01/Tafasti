<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUP | Tafasti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; padding-bottom: 90px; }
        .safe-area { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-group input { width: 100%; padding: 1rem; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 1rem; outline: none; }
        .input-group input:focus { border-color: #6366f1; background: white; }
        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-indigo-600 z-[100] flex items-center justify-center p-8 text-center">
        <div>
            <h1 class="text-5xl font-black text-white italic mb-4">Tafasti!</h1>
            <p class="text-indigo-100 mb-10 text-xl font-bold underline">Supplier Portal</p>
            <input type="email" id="loginEmail" placeholder="המייל שלך" class="w-full p-5 rounded-2xl mb-4 text-center text-xl outline-none">
            <button onclick="login()" class="w-full bg-white text-indigo-600 py-5 rounded-2xl font-black text-xl shadow-2xl">היכנס למערכת</button>
        </div>
    </div>

    <div id="app" class="hidden safe-area">
        <header class="p-6 bg-white flex justify-between items-center shadow-sm">
            <h2 class="text-2xl font-black text-indigo-600">ניהול ספקים</h2>
            <button onclick="location.reload()" class="text-red-400 font-bold text-sm">התנתק</button>
        </header>

        <main id="add" class="page active p-6">
            <h3 class="text-3xl font-extrabold mb-8 leading-tight">פרסמו הצעה <br>חדשה להיום</h3>
            <form id="offerForm" class="space-y-4">
                <div class="input-group"><input type="text" id="title" placeholder="שם האטרקציה / כותרת הדיל" required></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="input-group"><input type="text" id="city" placeholder="עיר" required></div>
                    <div class="input-group"><input type="text" id="time" placeholder="שעה" required></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="input-group"><input type="number" id="orig" placeholder="מחיר רגיל" required></div>
                    <div class="input-group"><input type="number" id="disc" placeholder="מחיר מוזל" required class="!bg-indigo-50 !border-indigo-100 font-bold"></div>
                </div>
                <div class="input-group"><input type="tel" id="phone" placeholder="טלפון / וואטסאפ" required></div>
                <div class="input-group"><input type="url" id="img" placeholder="לינק לתמונה" required></div>
                <textarea id="desc" placeholder="תיאור קצר..." class="w-full p-4 bg-white rounded-2xl border-2 border-slate-100 h-24"></textarea>
                <button type="submit" class="w-full bg-indigo-600 text-white py-6 rounded-2xl font-black text-xl shadow-lg mt-4">פרסם דיל עכשיו 🔥</button>
            </form>
        </main>

        <main id="manage" class="page p-6">
            <h3 class="text-3xl font-extrabold mb-8">הדילים שלי</h3>
            <div id="my-list" class="space-y-4"></div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 h-20 bg-white border-t flex justify-around items-center px-8 shadow-2xl">
            <button onclick="switchTab('add')" class="flex flex-col items-center gap-1 font-bold text-indigo-600">
                <span class="text-2xl">➕</span>
                <span class="text-xs">חדש</span>
            </button>
            <button onclick="switchTab('manage')" class="flex flex-col items-center gap-1 font-bold text-slate-400">
                <span class="text-2xl">📋</span>
                <span class="text-xs">שלי</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg",
            authDomain: "tafasti-20c41.firebaseapp.com",
            projectId: "tafasti-20c41",
            storageBucket: "tafasti-20c41.firebasestorage.app",
            messagingSenderId: "457032202921",
            appId: "1:457032202921:web:8f397ae80d9506a66d07b8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let email = sessionStorage.getItem('sup_email');

        window.login = () => {
            email = document.getElementById('loginEmail').value.toLowerCase();
            if(email.includes('@')) {
                sessionStorage.setItem('sup_email', email);
                location.reload();
            }
        }

        if(email) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        window.switchTab = (tab) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            if(tab === 'manage') loadMyDeals();
        }

        document.getElementById('offerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "offers"), {
                title: document.getElementById('title').value,
                city: document.getElementById('city').value,
                time: document.getElementById('time').value,
                originalPrice: Number(document.getElementById('orig').value),
                discountPrice: Number(document.getElementById('disc').value),
                phone: document.getElementById('phone').value,
                imageUrl: document.getElementById('img').value,
                description: document.getElementById('desc').value,
                providerEmail: email,
                status: "active",
                createdAt: serverTimestamp()
            });
            alert('הדיל באוויר!');
            switchTab('manage');
        });

        async function loadMyDeals() {
            const q = query(collection(db, "offers"), where("providerEmail", "==", email));
            const snap = await getDocs(q);
            const list = document.getElementById('my-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                    <div class="card p-4 flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <img src="${data.imageUrl}" class="w-12 h-12 rounded-lg object-cover">
                            <div>
                                <h4 class="font-bold text-sm">${data.title}</h4>
                                <p class="text-xs text-slate-400">₪${data.discountPrice}</p>
                            </div>
                        </div>
                        <button onclick="del('${d.id}')" class="text-red-500 font-bold text-xs bg-red-50 px-3 py-2 rounded-lg">הסר</button>
                    </div>
                `;
            });
        }

        window.del = async (id) => {
            if(confirm('למחוק?')) {
                await deleteDoc(doc(db, "offers", id));
                loadMyDeals();
            }
        }
    </script>
</body>
</html>
