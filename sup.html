<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פורטל ספקים | תפסתי!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #000; color: #fff; padding-bottom: 90px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; padding: 24px; }
        .input-10gaz { background: #111; border: 1px solid #222; border-radius: 16px; padding: 18px; width: 100%; color: #fff; font-weight: 700; outline: none; transition: 0.3s; font-size: 16px; }
        .input-10gaz:focus { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59,130,246,0.1); background: #151515; }
        label { display: block; font-size: 11px; font-weight: 900; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; margin-right: 8px; }
        .page { display: none; }
        .page.active { display: block; animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        /* עיצוב מיוחד לשדות תאריך ושעה בדפדפנים */
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 bg-black z-[200] flex items-center justify-center p-8">
        <div class="glass-card w-full max-w-sm text-center">
            <h1 class="text-3xl font-black italic mb-2 tracking-tighter">SUP<span class="text-blue-500">PORTAL</span></h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-[0.3em] mb-10">Verification System</p>
            
            <div id="login-form">
                <input type="text" id="pidInput" placeholder="ENTER PROVIDER ID" class="input-10gaz text-center mb-4 font-mono tracking-widest uppercase">
                <button onclick="login()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-500 transition">ACCESS ACCOUNT</button>
                <button onclick="toggleAuth('reg')" class="mt-6 text-xs text-slate-500 font-bold hover:text-white transition uppercase tracking-widest">Register New Account</button>
            </div>

            <div id="reg-form" class="hidden">
                <input type="email" id="regEmail" placeholder="ENTER YOUR EMAIL" class="input-10gaz text-center mb-4">
                <button onclick="register()" class="w-full bg-white text-black py-5 rounded-2xl font-black text-lg hover:bg-gray-200 transition">GENERATE ID</button>
                <button onclick="toggleAuth('login')" class="mt-6 text-xs text-slate-500 font-bold hover:text-white transition uppercase tracking-widest">Back to login</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden max-w-lg mx-auto p-6">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-2xl font-black italic leading-none">CONTROL PANEL</h2>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider mt-1">Provider Interface</p>
            </div>
            <div id="id-badge" class="px-3 py-1 bg-blue-500/10 text-blue-500 rounded-lg font-mono text-[10px] border border-blue-500/20 tracking-tighter"></div>
        </header>

        <main id="add" class="page active">
            <div class="glass-card space-y-5">
                <div>
                    <label>כותרת הדיל</label>
                    <input type="text" id="title" placeholder="לדוגמה: שיט בסירה מהירה" class="input-10gaz">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>עיר</label>
                        <input type="text" id="city" placeholder="מיקום" class="input-10gaz">
                    </div>
                    <div>
                        <label>URL תמונה</label>
                        <input type="url" id="img" placeholder="https://..." class="input-10gaz">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>מחיר רגיל</label>
                        <input type="number" id="orig" placeholder="₪" class="input-10gaz">
                    </div>
                    <div>
                        <label>מחיר דיל</label>
                        <input type="number" id="disc" placeholder="₪" class="input-10gaz !border-blue-500/40">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>תאריך סיום</label>
                        <input type="date" id="expiryDate" class="input-10gaz">
                    </div>
                    <div>
                        <label>שעת סיום</label>
                        <input type="time" id="time" class="input-10gaz">
                    </div>
                </div>

                <div>
                    <label>תיאור החוויה</label>
                    <textarea id="desc" placeholder="מה כלול בדיל?" class="input-10gaz h-24"></textarea>
                </div>

                <button onclick="publish()" id="pubBtn" class="w-full bg-blue-600 text-white py-6 rounded-2xl font-black text-xl shadow-[0_0_30px_rgba(59,130,246,0.2)] hover:bg-blue-500 transition">DEPLOY LIVE</button>
            </div>
        </main>

        <main id="list" class="page">
            <h3 class="text-xl font-black mb-6 flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                דילים פעילים במערכת
            </h3>
            <div id="my-list" class="space-y-4"></div>
        </main>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-[#0a0a0a]/90 backdrop-blur-xl border border-white/10 rounded-3xl p-2 flex gap-2 shadow-2xl z-[100]">
            <button onclick="switchTab('add')" id="tab-add" class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-xl transition-all">➕</button>
            <button onclick="switchTab('list')" id="tab-list" class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-xl hover:bg-white/10 transition-all">📋</button>
            <div class="w-[1px] bg-white/10 mx-1 my-2"></div>
            <button onclick="logout()" class="w-14 h-14 bg-red-500/10 rounded-2xl flex items-center justify-center text-xl text-red-500 hover:bg-red-500/20 transition-all">✕</button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, where, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.firebasestorage.app", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let pid = localStorage.getItem('tafasti_pid');

        // קביעת תאריך ברירת מחדל להיום
        document.getElementById('expiryDate').valueAsDate = new Date();

        window.toggleAuth = (mode) => {
            document.getElementById('login-form').classList.toggle('hidden', mode === 'reg');
            document.getElementById('reg-form').classList.toggle('hidden', mode === 'login');
        };

        window.login = async () => {
            const input = document.getElementById('pidInput').value.toUpperCase().trim();
            if(!input) return alert('ENTER ID');
            const snap = await getDoc(doc(db, "providers", input));
            if(snap.exists()) { pid = input; startApp(); } else alert('INVALID PROVIDER ID');
        };

        window.register = async () => {
            const email = document.getElementById('regEmail').value;
            if(!email.includes('@')) return alert('INVALID EMAIL');
            const newID = '10GAZ-' + Math.random().toString(36).substr(2, 4).toUpperCase();
            await setDoc(doc(db, "providers", newID), { email: email, createdAt: serverTimestamp() });
            alert('ACCOUNT CREATED!\nYOUR ID: ' + newID);
            pid = newID; startApp();
        };

        function startApp() {
            localStorage.setItem('tafasti_pid', pid);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('id-badge').innerText = pid;
            loadMyDeals();
        }

        if(pid) startApp();
        window.logout = () => { localStorage.removeItem('tafasti_pid'); location.reload(); };

        window.switchTab = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // עדכון ויזואלי של הכפתורים
            document.getElementById('tab-add').className = id === 'add' ? 'w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-xl transition-all' : 'w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-xl hover:bg-white/10 transition-all';
            document.getElementById('tab-list').className = id === 'list' ? 'w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-xl transition-all' : 'w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-xl hover:bg-white/10 transition-all';
            
            if(id === 'list') loadMyDeals();
        };

        window.publish = async () => {
            const b = document.getElementById('pubBtn');
            const title = document.getElementById('title').value;
            if(!title) return alert('MISSING TITLE');

            b.innerText = 'DEPLOYING...'; b.disabled = true;
            
            try {
                await addDoc(collection(db, "offers"), {
                    title: title, 
                    city: document.getElementById('city').value,
                    time: document.getElementById('time').value, 
                    expiryDate: document.getElementById('expiryDate').value,
                    originalPrice: Number(document.getElementById('orig').value),
                    discountPrice: Number(document.getElementById('disc').value), 
                    imageUrl: document.getElementById('img').value,
                    description: document.getElementById('desc').value, 
                    providerID: pid, 
                    status: "active", 
                    createdAt: serverTimestamp()
                });
                alert('SYSTEM ONLINE: DEAL DEPLOYED'); 
                b.innerText = 'DEPLOY LIVE'; b.disabled = false;
                switchTab('list');
            } catch (e) {
                alert('ERROR DEPLOYING');
                b.disabled = false; b.innerText = 'DEPLOY LIVE';
            }
        };

        async function loadMyDeals() {
            const q = query(collection(db, "offers"), where("providerID", "==", pid));
            const snap = await getDocs(q);
            const list = document.getElementById('my-list');
            list.innerHTML = '';
            
            if(snap.empty) {
                list.innerHTML = '<p class="text-center text-slate-600 font-bold py-10 uppercase text-xs tracking-widest">No active deployments found</p>';
                return;
            }

            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `<div class="glass-card flex justify-between items-center mb-4 border-l-4 border-l-blue-500">
                    <div class="flex items-center gap-4">
                        <img src="${data.imageUrl}" class="w-14 h-14 rounded-xl object-cover grayscale hover:grayscale-0 transition-all">
                        <div>
                            <h4 class="font-bold text-sm uppercase leading-none mb-1">${data.title}</h4>
                            <p class="text-blue-500 font-black text-xs">₪${data.discountPrice} <span class="text-[9px] text-slate-500 font-normal mr-2">UNTIL: ${data.expiryDate || 'N/A'}</span></p>
                        </div>
                    </div>
                    <button onclick="del('${d.id}')" class="text-red-500 text-[9px] font-black tracking-widest bg-red-500/5 px-3 py-2 rounded-lg border border-red-500/20 hover:bg-red-500 hover:text-white transition-all">DELETE</button>
                </div>`;
            });
        }
        window.del = async (id) => { if(confirm('CONFIRM DELETION?')) { await deleteDoc(doc(db, "offers", id)); loadMyDeals(); } };
    </script>
</body>
</html>
