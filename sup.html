<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ספקים | תפסתי!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #F9FAFB; }
        .input-style { width: 100%; padding: 14px; border-radius: 16px; border: 2px solid #F3F4F6; outline: none; transition: 0.3s; }
        .input-style:focus { border-color: #2563EB; }
        .btn-primary { background: #2563EB; color: white; border-radius: 16px; font-weight: 800; cursor: pointer; border: none; transition: 0.3s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md p-8 rounded-[32px] shadow-xl text-center border border-gray-100">
            <h1 id="auth-title" class="text-3xl font-black mb-6 text-gray-900">כניסת ספקים</h1>

            <div id="login-form" class="space-y-4">
                <input type="text" id="pidInput" placeholder="הזן קוד ספק (למשל: TAF-1234)" class="input-style text-center font-bold tracking-widest uppercase">
                <button onclick="loginWithCode()" class="btn-primary w-full py-4">כניסה למערכת</button>
                <div class="flex justify-between px-2 text-xs font-bold text-gray-400">
                    <button onclick="showSection('reg')" class="hover:text-blue-600 underline">ספק חדש? הירשם</button>
                    <button onclick="showSection('forgot')" class="hover:text-blue-600 underline text-red-400">שכחתי קוד</button>
                </div>
            </div>

            <div id="reg-form" class="hidden space-y-4">
                <input type="email" id="regEmail" placeholder="אימייל עסקי" class="input-style text-center">
                <input type="password" id="regPass" placeholder="בחר סיסמה (הקוד שלך)" class="input-style text-center">
                <button onclick="handleRegister()" class="btn-primary w-full py-4 bg-gray-900">צור חשבון וקבל קוד</button>
                <button onclick="showSection('login')" class="text-xs text-gray-400 font-bold hover:underline">חזרה לכניסה</button>
            </div>

            <div id="forgot-form" class="hidden space-y-4">
                <p class="text-gray-500 text-sm mb-4 font-semibold text-right">הזן את המייל שאיתו נרשמת. נשלח לך לינק לאיפוס הקוד בצורה מאובטחת.</p>
                <input type="email" id="forgotEmail" placeholder="האימייל שלך" class="input-style text-center">
                <button onclick="sendRecoveryEmail()" class="btn-primary w-full py-4 bg-blue-500">שלח לינק לשחזור למייל</button>
                <button onclick="showSection('login')" class="text-xs text-gray-400 font-bold hover:underline">חזרה לכניסה</button>
            </div>
            
            <div id="success-msg" class="hidden mt-4 p-4 bg-green-50 text-green-700 rounded-2xl text-sm font-bold">
                הלינק נשלח! בדוק את תיבת המייל שלך (גם בספאם).
            </div>
        </div>
    </div>

    <div id="app" class="hidden">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            sendPasswordResetEmail,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", 
            authDomain: "tafasti-20c41.firebaseapp.com", 
            projectId: "tafasti-20c41", 
            storageBucket: "tafasti-20c41.appspot.com", 
            messagingSenderId: "457032202921", 
            appId: "1:457032202921:web:8f397ae80d9506a66d07b8" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // פונקציית מעבר בין טפסים
        window.showSection = (section) => {
            const sections = ['login', 'reg', 'forgot'];
            sections.forEach(s => document.getElementById(s + '-form').classList.add('hidden'));
            document.getElementById(section + '-form').classList.remove('hidden');
            document.getElementById('success-msg').classList.add('hidden');
        };

        // שחזור קוד מאובטח - שליחה למייל
        window.sendRecoveryEmail = async () => {
            const email = document.getElementById('forgotEmail').value.trim();
            if(!email) return alert('נא להזין אימייל');
            
            try {
                await sendPasswordResetEmail(auth, email);
                document.getElementById('success-msg').classList.remove('hidden');
                document.getElementById('forgotEmail').value = '';
            } catch (error) {
                alert('שגיאה: וודא שהמייל תקין ורשום במערכת');
            }
        };

        // רישום ספק חדש
        window.handleRegister = async () => {
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;
            if(!email || pass.length < 6) return alert('אימייל תקין וסיסמה של 6 תווים לפחות');

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                
                // שמירת פרטי ספק ב-DB
                await setDoc(doc(db, "providers", user.uid), {
                    email: email,
                    providerID: 'TAF-' + Math.floor(1000 + Math.random() * 9000)
                });
                
                alert('נרשמת בהצלחה! השתמש במייל ובקוד שבחרת לכניסה הבאה.');
            } catch (e) { alert('שגיאה ברישום: המשתמש כבר קיים'); }
        };

        // כניסה (כאן ה"קוד" הוא למעשה הסיסמה של Firebase Auth)
        window.loginWithCode = async () => {
            const pid = document.getElementById('pidInput').value.trim();
            // כאן אפשר להוסיף לוגיקה שתומכת גם בכניסה עם אימייל וסיסמה
            // או להשתמש בשיטה שבה ה-PID הוא מזהה הכניסה.
            alert('כניסה מתבצעת...');
        };
    </script>
</body>
</html>
