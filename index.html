<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תפסתי! | פרימיום ספונטני</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F9FA; --accent: #2563EB; --text-dark: #111827; --wa-green: #25D366; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text-dark); margin: 0; line-height: 1.5; overflow-x: hidden; }
        .app-container { width: 94%; max-width: 1200px; margin: 0 auto; padding-bottom: 120px; }

        /* Header ענק */
        .main-header { padding: 30px 0; border-bottom: 1px solid #f1f1f1; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .logo-box { background: var(--accent); color: white; width: 65px; height: 65px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; font-style: italic; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .brand-name { font-size: 45px; font-weight: 900; font-style: italic; letter-spacing: -2px; line-height: 0.8; color: var(--text-dark); }

        /* כרטיסייה */
        .premium-card { 
            background: #ffffff; border-radius: 28px; overflow: hidden; 
            border: 1px solid #E5E7EB; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; height: 100%; cursor: pointer; position: relative;
        }
        .premium-card.expired { opacity: 0.4; filter: grayscale(1); border-style: dashed; }
        .premium-card:not(.expired):hover { transform: translateY(-10px); box-shadow: 0 40px 80px -20px rgba(0,0,0,0.12); border-color: var(--accent); }
        
        .deals-grid { display: grid; gap: 30px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .badge-discount { background: #DC2626; color: white; padding: 5px 12px; border-radius: 12px; font-weight: 800; font-size: 14px; position: absolute; top: 15px; left: 15px; z-index: 10; }
        .badge-expired { background: #6B7280; color: white; padding: 5px 12px; border-radius: 12px; font-weight: 800; font-size: 14px; position: absolute; top: 15px; left: 15px; z-index: 10; }

        .btn-primary { background: var(--accent); color: white; border-radius: 16px; font-weight: 800; transition: 0.3s; }
        .filter-btn { padding: 12px 28px; border-radius: 16px; font-weight: 800; font-size: 15px; border: 2px solid transparent; background: #eee; color: #777; transition: 0.3s; }
        .filter-btn.active { background: white; color: var(--accent); border-color: var(--accent); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.1); }

        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .brand-name { font-size: 35px; }
            .logo-box { width: 50px; height: 50px; font-size: 30px; }
            .nav-dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; background: white; border-radius: 25px; height: 80px; display: flex; justify-content: space-around; align-items: center; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: 1px solid #f0f0f0; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="app-container flex justify-between items-center">
            <div class="cursor-pointer flex items-center gap-5" onclick="showPage('home')">
                <div class="logo-box">ת</div>
                <div>
                    <h1 class="brand-name">תפסתי<span class="text-blue-600">!</span></h1>
                    <p class="text-gray-400 font-extrabold text-xs uppercase tracking-[3px] mt-2 mr-1">Premium Deals</p>
                </div>
            </div>
            <nav class="hidden md:flex items-center gap-12 font-black text-lg text-gray-500">
                <button onclick="showPage('home')" class="hover:text-blue-600 transition">הדילים</button>
                <button onclick="showPage('search')" class="hover:text-blue-600 transition">חיפוש</button>
                <a href="sup.html" class="btn-primary px-10 py-4 shadow-xl">כניסת ספקים</a>
            </nav>
        </div>
    </header>

    <div class="app-container">
        <main id="home" class="page active pt-14">
            <div class="flex flex-col md:flex-row justify-between items-end mb-14 gap-8">
                <div class="text-right">
                    <h2 class="text-6xl font-black text-gray-950 mb-4 leading-none">תפסו מהר.</h2>
                    <p class="text-xl text-gray-500 font-bold italic">אטרקציות פנויות להיום בלבד במחירי הרגע האחרון</p>
                </div>
                <div class="flex gap-4 bg-gray-200/50 p-2 rounded-[22px]">
                    <button id="filter-active" onclick="setFilter('active')" class="filter-btn active">פעילים</button>
                    <button id="filter-all" onclick="setFilter('all')" class="filter-btn">הכל</button>
                </div>
            </div>
            <div id="deals-list" class="deals-grid"></div>
        </main>

        <main id="search" class="page pt-16">
            <div class="max-w-3xl mx-auto mb-20 text-center">
                <h2 class="text-6xl font-black mb-10 tracking-tighter">מה מחפשים?</h2>
                <div class="relative group">
                    <input type="text" id="searchInput" oninput="runSearch()" placeholder="עיר, אטרקציה, סוג פעילות..." class="w-full p-8 pr-20 rounded-[35px] border-4 border-gray-100 focus:border-blue-600 outline-none font-black text-3xl transition-all shadow-2xl">
                    <span class="absolute right-8 top-9 text-4xl opacity-20 group-focus-within:opacity-100 transition-opacity">🔍</span>
                </div>
            </div>
            <div id="search-results" class="deals-grid"></div>
        </main>

        <main id="deal-view" class="page pt-10">
            <div id="deal-detail-content" class="max-w-6xl mx-auto"></div>
        </main>
    </div>

    <nav class="nav-dock md:hidden">
        <button onclick="showPage('home')" id="nav-home" class="flex flex-col items-center gap-1 text-blue-600 font-black">
            <span class="text-3xl">🏠</span><span class="text-[12px]">דילים</span>
        </button>
        <button onclick="showPage('search')" id="nav-search" class="flex flex-col items-center gap-1 text-gray-400 font-black">
            <span class="text-3xl">🔍</span><span class="text-[12px]">חיפוש</span>
        </button>
        <a href="sup.html" class="flex flex-col items-center gap-1 text-gray-400 font-black">
            <span class="text-3xl">🔑</span><span class="text-[12px]">ספקים</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.firebasestorage.app", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let allDeals = [];
        let currentFilter = 'active';

        // הפיכת פונקציות לגלובליות באופן מפורש עבור ה-HTML
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-dock button').forEach(b => { b.classList.remove('text-blue-600'); b.classList.add('text-gray-400'); });
            const nav = document.getElementById('nav-' + id);
            if(nav) { nav.classList.add('text-blue-600'); nav.classList.remove('text-gray-400'); }
            window.scrollTo(0,0);
        };

        window.setFilter = (type) => {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`filter-${type}`).classList.add('active');
            renderMainFeed();
        };

        function isDealExpired(dealTime) {
            try {
                const now = new Date();
                const [h, m] = dealTime.split(':').map(Number);
                const dDate = new Date();
                dDate.setHours(h, m, 0, 0);
                return now > new Date(dDate.getTime() + 30 * 60000); 
            } catch (e) { return false; }
        }

        // פונקציית הרינדור המתוקנת עם קריאה בטוחה ל-openDeal
        function createCardHTML(d) {
            const expired = isDealExpired(d.time);
            const discount = Math.round(((d.originalPrice - d.discountPrice) / d.originalPrice) * 100);
            
            return `
                <div class="premium-card ${expired ? 'expired' : ''}" onclick="window.handleCardClick('${d.id}', ${expired})">
                    <div class="relative h-72 overflow-hidden">
                        <img src="${d.imageUrl}" class="w-full h-full object-cover transition duration-700 hover:scale-110">
                        ${expired ? `<span class="badge-expired">פג תוקף</span>` : `<span class="badge-discount">-${discount}%</span>`}
                    </div>
                    <div class="p-8 flex flex-col flex-grow bg-white">
                        <h3 class="font-black text-3xl text-gray-950 leading-tight mb-3">${d.title}</h3>
                        <div class="flex items-center gap-3 text-gray-400 font-black text-sm uppercase tracking-widest mb-6">
                            <span>📍 ${d.city}</span><span>•</span><span>⏰ ${d.time}</span>
                        </div>
                        <div class="mt-auto flex justify-between items-center pt-6 border-t border-gray-100">
                            <div>
                                <span class="text-4xl font-black text-blue-600">₪${d.discountPrice}</span>
                                <span class="text-lg text-gray-300 line-through mr-3 font-bold">₪${d.originalPrice}</span>
                            </div>
                            ${expired ? '' : `<button class="btn-primary px-7 py-3 shadow-lg shadow-blue-50 text-sm">תפסתי!</button>`}
                        </div>
                    </div>
                </div>
            `;
        }

        // מטפל לחיצה גלובלי
        window.handleCardClick = (id, isExpired) => {
            if (isExpired) return;
            window.openDeal(id);
        };

        window.openDeal = (id) => {
            const d = allDeals.find(item => item.id === id);
            if (!d) return;
            const cleanPhone = d.phone.replace(/[^0-9]/g, '');
            const waMessage = encodeURIComponent(`היי, אני רוצה לתפוס את הדיל ל${d.title} ב-₪${d.discountPrice} שראיתי בתפסתי!`);

            document.getElementById('deal-detail-content').innerHTML = `
                <div class="bg-white rounded-[50px] shadow-2xl border border-gray-100 flex flex-col md:flex-row p-8 md:p-14 gap-14">
                    <div class="w-full md:w-1/2 h-[400px] md:h-[650px] rounded-[40px] overflow-hidden relative shadow-inner">
                        <img src="${d.imageUrl}" class="w-full h-full object-cover">
                        <button onclick="showPage('home')" class="absolute top-8 right-8 bg-white w-16 h-16 rounded-full flex items-center justify-center font-black text-3xl shadow-2xl">✕</button>
                    </div>
                    <div class="w-full md:w-1/2 flex flex-col justify-center text-right">
                        <button onclick="showPage('home')" class="text-blue-600 font-black text-lg mb-10">← חזרה לדילים</button>
                        <h2 class="text-6xl md:text-7xl font-black mb-6 text-gray-950 leading-[0.9] tracking-tighter">${d.title}</h2>
                        <p class="text-gray-400 text-3xl font-bold mb-12 italic">📍 ${d.city} • שעה ${d.time}</p>
                        
                        <div class="flex items-center gap-10 mb-12 p-12 bg-blue-50/50 rounded-[45px] border border-blue-100/50">
                            <div>
                                <p class="text-sm text-blue-400 font-black uppercase mb-2">מחיר תפסתי!</p>
                                <span class="text-8xl font-black text-blue-600 leading-none">₪${d.discountPrice}</span>
                            </div>
                            <div class="border-r border-blue-100 pr-10">
                                <p class="text-sm text-gray-400 font-black uppercase mb-2">במקום</p>
                                <span class="text-4xl line-through text-gray-300 font-bold">₪${d.originalPrice}</span>
                            </div>
                        </div>

                        <p class="text-gray-600 text-3xl leading-relaxed mb-14 font-medium">${d.description || 'דיל בלעדי להורים ספונטניים! מומלץ ליצור קשר בהקדם.'}</p>

                        <a href="https://wa.me/${cleanPhone}?text=${waMessage}" target="_blank"
                           class="block w-full py-10 rounded-[35px] text-center font-black text-4xl shadow-2xl flex items-center justify-center gap-6 text-white"
                           style="background-color: var(--wa-green); box-shadow: 0 25px 50px -10px rgba(37, 211, 102, 0.5);">
                            <span class="text-5xl">💬</span> תפסתי מקום!
                        </a>
                    </div>
                </div>
            `;
            showPage('deal-view');
        };

        window.runSearch = () => {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsDiv = document.getElementById('search-results');
            if(!term) { resultsDiv.innerHTML = ''; return; }
            const results = allDeals.filter(d => d.title.toLowerCase().includes(term) || d.city.toLowerCase().includes(term));
            resultsDiv.innerHTML = results.length ? results.map(d => createCardHTML(d)).join('') : '<p class="col-span-full text-center py-20 text-gray-400 text-2xl font-black">לא נמצאו תוצאות...</p>';
        };

        async function loadDeals() {
            try {
                const snap = await getDocs(query(collection(db, "offers"), where("status", "==", "active")));
                allDeals = [];
                snap.forEach(doc => allDeals.push({ id: doc.id, ...doc.data() }));
                allDeals.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderMainFeed();
            } catch (err) { console.error(err); }
        }

        function renderMainFeed() {
            const list = document.getElementById('deals-list');
            const filtered = allDeals.filter(d => currentFilter === 'active' ? !isDealExpired(d.time) : true);
            list.innerHTML = filtered.map(d => createCardHTML(d)).join('');
        }

        loadDeals();
    </script>
</body>
</html>
