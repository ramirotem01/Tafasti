<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תפסתי! - הדילים הכי חמים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #F9FAFB; }
        .city-tag.active { background-color: #2563EB; color: white; border-color: #2563EB; }
        .deal-card { transition: all 0.3s ease; cursor: pointer; }
        .deal-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0,0,0,0.08); }
        
        /* מודל משודרג - דף פרטים מלא */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-blur: 10px; }
        .modal.active { display: flex; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <div id="dealModal" class="modal" onclick="closeModal()">
        <div class="bg-white w-full max-w-2xl h-full md:h-auto md:max-h-[90vh] md:rounded-[40px] overflow-y-auto relative" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 left-6 bg-black/20 hover:bg-black/40 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold z-10 backdrop-blur-md">✕</button>
            
            <img id="modalImg" src="" class="w-full h-64 md:h-80 object-cover">
            
            <div class="p-8">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <span id="modalRegion" class="inline-block bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-xs font-black mb-2"></span>
                        <h2 id="modalTitle" class="text-3xl font-black text-gray-900 leading-tight"></h2>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8 bg-gray-50 p-5 rounded-3xl border border-gray-100">
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">מחיר מיוחד</p>
                        <span id="modalDisc" class="text-3xl font-black text-blue-600"></span>
                        <span id="modalOrig" class="text-sm text-gray-300 line-through mr-2 font-bold"></span>
                    </div>
                    <div class="text-left border-r border-gray-200 pr-4">
                        <p class="text-[10px] text-gray-400 font-bold uppercase">בתוקף עד</p>
                        <span id="modalTime" class="text-lg font-black text-red-500 italic block"></span>
                        <span id="modalDate" class="text-xs text-gray-400 font-bold"></span>
                    </div>
                </div>

                <div class="mb-10">
                    <h4 class="font-bold text-gray-900 mb-3 flex items-center gap-2">
                        <span class="w-1.5 h-6 bg-blue-600 rounded-full"></span>
                        תיאור ההצעה
                    </h4>
                    <p id="modalDesc" class="text-gray-600 leading-relaxed font-medium text-lg"></p>
                </div>

                <div id="modalAction"></div>
                <p class="text-center text-[10px] text-gray-400 mt-4 font-bold">בלחיצה על הכפתור תועברו לשיחת WhatsApp עם הספק</p>
            </div>
        </div>
    </div>

    <header class="bg-white border-b py-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-black text-blue-600 italic tracking-tighter">תפסתי!</h1>
                <div class="flex gap-2">
                    <button onclick="toggleExpired()" id="expBtn" class="px-5 py-2.5 rounded-xl font-bold text-xs bg-gray-100 text-gray-500">היסטוריה</button>
                    <a href="sup.html" class="px-5 py-2.5 rounded-xl font-bold text-xs bg-blue-600 text-white shadow-md">ספקים</a>
                </div>
            </div>
            
            <div class="flex flex-col gap-4">
                <input type="text" id="searchInput" placeholder="חפש דיל..." class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl py-3.5 px-6 outline-none font-bold focus:border-blue-500 transition-all text-sm">
                
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                    <button onclick="filterBy('הכל')" class="city-tag active px-5 py-2.5 rounded-xl font-bold bg-white text-gray-500 border border-gray-100 whitespace-nowrap text-xs transition-all">הכל</button>
                    <button onclick="filterBy('מרכז')" class="city-tag px-5 py-2.5 rounded-xl font-bold bg-white text-gray-500 border border-gray-100 whitespace-nowrap text-xs transition-all">מרכז</button>
                    <button onclick="filterBy('צפון')" class="city-tag px-5 py-2.5 rounded-xl font-bold bg-white text-gray-500 border border-gray-100 whitespace-nowrap text-xs transition-all">צפון</button>
                    <button onclick="filterBy('דרום')" class="city-tag px-5 py-2.5 rounded-xl font-bold bg-white text-gray-500 border border-gray-100 whitespace-nowrap text-xs transition-all">דרום</button>
                    <button onclick="filterBy('השרון')" class="city-tag px-5 py-2.5 rounded-xl font-bold bg-white text-gray-500 border border-gray-100 whitespace-nowrap text-xs transition-all">השרון</button>
                    <button onclick="filterBy('שפלה')" class="city-tag px-5 py-2.5 rounded-xl font-bold bg-white text-gray-500 border border-gray-100 whitespace-nowrap text-xs transition-all">שפלה</button>
                    <button onclick="filterBy('ירושלים')" class="city-tag px-5 py-2.5 rounded-xl font-bold bg-white text-gray-500 border border-gray-100 whitespace-nowrap text-xs transition-all">ירושלים</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div id="deals-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.appspot.com", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDeals = [];
        let showExpired = false;
        let currentFilter = 'הכל';

        async function loadDeals() {
            const q = query(collection(db, "offers"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            allDeals = [];
            snap.forEach(doc => allDeals.push({ id: doc.id, ...doc.data() }));
            render();
        }

        window.openDeal = (id) => {
            const deal = allDeals.find(d => d.id === id);
            document.getElementById('modalImg').src = deal.imageUrl;
            document.getElementById('modalTitle').innerText = deal.title;
            document.getElementById('modalRegion').innerText = deal.region;
            document.getElementById('modalDisc').innerText = '₪' + deal.discountPrice;
            document.getElementById('modalOrig').innerText = '₪' + deal.originalPrice;
            document.getElementById('modalTime').innerText = deal.time || "--:--";
            document.getElementById('modalDate').innerText = deal.expiryDate || "";
            document.getElementById('modalDesc').innerText = deal.description || "אין תיאור נוסף לדיל זה.";
            
            const today = new Date().toISOString().split('T')[0];
            const isExpired = deal.expiryDate < today;
            const phone = deal.phone || "";
            const cleanPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
            const whatsappLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent('היי, אני מעוניין בדיל: ' + deal.title)}`;

            document.getElementById('modalAction').innerHTML = `
                <a href="${isExpired ? '#' : whatsappLink}" target="_blank" 
                   class="flex items-center justify-center gap-3 w-full py-5 rounded-2xl font-black text-xl shadow-xl transition-all ${isExpired ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-[#25D366] text-white hover:scale-[1.02] shadow-green-100'}">
                   ${isExpired ? 'הדיל נגמר' : 'תפסתי בוואטסאפ!'}
                </a>
            `;
            document.getElementById('dealModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            document.getElementById('dealModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        function render() {
            const container = document.getElementById('deals-container');
            const today = new Date().toISOString().split('T')[0];
            container.innerHTML = '';

            let filtered = allDeals.filter(d => {
                const matchSearch = d.title.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase());
                const matchRegion = currentFilter === 'הכל' || d.region === currentFilter;
                if(!showExpired && d.expiryDate < today) return false;
                return matchSearch && matchRegion;
            });

            filtered.forEach(data => {
                const isExpired = data.expiryDate < today;
                const phone = data.phone || "";
                const cleanPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
                const whatsappLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent('היי, אני מעוניין בדיל: ' + data.title)}`;

                container.innerHTML += `
                    <div class="deal-card ${isExpired ? 'opacity-60 grayscale' : ''} bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100 flex flex-col relative" onclick="openDeal('${data.id}')">
                        <div class="relative h-48">
                            <img src="${data.imageUrl}" class="w-full h-full object-cover">
                            <div class="absolute top-4 right-4 bg-white/90 px-3 py-1 rounded-xl text-[10px] font-black text-blue-600 border border-blue-50">${data.region}</div>
                        </div>
                        <div class="p-5 flex flex-col flex-grow">
                            <h3 class="text-lg font-black mb-3 text-gray-900 leading-tight line-clamp-2">${data.title}</h3>
                            <div class="flex justify-between items-end mb-5">
                                <div>
                                    <span class="text-2xl font-black text-blue-600">₪${data.discountPrice}</span>
                                    <span class="text-[11px] text-gray-300 line-through mr-1 font-bold">₪${data.originalPrice}</span>
                                </div>
                                <div class="text-[9px] font-black text-red-500 bg-red-50 px-2 py-1 rounded-lg">עד: ${data.time}</div>
                            </div>
                            <a href="${isExpired ? '#' : whatsappLink}" target="_blank" onclick="event.stopPropagation()"
                               class="flex items-center justify-center gap-2 w-full ${isExpired ? 'bg-gray-100 text-gray-400' : 'bg-[#25D366] text-white'} py-3.5 rounded-2xl font-black text-sm transition-all active:scale-95 shadow-sm">
                               <span>תפסתי בוואטסאפ!</span>
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        window.filterBy = (region) => {
            currentFilter = region;
            document.querySelectorAll('.city-tag').forEach(b => b.classList.toggle('active', b.innerText === region));
            render();
        };

        window.toggleExpired = () => {
            showExpired = !showExpired;
            document.getElementById('expBtn').innerText = showExpired ? 'חזרה' : 'היסטוריה';
            render();
        };

        document.getElementById('searchInput').addEventListener('input', render);
        loadDeals();
    </script>
</body>
</html>
