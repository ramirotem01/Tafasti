<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תפסתי! | חוויית פרימיום רספונסיבית</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --card: #16161a; --accent: #3b82f6; --text-main: #ffffff; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; }
        
        /* Layout Engine */
        .container-fluid { width: 92%; max-width: 1400px; margin: 0 auto; }
        
        /* Grid System - Responsive */
        .deals-grid { 
            display: grid; 
            gap: 24px; 
            grid-template-columns: 1fr; /* ברירת מחדל לסלולרי */
        }
        @media (min-width: 768px) { .deals-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .deals-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1280px) { .deals-grid { grid-template-columns: repeat(4, 1fr); } }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .deal-card { background: var(--card); border-radius: 28px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.03); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer; }
        .deal-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .accent-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        
        /* Floating Nav Dock - Desktop vs Mobile */
        .nav-dock { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 450px; background: rgba(22, 22, 26, 0.85); 
            backdrop-filter: blur(20px); border-radius: 28px; height: 75px; 
            display: flex; justify-content: space-around; items-center; z-index: 100; 
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
        }

        /* Page Transitions */
        .page { display: none; padding-top: 20px; }
        .page.active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        input.search-10gaz { background: #16161a; border: 1px solid #222; border-radius: 20px; padding: 22px; width: 100%; color: #fff; font-weight: 700; outline: none; transition: 0.3s; }
    </style>
</head>
<body>

    <header class="p-6 pt-10 sticky top-0 bg-[#0a0a0c]/90 backdrop-blur-xl z-50">
        <div class="container-fluid flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter text-white">תפסתי<span class="text-blue-500">!</span></h1>
                <p id="header-subtitle" class="text-[10px] text-blue-400 font-bold uppercase tracking-[0.2em]">דילים בזמן אמת</p>
            </div>
            <div class="hidden md:flex gap-8 items-center font-bold text-sm">
                <button onclick="showPage('home')" class="hover:text-blue-400 transition">פיד דילים</button>
                <button onclick="showPage('search')" class="hover:text-blue-400 transition">חיפוש</button>
                <a href="sup.html" class="bg-blue-600 px-6 py-2 rounded-full hover:bg-blue-700 transition">כניסת ספקים</a>
            </div>
            <div class="w-12 h-12 glass rounded-2xl flex items-center justify-center text-xl shadow-inner border border-white/10 md:hidden">⚡</div>
        </div>
    </header>

    <div class="container-fluid">
        
        <main id="home" class="page active">
            <div class="mb-10 text-center md:text-right">
                <h2 class="text-3xl font-black mb-2">דילים לוהטים לרגע זה</h2>
                <div class="h-1.5 w-16 accent-gradient rounded-full md:mr-0 mx-auto"></div>
            </div>
            <div id="deals-list" class="deals-grid">
                <div class="deal-card h-64 animate-pulse bg-white/5"></div>
                <div class="deal-card h-64 animate-pulse bg-white/5"></div>
                <div class="deal-card h-64 animate-pulse bg-white/5"></div>
            </div>
        </main>

        <main id="search" class="page">
            <div class="max-w-2xl mx-auto">
                <h2 class="text-4xl font-black mb-8 italic text-center">מה בא לכם לתפוס?</h2>
                <div class="relative mb-12">
                    <input type="text" id="searchInput" oninput="filterDeals()" placeholder="חפשו אטרקציה, עיר או ספק..." class="search-10gaz text-xl">
                    <span class="absolute left-6 top-6 opacity-30 text-2xl">🔍</span>
                </div>
            </div>
            <div id="search-results" class="deals-grid">
                </div>
        </main>

        <main id="deal-view" class="page">
            <div id="deal-detail-content" class="max-w-4xl mx-auto"></div>
        </main>

    </div>

    <nav class="nav-dock md:hidden">
        <button onclick="showPage('home')" id="btn-home" class="nav-btn active">
            <span class="text-2xl mb-1">🏠</span><span>דילים</span>
        </button>
        <button onclick="showPage('search')" id="btn-search" class="nav-btn">
            <span class="text-2xl mb-1">🔍</span><span>חיפוש</span>
        </button>
        <a href="sup.html" class="nav-btn">
            <span class="text-2xl mb-1">🔑</span><span>ספקים</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.firebasestorage.app", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let allDeals = [];

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById('btn-' + id);
            if(activeBtn) activeBtn.classList.add('active');

            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        async function loadDeals() {
            const snap = await getDocs(query(collection(db, "offers"), where("status", "==", "active")));
            const list = document.getElementById('deals-list');
            list.innerHTML = '';
            allDeals = [];
            snap.forEach(doc => {
                const d = { id: doc.id, ...doc.data() };
                allDeals.push(d);
                list.innerHTML += renderCard(d);
            });
        }

        function renderCard(d) {
            return `
                <div class="deal-card shadow-2xl" onclick="openDeal('${d.id}')">
                    <div class="relative h-60 overflow-hidden">
                        <img src="${d.imageUrl}" class="w-full h-full object-cover transition duration-700 hover:scale-110">
                        <div class="absolute top-4 right-4 accent-gradient text-[10px] font-black px-4 py-1.5 rounded-full shadow-lg">דיל פעיל</div>
                    </div>
                    <div class="p-6 flex justify-between items-start bg-[#16161a]">
                        <div>
                            <h3 class="font-black text-xl mb-1">${d.title}</h3>
                            <p class="text-blue-400 text-sm font-bold uppercase tracking-wide">${d.city} • ${d.time}</p>
                        </div>
                        <div class="text-left">
                            <span class="block text-3xl font-black text-white leading-none">₪${d.discountPrice}</span>
                            <span class="text-xs text-slate-500 line-through font-bold">₪${d.originalPrice}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        window.filterDeals = () => {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const results = document.getElementById('search-results');
            const filtered = allDeals.filter(d => d.title.toLowerCase().includes(term) || d.city.toLowerCase().includes(term));
            results.innerHTML = filtered.map(d => renderCard(d)).join('');
        }

        window.openDeal = (id) => {
            const d = allDeals.find(item => item.id === id);
            document.getElementById('deal-detail-content').innerHTML = `
                <div class="grid md:grid-cols-2 gap-10 items-start">
                    <div class="relative rounded-[40px] overflow-hidden shadow-2xl h-[500px]">
                        <img src="${d.imageUrl}" class="w-full h-full object-cover">
                        <button onclick="showPage('home')" class="absolute top-6 right-6 w-12 h-12 glass rounded-full flex items-center justify-center font-bold text-xl border border-white/20">✕</button>
                    </div>
                    <div class="py-4">
                        <h1 class="text-5xl font-black mb-6 leading-tight">${d.title}</h1>
                        <div class="flex items-center gap-4 mb-8">
                            <span class="px-4 py-2 bg-blue-500/10 text-blue-400 rounded-xl font-bold border border-blue-500/20">${d.city}</span>
                            <span class="px-4 py-2 bg-white/5 text-slate-300 rounded-xl font-bold border border-white/10">${d.time}</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-6 mb-10">
                            <div class="glass p-6 rounded-[32px]"><p class="text-xs text-slate-500 font-black mb-1">מחיר מקורי</p><p class="text-2xl line-through opacity-30 font-bold">₪${d.originalPrice}</p></div>
                            <div class="bg-blue-600/10 border border-blue-500/30 p-6 rounded-[32px]"><p class="text-xs text-blue-400 font-black mb-1">מחיר תפסתי!</p><p class="text-4xl font-black text-blue-500">₪${d.discountPrice}</p></div>
                        </div>

                        <p class="text-slate-400 leading-relaxed text-xl mb-12">${d.description || 'תיאור האטרקציה יופיע כאן בקרוב.'}</p>
                        
                        <a href="https://wa.me/${d.phone}" class="block w-full accent-gradient text-white py-7 rounded-[35px] text-center font-black text-2xl shadow-xl hover:scale-[1.02] transition active:scale-95">אני רוצה את זה! (ווטסאפ)</a>
                    </div>
                </div>
            `;
            showPage('deal-view');
        };

        loadDeals();
    </script>
</body>
</html>
