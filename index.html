<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תפסתי! - הדילים הכי חמים עכשיו</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #F9FAFB; }
        .deal-card { transition: all 0.3s ease; }
        .deal-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b py-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <h1 class="text-3xl font-black text-blue-600 italic tracking-tighter">תפסתי!</h1>
            <a href="sup.html" class="text-sm font-bold text-gray-400 hover:text-blue-600 transition">כניסת ספקים ←</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div id="deals-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.appspot.com", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadDeals() {
            const container = document.getElementById('deals-container');
            const q = query(collection(db, "offers"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            
            container.innerHTML = '';
            snap.forEach(doc => {
                const data = doc.data();
                
                // יצירת לינק לוואטסאפ
                const phone = data.phone || "";
                const cleanPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
                const whatsappMsg = encodeURIComponent(`היי, אני מעוניין בדיל: ${data.title} שפורסם בתפסתי!`);
                const whatsappLink = `https://wa.me/${cleanPhone}?text=${whatsappMsg}`;

                container.innerHTML += `
                    <div class="deal-card bg-white rounded-[32px] overflow-hidden shadow-sm border border-gray-100 flex flex-col h-full">
                        <div class="relative">
                            <img src="${data.imageUrl}" class="w-full h-56 object-cover" onerror="this.src='https://placehold.co/400x300?text=תפסתי!'">
                            <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-md text-blue-600 px-4 py-1 rounded-2xl text-xs font-black shadow-sm">
                                ${data.city}
                            </div>
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <h3 class="text-2xl font-black mb-2 text-gray-900 leading-tight">${data.title}</h3>
                            <p class="text-gray-500 text-sm mb-6 line-clamp-2">${data.description || ''}</p>
                            
                            <div class="mt-auto">
                                <div class="flex justify-between items-end mb-6">
                                    <div>
                                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">מחיר תפסתי</p>
                                        <span class="text-3xl font-black text-blue-600 tracking-tighter">₪${data.discountPrice}</span>
                                        <span class="text-sm text-gray-300 line-through mr-2">₪${data.originalPrice}</span>
                                    </div>
                                    <div class="text-[10px] font-black text-red-500 bg-red-50 px-3 py-1.5 rounded-xl border border-red-100">
                                        עד: ${data.time}
                                    </div>
                                </div>

                                <a href="${whatsappLink}" target="_blank" 
                                   class="flex items-center justify-center gap-3 w-full bg-[#25D366] hover:bg-[#128C7E] text-white py-4 rounded-2xl font-black transition-all transform active:scale-95 shadow-xl shadow-green-100">
                                   <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
                                   <span class="tracking-tight">תפסתי בוואטסאפ!</span>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        loadDeals();
    </script>
</body>
</html>
