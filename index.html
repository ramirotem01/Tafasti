<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תפסתי! | פרימיום ספונטני</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F9FA; --accent: #2563EB; --text-dark: #111827; --wa-green: #25D366; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text-dark); margin: 0; }
        .app-container { width: 94%; max-width: 1300px; margin: 0 auto; padding-bottom: 120px; }

        /* Header ענק ומרשים */
        .main-header { padding: 35px 0; background: white; border-bottom: 1px solid #f1f1f1; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .logo-box { background: var(--accent); color: white; width: 70px; height: 70px; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 44px; font-weight: 900; font-style: italic; box-shadow: 0 12px 25px rgba(37, 99, 235, 0.2); }
        .brand-name { font-size: 52px; font-weight: 900; font-style: italic; letter-spacing: -3px; line-height: 0.8; color: var(--text-dark); }

        /* כרטיסיות פרימיום */
        .premium-card { 
            background: #ffffff; border-radius: 24px; overflow: hidden; 
            border: 1px solid #E5E7EB; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; height: 100%; cursor: pointer;
        }
        .premium-card:hover { transform: translateY(-8px); box-shadow: 0 30px 60px -15px rgba(0,0,0,0.1); border-color: var(--accent); }
        .deals-grid { display: grid; gap: 30px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

        .btn-primary { background: var(--accent); color: white; border-radius: 16px; font-weight: 800; transition: 0.3s; }
        .badge-discount { background: #DC2626; color: white; padding: 5px 12px; border-radius: 12px; font-weight: 800; font-size: 14px; position: absolute; top: 15px; left: 15px; z-index: 10; }

        @media (max-width: 768px) {
            .brand-name { font-size: 40px; }
            .logo-box { width: 60px; height: 60px; font-size: 35px; }
            .nav-dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; background: white; border-radius: 25px; height: 80px; display: flex; justify-content: space-around; align-items: center; z-index: 100; box-shadow: 0 15px 40px rgba(0,0,0,0.12); border: 1px solid #f0f0f0; }
        }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="app-container flex justify-between items-center">
            <div class="cursor-pointer flex items-center gap-5" onclick="showPage('home')">
                <div class="logo-box">ת</div>
                <div>
                    <h1 class="brand-name">תפסתי<span class="text-blue-600">!</span></h1>
                    <p class="text-gray-400 font-black text-[11px] uppercase tracking-[4px] mt-1 mr-1">Premium Spontaneous</p>
                </div>
            </div>
            <nav class="hidden md:flex items-center gap-12 font-black text-lg text-gray-500">
                <button onclick="showPage('home')" class="hover:text-blue-600 transition">הדילים</button>
                <button onclick="showPage('search')" class="hover:text-blue-600 transition">חיפוש</button>
                <a href="sup.html" class="btn-primary px-10 py-4 shadow-xl shadow-blue-50">כניסת ספקים</a>
            </nav>
        </div>
    </header>

    <div class="app-container">
        <main id="home" class="page active pt-14">
            <div class="mb-12 text-right">
                <h2 class="text-5xl font-black text-gray-950 mb-4 leading-none tracking-tight">תפסו מהר.</h2>
                <p class="text-2xl text-gray-500 font-bold italic">דילים שפנויים להיום בלבד במחירים בלעדיים</p>
            </div>
            <div id="deals-list" class="deals-grid"></div>
        </main>

        <main id="search" class="page pt-16">
            <div class="max-w-3xl mx-auto mb-16 text-center">
                <h2 class="text-5xl font-black mb-10 tracking-tighter">מה מחפשים?</h2>
                <div class="relative shadow-2xl rounded-[35px]">
                    <input type="text" id="searchInput" oninput="runSearch()" placeholder="עיר, אטרקציה, ספק..." class="w-full p-8 pr-18 rounded-[35px] border-4 border-gray-50 focus:border-blue-500 outline-none font-black text-2xl transition-all bg-white">
                    <span class="absolute right-7 top-9 text-3xl opacity-20">🔍</span>
                </div>
            </div>
            <div id="search-results" class="deals-grid"></div>
        </main>

        <main id="deal-view" class="page pt-8">
            <div id="deal-detail-content" class="max-w-6xl mx-auto"></div>
        </main>
    </div>

    <nav class="nav-dock md:hidden">
        <button onclick="showPage('home')" class="nav-btn flex flex-col items-center gap-1 text-blue-600 font-black" data-page="home">
            <span class="text-3xl">🏠</span><span class="text-[11px]">דילים</span>
        </button>
        <button onclick="showPage('search')" class="nav-btn flex flex-col items-center gap-1 text-gray-400 font-black" data-page="search">
            <span class="text-3xl">🔍</span><span class="text-[11px]">חיפוש</span>
        </button>
        <a href="sup.html" class="flex flex-col items-center gap-1 text-gray-400 font-black">
            <span class="text-3xl">🔑</span><span class="text-[11px]">ספקים</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.firebasestorage.app", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let allDeals = [];

        // חשיפת פונקציות ל-window
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // עדכון צבעי תפריט מובייל
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const isMatch = btn.getAttribute('data-page') === id;
                btn.classList.toggle('text-blue-600', isMatch);
                btn.classList.toggle('text-gray-400', !isMatch);
            });
            window.scrollTo(0,0);
        };

        window.renderCard = (d) => {
            const discount = Math.round(((d.originalPrice - d.discountPrice) / d.originalPrice) * 100);
            return `
                <div class="premium-card shadow-sm" onclick="openDeal('${d.id}')">
                    <div class="relative h-64 overflow-hidden">
                        <img src="${d.imageUrl}" class="w-full h-full object-cover transition duration-700 hover:scale-110">
                        ${discount > 0 ? `<div class="badge-discount">-${discount}%</div>` : ''}
                    </div>
                    <div class="p-8 flex flex-col flex-grow bg-white text-right">
                        <h3 class="font-black text-2xl text-gray-950 leading-tight mb-2">${d.title}</h3>
                        <div class="flex items-center gap-3 text-gray-400 font-bold text-xs uppercase tracking-widest mb-6">
                            <span>📍 ${d.city}</span><span>•</span><span>⏰ ${d.time}</span>
                        </div>
                        <div class="mt-auto flex justify-between items-center pt-6 border-t border-gray-100">
                            <div>
                                <span class="text-3xl font-black text-blue-600">₪${d.discountPrice}</span>
                                <span class="text-sm text-gray-300 line-through mr-2 font-bold">₪${d.originalPrice}</span>
                            </div>
                            <button class="btn-primary px-6 py-2.5 text-xs">תפסתי!</button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.runSearch = () => {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsDiv = document.getElementById('search-results');
            if(!term) { resultsDiv.innerHTML = ''; return; }
            const filtered = allDeals.filter(d => d.title.toLowerCase().includes(term) || d.city.toLowerCase().includes(term));
            resultsDiv.innerHTML = filtered.length ? filtered.map(d => renderCard(d)).join('') : '<p class="col-span-full text-center py-20 text-gray-400 font-black text-xl">לא נמצאו תוצאות...</p>';
        };

        window.openDeal = (id) => {
            const d = allDeals.find(item => item.id === id);
            if (!d) return;
            const cleanPhone = d.phone.replace(/[^0-9]/g, '');
            const waMessage = encodeURIComponent(`היי, אני רוצה לתפוס את הדיל ל${d.title} ב-₪${d.discountPrice} שראיתי בתפסתי!`);

            document.getElementById('deal-detail-content').innerHTML = `
                <div class="bg-white rounded-[45px] shadow-2xl border border-gray-100 flex flex-col md:flex-row p-7 md:p-14 gap-12 text-right">
                    <div class="w-full md:w-1/2 h-80 md:h-[600px] rounded-[35px] overflow-hidden shadow-inner">
                        <img src="${d.imageUrl}" class="w-full h-full object-cover">
                    </div>
                    <div class="w-full md:w-1/2 flex flex-col justify-center">
                        <button onclick="showPage('home')" class="text-blue-600 font-black text-xl mb-8 flex items-center gap-2">← חזרה לדילים</button>
                        <h2 class="text-6xl font-black mb-5 text-gray-950 leading-none tracking-tighter">${d.title}</h2>
                        <p class="text-gray-400 text-3xl font-bold mb-10 italic">📍 ${d.city} • שעה ${d.time}</p>
                        
                        <div class="flex items-center gap-10 mb-10 p-10 bg-blue-50/50 rounded-[40px] border border-blue-100/50">
                            <div>
                                <p class="text-sm text-blue-400 font-black uppercase mb-2 tracking-widest">מחיר תפסתי</p>
                                <span class="text-7xl font-black text-blue-600 leading-none">₪${d.discountPrice}</span>
                            </div>
                            <div class="border-r border-blue-100 pr-10">
                                <p class="text-sm text-gray-400 font-black uppercase mb-2">במקום</p>
                                <span class="text-3xl line-through text-gray-300 font-bold">₪${d.originalPrice}</span>
                            </div>
                        </div>

                        <p class="text-gray-600 text-2xl leading-relaxed mb-12 font-medium">${d.description || 'דיל בלעדי להורים ספונטניים! מומלץ ליצור קשר בהקדם.'}</p>
                        
                        <a href="https://wa.me/${cleanPhone}?text=${waMessage}" target="_blank" 
                           class="block w-full py-9 rounded-[30px] text-center font-black text-3xl shadow-2xl flex items-center justify-center gap-4 text-white transition transform active:scale-95"
                           style="background-color: var(--wa-green); box-shadow: 0 20px 40px -10px rgba(37, 211, 102, 0.4);">
                            <span class="text-4xl">💬</span> תפסתי מקום בווטסאפ
                        </a>
                    </div>
                </div>
            `;
            showPage('deal-view');
        };

        async function loadDeals() {
            try {
                // ללא orderBy כדי למנוע את שגיאת האינדקס
                const snap = await getDocs(query(collection(db, "offers"), where("status", "==", "active")));
                const list = document.getElementById('deals-list');
                list.innerHTML = '';
                allDeals = [];
                
                snap.forEach(doc => {
                    const d = { id: doc.id, ...doc.data() };
                    allDeals.push(d);
                    list.innerHTML += renderCard(d);
                });
            } catch (err) { console.error("Error:", err); }
        }

        loadDeals();
    </script>
</body>
</html>
