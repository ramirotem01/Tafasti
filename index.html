<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tafasti! | Pro Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --card: #16161a; --accent: #3b82f6; --text-main: #ffffff; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 90px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .deal-card { background: var(--card); border-radius: 24px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.03); transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .deal-card:active { transform: scale(0.96); filter: brightness(1.2); }
        .accent-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .nav-dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(22, 22, 26, 0.8); backdrop-filter: blur(20px); border-radius: 24px; height: 65px; display: flex; justify-content: space-around; items-center; z-index: 100; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .nav-btn { color: #52525b; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 800; }
        .nav-btn.active { color: var(--accent); }
        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="p-6 pt-10 flex justify-between items-center max-w-lg mx-auto">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-white">Tafasti<span class="text-blue-500">!</span></h1>
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-[0.2em]">Live Deals Dashboard</p>
        </div>
        <div class="w-12 h-12 glass rounded-full flex items-center justify-center text-xl">⚡</div>
    </header>

    <div id="home" class="page active px-5 max-w-lg mx-auto">
        <div class="mb-8">
            <h2 class="text-2xl font-extrabold mb-1">דילים חמים להיום</h2>
            <div class="h-1 w-12 accent-gradient rounded-full"></div>
        </div>
        <div id="deals-list" class="space-y-5">
            <div class="deal-card h-48 animate-pulse bg-white/5"></div>
        </div>
    </div>

    <div id="deal-view" class="page">
        <div id="deal-detail-content" class="max-w-lg mx-auto"></div>
    </div>

    <nav class="nav-dock">
        <button onclick="showPage('home')" class="nav-btn active">🏠<span class="mt-1">FEED</span></button>
        <button class="nav-btn">🔍<span class="mt-1">SEARCH</span></button>
        <a href="sup.html" class="nav-btn">🔑<span class="mt-1">SUPPLIER</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.firebasestorage.app", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        };

        async function loadDeals() {
            const snap = await getDocs(query(collection(db, "offers"), where("status", "==", "active")));
            const list = document.getElementById('deals-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="deal-card" onclick="openDeal('${doc.id}')">
                        <div class="relative h-44">
                            <img src="${d.imageUrl}" class="w-full h-full object-cover grayscale-[0.2] hover:grayscale-0 transition">
                            <div class="absolute top-4 left-4 bg-black/60 backdrop-blur px-3 py-1 rounded-lg text-[10px] font-black border border-white/10">LIVE</div>
                        </div>
                        <div class="p-5 flex justify-between items-center">
                            <div>
                                <h3 class="font-extrabold text-lg">${d.title}</h3>
                                <p class="text-blue-400 text-xs font-bold">${d.city} • ${d.time}</p>
                            </div>
                            <div class="text-right">
                                <span class="block text-2xl font-black text-white">₪${d.discountPrice}</span>
                                <span class="text-[10px] text-slate-500 line-through">₪${d.originalPrice}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.openDeal = async (id) => {
            const snap = await getDocs(collection(db, "offers"));
            let d; snap.forEach(doc => { if(doc.id === id) d = doc.data(); });
            document.getElementById('deal-detail-content').innerHTML = `
                <div class="relative"><img src="${d.imageUrl}" class="w-full h-80 object-cover opacity-80"></div>
                <div class="p-8 -mt-10 bg-[#0a0a0c] rounded-t-[40px] relative z-10 border-t border-white/5">
                    <h1 class="text-4xl font-black mb-4">${d.title}</h1>
                    <div class="flex gap-4 mb-8">
                        <div class="glass p-4 rounded-2xl flex-grow"><p class="text-xs text-slate-400 font-bold mb-1">מחיר בלעדי</p><p class="text-2xl font-black text-blue-500">₪${d.discountPrice}</p></div>
                        <div class="glass p-4 rounded-2xl flex-grow text-center"><p class="text-xs text-slate-400 font-bold mb-1">זמן</p><p class="text-2xl font-black italic">${d.time}</p></div>
                    </div>
                    <p class="text-slate-400 leading-relaxed mb-10 text-lg">${d.description}</p>
                    <div class="flex gap-4">
                        <a href="https://wa.me/${d.phone}" class="flex-grow accent-gradient text-white py-6 rounded-3xl text-center font-black text-xl shadow-[0_10px_30px_rgba(59,130,246,0.3)]">קח אותי לשם</a>
                        <button onclick="showPage('home')" class="glass px-8 rounded-3xl">✕</button>
                    </div>
                </div>
            `;
            showPage('deal-view');
        };
        loadDeals();
    </script>
</body>
</html>
