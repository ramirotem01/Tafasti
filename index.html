<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תפסתי! | ניהול זמנים חכם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F9FA; --accent: #2563EB; --text-dark: #111827; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text-dark); margin: 0; }
        .app-container { width: 94%; max-width: 1300px; margin: 0 auto; padding-bottom: 100px; }

        .premium-card { 
            background: #ffffff; border-radius: 20px; overflow: hidden; 
            border: 1px solid #E5E7EB; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; height: 100%; cursor: pointer;
        }
        .premium-card.expired { opacity: 0.6; filter: grayscale(1); border-style: dashed; }
        .premium-card:not(.expired):hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08); border-color: var(--accent); }
        
        .deals-grid { display: grid; gap: 24px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .btn-primary { background: var(--accent); color: white; border-radius: 12px; font-weight: 800; transition: 0.3s; }
        .badge-discount { background: #DC2626; color: white; padding: 3px 8px; border-radius: 8px; font-weight: 800; font-size: 12px; }
        .badge-expired { background: #6B7280; color: white; padding: 3px 8px; border-radius: 8px; font-weight: 800; font-size: 12px; }

        .filter-btn { padding: 8px 20px; border-radius: 12px; font-weight: 700; font-size: 14px; transition: 0.3s; border: 1px solid #E5E7EB; background: white; color: #6B7280; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }

        @media (max-width: 768px) {
            .nav-dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border-radius: 20px; height: 70px; display: flex; justify-content: space-around; align-items: center; z-index: 100; border: 1px solid rgba(0,0,0,0.05); }
        }
        .page { display: none; animation: fadeIn 0.3s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="py-4 sticky top-0 bg-[#F8F9FA]/95 backdrop-blur-sm z-50 border-b border-gray-100 shadow-sm">
        <div class="app-container flex justify-between items-center">
            <div class="cursor-pointer flex items-center gap-3" onclick="showPage('home')">
                <div class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center text-xl font-black shadow-lg shadow-blue-100">ת</div>
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter text-gray-950">תפסתי<span class="text-blue-600">!</span></h1>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider -mt-1">דילים ספונטניים להיום</p>
                </div>
            </div>
            <nav class="hidden md:flex items-center gap-8 font-bold text-sm text-gray-600">
                <button onclick="showPage('home')" class="hover:text-blue-600 transition">הדילים החמים</button>
                <button onclick="showPage('search')" class="hover:text-blue-600 transition">חיפוש</button>
                <a href="sup.html" class="btn-primary px-6 py-2.5 shadow-md shadow-blue-100">כניסת ספקים</a>
            </nav>
        </div>
    </header>

    <div class="app-container">
        <main id="home" class="page active pt-8">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div class="text-center md:text-right">
                    <h2 class="text-3xl font-extrabold text-gray-950 leading-none mb-1.5">תפסו מהר.</h2>
                    <p class="text-gray-500 font-medium italic">אטרקציות פנויות להיום</p>
                </div>
                <div class="flex gap-2 bg-gray-100 p-1.5 rounded-2xl">
                    <button id="filter-active" onclick="setFilter('active')" class="filter-btn active">פעילים בלבד</button>
                    <button id="filter-all" onclick="setFilter('all')" class="filter-btn">כל הדילים</button>
                </div>
            </div>
            
            <div id="deals-list" class="deals-grid">
                <div class="premium-card h-72 animate-pulse bg-gray-200"></div>
            </div>
        </main>

        <main id="search" class="page pt-8 md:pt-12">
            </main>

        <main id="deal-view" class="page pt-6">
            <div id="deal-detail-content" class="max-w-5xl mx-auto"></div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.firebasestorage.app", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let allDeals = [];
        let currentFilter = 'active'; // ברירת מחדל: רק פעילים

        // פונקציה לבדיקה אם הזמן עבר
        function isDealExpired(dealTime) {
            try {
                const now = new Date();
                const [hours, minutes] = dealTime.split(':').map(Number);
                const dealDate = new Date();
                dealDate.setHours(hours, minutes, 0, 0);

                // חסד של 30 דקות מהשעה הנקובה
                const expiryLimit = new Date(dealDate.getTime() + 30 * 60000);
                return now > expiryLimit;
            } catch (e) { return false; }
        }

        window.setFilter = (type) => {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`filter-${type}`).classList.add('active');
            renderDeals();
        };

        async function loadDeals() {
            const snap = await getDocs(query(collection(db, "offers"), where("status", "==", "active"), orderBy("createdAt", "desc")));
            allDeals = [];
            snap.forEach(doc => allDeals.push({ id: doc.id, ...doc.data() }));
            renderDeals();
        }

        function renderDeals() {
            const list = document.getElementById('deals-list');
            list.innerHTML = '';
            
            const filtered = allDeals.filter(d => {
                if (currentFilter === 'active') return !isDealExpired(d.time);
                return true;
            });

            if (filtered.length === 0) {
                list.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400 font-bold italic">לא נמצאו דילים ${currentFilter === 'active' ? 'זמינים כרגע' : ''}.</div>`;
                return;
            }

            filtered.forEach(d => {
                const expired = isDealExpired(d.time);
                const discount = Math.round(((d.originalPrice - d.discountPrice) / d.originalPrice) * 100);
                
                list.innerHTML += `
                    <div class="premium-card shadow-sm ${expired ? 'expired' : ''}" onclick="${expired ? '' : `openDeal('${d.id}')`}">
                        <div class="relative h-52 overflow-hidden">
                            <img src="${d.imageUrl}" class="w-full h-full object-cover" alt="${d.title}">
                            <div class="absolute top-3 left-3">
                                ${expired ? `<span class="badge-expired">פג תוקף</span>` : `<span class="badge-discount">-${discount}%</span>`}
                            </div>
                        </div>
                        <div class="p-5 flex flex-col flex-grow bg-white">
                            <div class="mb-4">
                                <h3 class="font-extrabold text-lg text-gray-950 leading-tight mb-1">${d.title}</h3>
                                <div class="flex items-center gap-2.5 text-gray-400 font-bold text-xs uppercase tracking-tight">
                                    <span>📍 ${d.city}</span>
                                    <span>•</span>
                                    <span>⏰ ${d.time}</span>
                                </div>
                            </div>
                            <div class="mt-auto flex justify-between items-center pt-3 border-t border-gray-100">
                                <div>
                                    <span class="text-xl font-black text-blue-600">₪${d.discountPrice}</span>
                                    <span class="text-xs text-gray-300 line-through mr-1.5 font-bold">₪${d.originalPrice}</span>
                                </div>
                                ${expired ? '' : `<button class="btn-primary px-4 py-1.5 text-xs">תפסתי!</button>`}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.openDeal = (id) => {
            const d = allDeals.find(item => item.id === id);
            // ... (המשך פונקציית openDeal הקודמת) ...
        };

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        loadDeals();
    </script>
</body>
</html>
