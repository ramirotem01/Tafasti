<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תפסתי! | פרימיום ספונטני</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F9FA; --accent: #2563EB; --text-dark: #111827; --wa-green: #25D366; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text-dark); margin: 0; }
        .app-container { width: 94%; max-width: 1300px; margin: 0 auto; padding-bottom: 120px; }

        /* Header ענק */
        .main-header { padding: 30px 0; background: white; border-bottom: 1px solid #f1f1f1; position: sticky; top: 0; z-index: 100; }
        .logo-box { background: var(--accent); color: white; width: 65px; height: 65px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; font-style: italic; }
        .brand-name { font-size: 45px; font-weight: 900; font-style: italic; letter-spacing: -2px; line-height: 0.8; }

        /* כרטיסיות */
        .premium-card { 
            background: #ffffff; border-radius: 24px; overflow: hidden; 
            border: 1px solid #E5E7EB; transition: all 0.4s ease;
            display: flex; flex-direction: column; height: 100%; cursor: pointer;
        }
        .premium-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .card-expired { opacity: 0.6; filter: grayscale(0.8); pointer-events: none; border-style: dashed; }
        
        .deals-grid { display: grid; gap: 25px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .btn-primary { background: var(--accent); color: white; border-radius: 14px; font-weight: 800; }
        .badge-discount { background: #DC2626; color: white; padding: 4px 10px; border-radius: 10px; font-weight: 800; font-size: 13px; position: absolute; top: 15px; left: 15px; }

        @media (max-width: 768px) {
            .nav-dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; background: white; border-radius: 25px; height: 75px; display: flex; justify-content: space-around; align-items: center; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #f0f0f0; }
        }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="app-container flex justify-between items-center">
            <div class="cursor-pointer flex items-center gap-5" onclick="showPage('home')">
                <div class="logo-box">ת</div>
                <h1 class="brand-name">תפסתי<span class="text-blue-600">!</span></h1>
            </div>
            <nav class="hidden md:flex items-center gap-10 font-black text-lg text-gray-500">
                <button onclick="showPage('home')" class="hover:text-blue-600">הדילים</button>
                <button onclick="showPage('search')" class="hover:text-blue-600">חיפוש</button>
                <a href="sup.html" class="btn-primary px-8 py-3.5">כניסת ספקים</a>
            </nav>
        </div>
    </header>

    <div class="app-container">
        <main id="home" class="page active pt-10">
            <h2 class="text-4xl font-black mb-2 text-right">דילים פתוחים</h2>
            <div id="deals-active" class="deals-grid mb-16"></div>

            <h2 class="text-3xl font-black mb-6 text-gray-400 text-right border-t pt-10">דילים שכבר נתפסו</h2>
            <div id="deals-expired" class="deals-grid opacity-70"></div>
        </main>

        <main id="search" class="page pt-12">
            <div class="max-w-3xl mx-auto mb-10 text-center">
                <input type="text" id="searchInput" oninput="runSearch()" placeholder="חפשו עיר או אטרקציה..." class="w-full p-6 rounded-3xl border-4 border-gray-100 outline-none font-bold text-xl transition-all">
            </div>
            <div id="search-results" class="deals-grid"></div>
        </main>

        <main id="deal-view" class="page pt-8">
            <div id="deal-detail-content"></div>
        </main>
    </div>

    <nav class="nav-dock md:hidden">
        <button onclick="showPage('home')" class="flex flex-col items-center"><span class="text-2xl">🏠</span><span class="text-[10px]">ראשי</span></button>
        <button onclick="showPage('search')" class="flex flex-col items-center"><span class="text-2xl">🔍</span><span class="text-[10px]">חיפוש</span></button>
        <a href="sup.html" class="flex flex-col items-center"><span class="text-2xl">🔑</span><span class="text-[10px]">ספקים</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.firebasestorage.app", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allDeals = [];

        // ייצוא פונקציות ל-Window כדי ש-onclick יעבוד
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        };

        window.openDeal = (id) => {
            const d = allDeals.find(item => item.id === id);
            if (!d) return;
            const waLink = `https://wa.me/${d.phone.replace(/\D/g,'')}?text=${encodeURIComponent('היי, אני רוצה לתפוס את הדיל ל'+d.title)}`;
            
            document.getElementById('deal-detail-content').innerHTML = `
                <div class="bg-white p-8 rounded-[40px] shadow-xl text-right max-w-4xl mx-auto border">
                    <button onclick="showPage('home')" class="text-blue-600 font-bold mb-6">← חזרה</button>
                    <img src="${d.imageUrl}" class="w-full h-80 object-cover rounded-3xl mb-8">
                    <h2 class="text-5xl font-black mb-2">${d.title}</h2>
                    <p class="text-gray-400 text-xl mb-6 font-bold">📍 ${d.city} | ⏰ ${d.time}</p>
                    <div class="bg-blue-50 p-6 rounded-2xl mb-8">
                        <span class="text-5xl font-black text-blue-600">₪${d.discountPrice}</span>
                        <span class="text-xl line-through text-gray-300 mr-4">₪${d.originalPrice}</span>
                    </div>
                    <a href="${waLink}" target="_blank" class="block w-full py-6 rounded-2xl text-center text-white text-2xl font-black" style="background-color: var(--wa-green)">תפסתי מקום בווטסאפ</a>
                </div>
            `;
            showPage('deal-view');
        };

        function renderCard(d) {
            const isExpired = d.status !== 'active';
            const discount = Math.round(((d.originalPrice - d.discountPrice) / d.originalPrice) * 100);
            return `
                <div class="premium-card ${isExpired ? 'card-expired' : ''}" onclick="${isExpired ? '' : `openDeal('${d.id}')`}">
                    <div class="relative h-56">
                        <img src="${d.imageUrl}" class="w-full h-full object-cover">
                        ${!isExpired && discount > 0 ? `<div class="badge-discount">-${discount}%</div>` : ''}
                        ${isExpired ? `<div class="absolute inset-0 bg-black/40 flex items-center justify-center text-white font-black text-2xl uppercase">נגמר!</div>` : ''}
                    </div>
                    <div class="p-6 text-right">
                        <h3 class="font-black text-xl mb-1">${d.title}</h3>
                        <p class="text-gray-400 text-sm font-bold mb-4">📍 ${d.city} | ${d.time}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-black text-blue-600">₪${d.discountPrice}</span>
                            <button class="btn-primary px-5 py-2 text-xs">תפסתי!</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.runSearch = () => {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const results = allDeals.filter(d => d.title.toLowerCase().includes(term) || d.city.toLowerCase().includes(term));
            document.getElementById('search-results').innerHTML = results.map(d => renderCard(d)).join('');
        };

        async function loadDeals() {
            const snap = await getDocs(collection(db, "offers"));
            allDeals = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            const activeDiv = document.getElementById('deals-active');
            const expiredDiv = document.getElementById('deals-expired');
            
            activeDiv.innerHTML = allDeals.filter(d => d.status === 'active').map(d => renderCard(d)).join('');
            expiredDiv.innerHTML = allDeals.filter(d => d.status !== 'active').map(d => renderCard(d)).join('');
        }

        loadDeals();
    </script>
</body>
</html>
