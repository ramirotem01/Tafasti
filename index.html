<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תפסתי! | חוויה נקייה וחדשנית</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F9FA; --accent: #2563EB; --text-dark: #111827; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text-dark); margin: 0; }
        
        /* Layout */
        .app-container { width: 92%; max-width: 1300px; margin: 0 auto; padding-bottom: 120px; }

        /* Card Design: White, Sharp, Clean */
        .premium-card { 
            background: #ffffff; border-radius: 24px; overflow: hidden; 
            border: 1px solid #E5E7EB; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; height: 100%;
        }
        .premium-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px -15px rgba(0,0,0,0.1); border-color: var(--accent); }
        
        /* Grid System */
        .deals-grid { display: grid; gap: 32px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

        /* Interactive Elements */
        .btn-primary { background: var(--accent); color: white; border-radius: 16px; font-weight: 800; transition: 0.3s; }
        .btn-primary:active { transform: scale(0.95); opacity: 0.9; }
        
        .badge-discount { background: #DC2626; color: white; padding: 4px 10px; border-radius: 10px; font-weight: 800; font-size: 13px; }

        /* Nav Dock - Mobile Only */
        @media (max-width: 768px) {
            .nav-dock { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-radius: 24px; height: 75px; display: flex; justify-content: space-around; align-items: center; z-index: 100; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        }

        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="py-8 sticky top-0 bg-[#F8F9FA]/90 backdrop-blur-md z-50 border-b border-gray-100">
        <div class="app-container flex justify-between items-center">
            <div class="cursor-pointer" onclick="showPage('home')">
                <h1 class="text-3xl font-black italic tracking-tighter text-blue-600">תפסתי<span class="text-gray-900">!</span></h1>
                <p class="text-[11px] text-gray-400 font-bold uppercase tracking-widest">דילים ספונטניים לילדים</p>
            </div>
            
            <nav class="hidden md:flex items-center gap-10 font-bold">
                <button onclick="showPage('home')" class="hover:text-blue-600 transition">הדילים שלנו</button>
                <button onclick="showPage('search')" class="hover:text-blue-600 transition text-gray-400">חיפוש</button>
                <a href="sup.html" class="btn-primary px-8 py-3 shadow-lg shadow-blue-200">כניסת ספקים</a>
            </nav>
        </div>
    </header>

    <div class="app-container">
        
        <main id="home" class="page active pt-10">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-4xl font-black text-gray-900 leading-none mb-2">תפסו מהר.</h2>
                    <p class="text-gray-500 font-medium">כל האטרקציות שפנויות להיום בצהריים במחירי "תפסתי"</p>
                </div>
            </div>
            
            <div id="deals-list" class="deals-grid">
                <div class="premium-card h-80 animate-pulse bg-gray-200"></div>
                <div class="premium-card h-80 animate-pulse bg-gray-200"></div>
                <div class="premium-card h-80 animate-pulse bg-gray-200"></div>
            </div>
        </main>

        <main id="search" class="page pt-10">
            <div class="max-w-3xl mx-auto text-center mb-16">
                <h2 class="text-5xl font-black mb-8">לאן יוצאים היום?</h2>
                <div class="relative">
                    <input type="text" id="searchInput" oninput="filterDeals()" placeholder="חפשו עיר, אטרקציה או מחיר..." class="w-full p-6 pr-16 rounded-[28px] border-2 border-gray-100 focus:border-blue-500 focus:ring-0 outline-none text-xl font-bold transition-all bg-white shadow-xl shadow-blue-50">
                    <span class="absolute right-6 top-7 text-2xl">🔍</span>
                </div>
            </div>
            <div id="search-results" class="deals-grid"></div>
        </main>

        <main id="deal-view" class="page pt-6">
            <div id="deal-detail-content" class="max-w-5xl mx-auto"></div>
        </main>

    </div>

    <nav class="nav-dock md:hidden">
        <button onclick="showPage('home')" class="flex flex-col items-center gap-1 font-bold text-blue-600">
            <span class="text-2xl">🏠</span><span class="text-[10px]">דילים</span>
        </button>
        <button onclick="showPage('search')" class="flex flex-col items-center gap-1 font-bold text-gray-400">
            <span class="text-2xl">🔍</span><span class="text-[10px]">חיפוש</span>
        </button>
        <a href="sup.html" class="flex flex-col items-center gap-1 font-bold text-gray-400">
            <span class="text-2xl">🔑</span><span class="text-[10px]">ספקים</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.firebasestorage.app", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let allDeals = [];

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        async function loadDeals() {
            const snap = await getDocs(query(collection(db, "offers"), where("status", "==", "active")));
            const list = document.getElementById('deals-list');
            list.innerHTML = '';
            allDeals = [];
            snap.forEach(doc => {
                const d = { id: doc.id, ...doc.data() };
                allDeals.push(d);
                list.innerHTML += renderCard(d);
            });
        }

        function renderCard(d) {
            const discount = Math.round(((d.originalPrice - d.discountPrice) / d.originalPrice) * 100);
            return `
                <div class="premium-card shadow-sm" onclick="openDeal('${d.id}')">
                    <div class="relative h-56 overflow-hidden">
                        <img src="${d.imageUrl}" class="w-full h-full object-cover transition duration-500 hover:scale-105">
                        <div class="absolute top-4 left-4 badge-discount">-${discount}%</div>
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-black text-xl text-gray-900 leading-tight mb-1">${d.title}</h3>
                                <div class="flex items-center gap-2 text-gray-400 font-bold text-xs uppercase">
                                    <span>📍 ${d.city}</span>
                                    <span>•</span>
                                    <span>⏰ ${d.time}</span>
                                </div>
                            </div>
                        </div>
                        <div class="mt-auto flex justify-between items-center pt-4 border-t border-gray-50">
                            <div>
                                <span class="text-2xl font-black text-blue-600">₪${d.discountPrice}</span>
                                <span class="text-xs text-gray-300 line-through mr-2 font-bold">₪${d.originalPrice}</span>
                            </div>
                            <button class="btn-primary px-5 py-2 text-sm">תפסתי!</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.filterDeals = () => {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const results = document.getElementById('search-results');
            const filtered = allDeals.filter(d => d.title.toLowerCase().includes(term) || d.city.toLowerCase().includes(term));
            results.innerHTML = filtered.map(d => renderCard(d)).join('');
        };

        window.openDeal = (id) => {
            const d = allDeals.find(item => item.id === id);
            document.getElementById('deal-detail-content').innerHTML = `
                <div class="flex flex-col md:flex-row gap-12 bg-white p-6 md:p-12 rounded-[40px] shadow-2xl border border-gray-100">
                    <div class="w-full md:w-1/2 h-[500px] rounded-[32px] overflow-hidden shadow-inner">
                        <img src="${d.imageUrl}" class="w-full h-full object-cover">
                    </div>
                    <div class="w-full md:w-1/2 flex flex-col justify-center">
                        <button onclick="showPage('home')" class="mb-6 font-bold text-gray-400 hover:text-gray-900 transition flex items-center gap-2">← חזרה לכל הדילים</button>
                        <h1 class="text-5xl font-black mb-4 leading-tight">${d.title}</h1>
                        <p class="text-gray-400 text-xl font-bold mb-8 italic">📍 ${d.city} • בשעה ${d.time}</p>
                        
                        <div class="flex items-center gap-6 mb-10 p-6 bg-blue-50 rounded-3xl border border-blue-100">
                            <div>
                                <p class="text-[10px] text-blue-400 font-black uppercase tracking-widest mb-1">מחיר תפסתי בלעדי</p>
                                <p class="text-5xl font-black text-blue-600">₪${d.discountPrice}</p>
                            </div>
                            <div class="border-r border-blue-200 pr-6">
                                <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1">במקום</p>
                                <p class="text-2xl line-through text-gray-300 font-bold">₪${d.originalPrice}</p>
                            </div>
                        </div>

                        <p class="text-gray-600 leading-relaxed text-xl mb-12">${d.description || 'אטרקציה מדהימה במחיר של הרגע האחרון. מומלץ להזמין מראש!'}</p>
                        
                        <a href="https://wa.me/${d.phone}" class="btn-primary block w-full py-8 text-center text-2xl shadow-2xl shadow-blue-200 hover:scale-[1.02] transition">שלחו ווטסאפ ותפסו מקום</a>
                    </div>
                </div>
            `;
            showPage('deal-view');
        };

        loadDeals();
    </script>
</body>
</html>
