<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תפסתי! - הדילים הכי חמים עכשיו</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #F9FAFB; }
        .city-tag.active { background-color: #2563EB; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        .deal-card.expired { opacity: 0.6; filter: grayscale(1); pointer-events: none; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b py-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-black text-blue-600 italic tracking-tighter">תפסתי!</h1>
                <div class="flex gap-2">
                    <button onclick="toggleExpired()" id="expBtn" class="text-[10px] font-bold text-gray-400 bg-gray-100 px-3 py-2 rounded-xl">היסטוריית דילים</button>
                    <a href="sup.html" class="text-[10px] font-bold text-white bg-blue-600 px-3 py-2 rounded-xl">ספקים</a>
                </div>
            </div>
            
            <div class="flex flex-col gap-4">
                <input type="text" id="searchInput" placeholder="חפש דיל או מלון..." class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl py-4 px-6 outline-none font-bold focus:border-blue-500 transition-all">
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                    <button onclick="filterBy('הכל')" class="city-tag active px-6 py-3 rounded-2xl font-bold bg-white text-gray-500 border border-gray-100 whitespace-nowrap">הכל</button>
                    <button onclick="filterBy('מרכז')" class="city-tag px-6 py-3 rounded-2xl font-bold bg-white text-gray-500 border border-gray-100 whitespace-nowrap">מרכז</button>
                    <button onclick="filterBy('צפון')" class="city-tag px-6 py-3 rounded-2xl font-bold bg-white text-gray-500 border border-gray-100 whitespace-nowrap">צפון</button>
                    <button onclick="filterBy('דרום')" class="city-tag px-6 py-3 rounded-2xl font-bold bg-white text-gray-500 border border-gray-100 whitespace-nowrap">דרום</button>
                    <button onclick="filterBy('שפלה')" class="city-tag px-6 py-3 rounded-2xl font-bold bg-white text-gray-500 border border-gray-100 whitespace-nowrap">שפלה</button>
                    <button onclick="filterBy('ירושלים')" class="city-tag px-6 py-3 rounded-2xl font-bold bg-white text-gray-500 border border-gray-100 whitespace-nowrap">ירושלים</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div id="deals-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.appspot.com", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDeals = [];
        let showExpired = false;
        let currentFilter = 'הכל';

        async function loadDeals() {
            const q = query(collection(db, "offers"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            allDeals = [];
            snap.forEach(doc => allDeals.push({ id: doc.id, ...doc.data() }));
            render();
        }

        function render() {
            const container = document.getElementById('deals-container');
            const today = new Date().toISOString().split('T')[0];
            container.innerHTML = '';

            let filtered = allDeals.filter(d => {
                const matchSearch = d.title.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase());
                const matchRegion = currentFilter === 'הכל' || d.region === currentFilter;
                const isExpired = d.expiryDate < today;
                
                if(!showExpired && isExpired) return false;
                return matchSearch && matchRegion;
            });

            filtered.forEach(data => {
                const isExpired = data.expiryDate < today;
                const phone = data.phone || "";
                const cleanPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
                const whatsappLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent('היי, אני מעוניין בדיל: ' + data.title)}`;

                container.innerHTML += `
                    <div class="deal-card ${isExpired ? 'expired' : ''} bg-white rounded-[32px] overflow-hidden shadow-sm border border-gray-100 flex flex-col h-full">
                        <div class="relative">
                            <img src="${data.imageUrl}" class="w-full h-52 object-cover" onerror="this.src='https://placehold.co/400x300?text=תפסתי!'">
                            <div class="absolute top-4 right-4 bg-white/90 px-3 py-1 rounded-xl text-[10px] font-black text-blue-600 shadow-sm">${data.region}</div>
                            ${isExpired ? '<div class="absolute inset-0 bg-black/40 flex items-center justify-center text-white font-black text-xl">פג תוקף</div>' : ''}
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <h3 class="text-xl font-black mb-1">${data.title}</h3>
                            <div class="flex justify-between items-end mt-4 mb-6">
                                <div>
                                    <span class="text-2xl font-black text-blue-600">₪${data.discountPrice}</span>
                                    <span class="text-xs text-gray-300 line-through mr-1 font-bold">₪${data.originalPrice}</span>
                                </div>
                                <div class="text-[9px] font-black ${isExpired ? 'text-gray-400' : 'text-red-500 animate-pulse'}">עד: ${data.time}</div>
                            </div>
                            <a href="${isExpired ? '#' : whatsappLink}" target="_blank" 
                               class="w-full py-4 rounded-2xl font-black text-center transition-all ${isExpired ? 'bg-gray-200 text-gray-400' : 'bg-[#25D366] text-white shadow-lg shadow-green-100'}">
                               ${isExpired ? 'הדיל נגמר' : 'תפסתי בוואטסאפ!'}
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        window.filterBy = (region) => {
            currentFilter = region;
            document.querySelectorAll('.city-tag').forEach(b => b.classList.toggle('active', b.innerText === region));
            render();
        };

        window.toggleExpired = () => {
            showExpired = !showExpired;
            document.getElementById('expBtn').innerText = showExpired ? 'חזור לדילים פעילים' : 'היסטוריית דילים';
            render();
        };

        document.getElementById('searchInput').addEventListener('input', render);
        loadDeals();
    </script>
</body>
</html>
