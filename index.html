<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תפסתי! | חוויה נקייה ומהירה</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F9FAFB; --accent: #2563EB; --text-dark: #111827; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text-dark); margin: 0; -webkit-tap-highlight-color: transparent; }
        
        .app-container { width: 92%; max-width: 1200px; margin: 0 auto; padding-bottom: 100px; }

        /* כרטיסייה משופרת */
        .premium-card { 
            background: #ffffff; border-radius: 24px; overflow: hidden; 
            border: 1px solid #F3F4F6; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; height: 100%; position: relative;
        }
        .premium-card.expired { opacity: 0.6; filter: grayscale(1); cursor: not-allowed; }
        .premium-card:not(.expired):active { transform: scale(0.98); }
        
        @media (min-width: 768px) {
            .premium-card:not(.expired):hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: var(--accent); }
        }

        .deals-grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        
        .btn-primary { background: var(--accent); color: white; border-radius: 14px; font-weight: 800; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .badge-discount { background: #EF4444; color: white; padding: 4px 10px; border-radius: 10px; font-weight: 800; font-size: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .badge-expired { background: #9CA3AF; color: white; padding: 4px 10px; border-radius: 10px; font-weight: 800; font-size: 12px; }

        /* פילטרים */
        .filter-btn { padding: 8px 20px; border-radius: 12px; font-weight: 700; font-size: 14px; transition: 0.3s; background: transparent; color: #6B7280; }
        .filter-btn.active { background: white; color: var(--accent); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

        /* ניווט מובייל */
        @media (max-width: 768px) {
            .nav-dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border-radius: 24px; height: 70px; display: flex; justify-content: space-around; align-items: center; z-index: 100; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
            .nav-dock button.active { color: var(--accent); }
            .nav-dock button.active span:first-child { transform: translateY(-2px); }
        }

        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* חיפוש */
        .search-container { position: sticky; top: 80px; z-index: 40; background: var(--bg); padding: 10px 0; }
    </style>
</head>
<body>

    <header class="py-4 sticky top-0 bg-white/80 backdrop-blur-lg z-50 border-b border-gray-100">
        <div class="app-container flex justify-between items-center">
            <div class="cursor-pointer flex items-center gap-3" onclick="showPage('home')">
                <div class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center text-xl font-black italic shadow-lg shadow-blue-200">ת</div>
                <div>
                    <h1 class="text-2xl font-black italic text-gray-950 leading-none">תפסתי<span class="text-blue-600">!</span></h1>
                    <p class="text-[10px] text-gray-400 font-extrabold uppercase tracking-widest">FLASH DEALS</p>
                </div>
            </div>
            
            <nav class="hidden md:flex items-center gap-8 font-bold text-sm text-gray-500">
                <button onclick="showPage('home')" class="hover:text-blue-600 transition">דילים חמים</button>
                <button onclick="showPage('search')" class="hover:text-blue-600 transition">חיפוש אטרקציה</button>
                <a href="sup.html" class="bg-gray-900 text-white px-6 py-2.5 rounded-xl hover:bg-blue-600 transition shadow-lg shadow-gray-200">לספקים</a>
            </nav>
        </div>
    </header>

    <div class="app-container">
        
        <main id="home" class="page active pt-8">
            <div class="flex flex-col md:flex-row justify-between items-end mb-8 gap-6">
                <div>
                    <h2 class="text-4xl font-black text-gray-900 leading-tight mb-2">תפסו מהר.</h2>
                    <p class="text-gray-500 font-semibold italic">כל האטרקציות הכי שוות מהרגע להרגע</p>
                </div>
                <div class="flex gap-1 bg-gray-100/80 p-1.5 rounded-2xl w-full md:w-auto">
                    <button id="filter-active" onclick="setFilter('active')" class="filter-btn active flex-1 md:flex-none">זמינים עכשיו</button>
                    <button id="filter-all" onclick="setFilter('all')" class="filter-btn flex-1 md:flex-none">כל הדילים</button>
                </div>
            </div>
            
            <div id="deals-list" class="deals-grid">
                <div class="premium-card h-80 animate-pulse bg-gray-200"></div>
                <div class="premium-card h-80 animate-pulse bg-gray-200"></div>
                <div class="premium-card h-80 animate-pulse bg-gray-200"></div>
            </div>
        </main>

        <main id="search" class="page pt-8">
            <div class="max-w-2xl mx-auto mb-10">
                <div class="relative">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
                    <input type="text" id="searchInput" oninput="filterDeals()" placeholder="חפשו עיר, סוג אטרקציה או שם עסק..." 
                           class="w-full p-5 pr-12 rounded-2xl border-2 border-transparent bg-white shadow-xl focus:border-blue-500 focus:bg-white outline-none font-bold text-lg transition-all">
                </div>
            </div>
            <div id="search-results" class="deals-grid">
                <div class="col-span-full text-center py-20 text-gray-400 font-bold">הקלידו כדי למצוא את הדיל הבא שלכם...</div>
            </div>
        </main>

        <main id="deal-view" class="page pt-6">
            <div id="deal-detail-content" class="max-w-5xl mx-auto"></div>
        </main>

    </div>

    <nav class="nav-dock md:hidden">
        <button onclick="showPage('home')" id="nav-home" class="active flex flex-col items-center gap-1 transition-all">
            <span class="text-2xl">🔥</span><span class="text-[10px] font-bold">דילים</span>
        </button>
        <button onclick="showPage('search')" id="nav-search" class="flex flex-col items-center gap-1 text-gray-400 transition-all">
            <span class="text-2xl">🔍</span><span class="text-[10px] font-bold">חיפוש</span>
        </button>
        <a href="sup.html" class="flex flex-col items-center gap-1 text-gray-400">
            <span class="text-2xl">⚡</span><span class="text-[10px] font-bold">ספקים</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.firebasestorage.app", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let allDeals = [];
        let currentFilter = 'active';

        // בדיקת תוקף
        function isDealExpired(dealTime) {
            try {
                const now = new Date();
                const [hours, minutes] = dealTime.split(':').map(Number);
                const dealDate = new Date();
                dealDate.setHours(hours, minutes, 0, 0);
                return now > new Date(dealDate.getTime() + 45 * 60000); // 45 דקות חסד
            } catch (e) { return false; }
        }

        // יצירת HTML לכרטיסייה (שימוש חוזר)
        function createDealCard(d) {
            const expired = isDealExpired(d.time);
            const discount = Math.round(((d.originalPrice - d.discountPrice) / d.originalPrice) * 100);
            
            return `
                <div class="premium-card ${expired ? 'expired' : ''}" onclick="${expired ? '' : `openDeal('${d.id}')`}">
                    <div class="relative h-52 overflow-hidden">
                        <img src="${d.imageUrl}" class="w-full h-full object-cover transform hover:scale-105 transition-transform duration-700" loading="lazy">
                        <div class="absolute top-3 left-3 flex flex-col gap-2">
                            ${expired ? `<span class="badge-expired">הסתיים</span>` : `<span class="badge-discount">${discount}%-</span>`}
                        </div>
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-black text-gray-900 text-lg leading-tight">${d.title}</h3>
                        </div>
                        <div class="flex items-center gap-3 text-gray-500 font-bold text-xs mb-4">
                            <span class="flex items-center gap-1">📍 ${d.city}</span>
                            <span class="text-gray-300">•</span>
                            <span class="flex items-center gap-1">⏰ ${d.time}</span>
                        </div>
                        <div class="mt-auto flex justify-between items-center border-t border-gray-50 pt-4">
                            <div>
                                <div class="text-[10px] text-gray-400 font-bold line-through leading-none">₪${d.originalPrice}</div>
                                <div class="text-2xl font-black text-blue-600 leading-none">₪${d.discountPrice}</div>
                            </div>
                            ${expired ? '' : `<button class="btn-primary px-5 py-2 text-xs">תפסתי!</button>`}
                        </div>
                    </div>
                </div>
            `;
        }

        window.setFilter = (type) => {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`filter-${type}`).classList.add('active');
            renderDeals();
        };

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // עדכון ניווט מובייל
            document.querySelectorAll('.nav-dock button').forEach(b => {
                b.classList.remove('active', 'text-blue-600');
                b.classList.add('text-gray-400');
            });
            const activeBtn = document.getElementById(`nav-${id}`);
            if(activeBtn) {
                activeBtn.classList.add('active', 'text-blue-600');
                activeBtn.classList.remove('text-gray-400');
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        async function loadDeals() {
            try {
                const snap = await getDocs(query(collection(db, "offers"), where("status", "==", "active")));
                allDeals = [];
                snap.forEach(doc => allDeals.push({ id: doc.id, ...doc.data() }));
                allDeals.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderDeals();
            } catch (err) { 
                console.error("Error:", err);
                document.getElementById('deals-list').innerHTML = '<p class="col-span-full text-center py-10">תקלה בטעינת הנתונים. נסו שוב מאוחר יותר.</p>';
            }
        }

        function renderDeals() {
            const list = document.getElementById('deals-list');
            const filtered = allDeals.filter(d => currentFilter === 'active' ? !isDealExpired(d.time) : true);
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400 font-bold">אין דילים זמינים כרגע... שווה לחזור עוד מעט!</div>';
                return;
            }
            list.innerHTML = filtered.map(d => createDealCard(d)).join('');
        }

        window.openDeal = (id) => {
            const d = allDeals.find(item => item.id === id);
            document.getElementById('deal-detail-content').innerHTML = `
                <div class="bg-white rounded-[32px] overflow-hidden shadow-2xl border border-gray-100 flex flex-col md:flex-row p-4 md:p-10 gap-8 mb-10">
                    <div class="w-full md:w-1/2 relative">
                        <img src="${d.imageUrl}" class="w-full h-72 md:h-[500px] object-cover rounded-2xl shadow-lg">
                        <button onclick="showPage('home')" class="absolute top-4 right-4 bg-white/90 backdrop-blur-md px-4 py-2 rounded-xl font-bold text-sm shadow-sm hover:bg-white transition">✕ סגור</button>
                    </div>
                    <div class="flex flex-col justify-center flex-1">
                        <div class="inline-block bg-blue-50 text-blue-600 text-[11px] font-black px-3 py-1 rounded-full w-fit mb-4 uppercase tracking-wider">דיל חם להיום</div>
                        <h2 class="text-4xl font-black mb-3 text-gray-950">${d.title}</h2>
                        <p class="text-gray-500 font-bold text-lg mb-6 flex items-center gap-2"><span>📍 ${d.city}</span> <span>•</span> <span>⏰ שעה ${d.time}</span></p>
                        
                        <div class="flex items-center gap-6 mb-8 bg-gray-50 p-6 rounded-3xl border border-gray-100">
                            <div>
                                <p class="text-xs text-gray-400 font-bold mb-1 uppercase">במקום ₪${d.originalPrice}</p>
                                <span class="text-5xl font-black text-blue-600 tracking-tighter">₪${d.discountPrice}</span>
                            </div>
                            <div class="h-12 w-[1px] bg-gray-200"></div>
                            <div class="text-green-600 font-bold">
                                חיסכון של<br>₪${d.originalPrice - d.discountPrice}
                            </div>
                        </div>

                        <p class="text-gray-600 mb-10 text-lg leading-relaxed">${d.description || 'מהרו לתפוס! המקומות מוגבלים והמחיר תקף להזמנה בשעה הקרובה בלבד.'}</p>
                        
                        <a href="https://wa.me/${d.phone}?text=${encodeURIComponent('היי, אשמח לתפוס את הדיל ל'+d.title+' ב'+d.city)}" 
                           class="btn-primary w-full py-5 text-xl shadow-xl shadow-blue-200 hover:shadow-blue-300 transform active:scale-[0.98]">
                           תפסתי מקום בווטסאפ
                        </a>
                        <p class="text-center text-gray-400 text-xs mt-4 font-medium italic">התשלום מול בית העסק • בכפוף לזמינות</p>
                    </div>
                </div>
            `;
            showPage('deal-view');
        };

        window.filterDeals = () => {
            const term = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsContainer = document.getElementById('search-results');
            
            if (term.length < 2) {
                resultsContainer.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400 font-bold">הקלידו לפחות 2 אותיות לחיפוש...</div>';
                return;
            }

            const filtered = allDeals.filter(d => 
                d.title.toLowerCase().includes(term) || 
                d.city.toLowerCase().includes(term) ||
                (d.description && d.description.toLowerCase().includes(term))
            );

            if (filtered.length === 0) {
                resultsContainer.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400 font-bold">לא מצאנו דיל כזה... נסו עיר אחרת?</div>';
            } else {
                resultsContainer.innerHTML = filtered.map(d => createDealCard(d)).join('');
            }
        };

        // אתחול ראשוני
        loadDeals();
    </script>
</body>
</html>
