<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תפסתי! - הדילים הכי חמים עכשיו</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #F9FAFB; }
        .city-tag.active { background-color: #2563EB; color: white; border-color: #2563EB; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        .deal-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .deal-card:hover { transform: translateY(-8px); shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 15px; backdrop-blur: 8px; }
        .modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <div id="dealModal" class="modal" onclick="closeModal()">
        <div class="bg-white w-full max-w-xl rounded-[40px] overflow-hidden shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 left-6 bg-white/90 w-10 h-10 rounded-full flex items-center justify-center font-bold shadow-lg z-10">✕</button>
            <img id="modalImg" src="" class="w-full h-64 object-cover">
            <div class="p-8">
                <div id="modalRegion" class="text-blue-600 font-black text-xs uppercase mb-2"></div>
                <h2 id="modalTitle" class="text-3xl font-black mb-4 text-gray-900 leading-tight"></h2>
                <p id="modalDesc" class="text-gray-500 leading-relaxed font-medium mb-8 bg-gray-50 p-4 rounded-2xl border border-gray-100"></p>
                <div id="modalAction"></div>
            </div>
        </div>
    </div>

    <header class="bg-white border-b py-8 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-between items-center mb-8 gap-4">
                <h1 class="text-4xl font-black text-blue-600 italic tracking-tighter">תפסתי!</h1>
                <div class="flex gap-3">
                    <button onclick="toggleExpired()" id="expBtn" class="px-8 py-4 rounded-2xl font-black text-base bg-gray-100 text-gray-500 hover:bg-gray-200 transition-all">היסטוריית דילים</button>
                    <a href="sup.html" class="px-8 py-4 rounded-2xl font-black text-base bg-blue-600 text-white shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">אזור ספקים</a>
                </div>
            </div>
            
            <div class="flex flex-col gap-6">
                <input type="text" id="searchInput" placeholder="🔍 חפש עיר, מלון או דיל..." class="w-full bg-gray-50 border-2 border-gray-100 rounded-3xl py-5 px-8 outline-none font-bold focus:border-blue-500 transition-all text-lg shadow-inner">
                <div class="flex gap-3 overflow-x-auto no-scrollbar py-2">
                    <button onclick="filterBy('הכל')" class="city-tag active px-10 py-5 rounded-2xl font-black bg-white text-gray-500 border-2 border-gray-100 whitespace-nowrap text-lg">הכל</button>
                    <button onclick="filterBy('מרכז')" class="city-tag px-10 py-5 rounded-2xl font-black bg-white text-gray-500 border-2 border-gray-100 whitespace-nowrap text-lg">מרכז</button>
                    <button onclick="filterBy('צפון')" class="city-tag px-10 py-5 rounded-2xl font-black bg-white text-gray-500 border-2 border-gray-100 whitespace-nowrap text-lg">צפון</button>
                    <button onclick="filterBy('דרום')" class="city-tag px-10 py-5 rounded-2xl font-black bg-white text-gray-500 border-2 border-gray-100 whitespace-nowrap text-lg">דרום</button>
                    <button onclick="filterBy('השרון')" class="city-tag px-10 py-5 rounded-2xl font-black bg-white text-gray-500 border-2 border-gray-100 whitespace-nowrap text-lg">השרון</button>
                    <button onclick="filterBy('שפלה')" class="city-tag px-10 py-5 rounded-2xl font-black bg-white text-gray-500 border-2 border-gray-100 whitespace-nowrap text-lg">שפלה</button>
                    <button onclick="filterBy('ירושלים')" class="city-tag px-10 py-5 rounded-2xl font-black bg-white text-gray-500 border-2 border-gray-100 whitespace-nowrap text-lg">ירושלים</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div id="deals-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.appspot.com", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDeals = [];
        let showExpired = false;
        let currentFilter = 'הכל';

        async function loadDeals() {
            const q = query(collection(db, "offers"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            allDeals = [];
            snap.forEach(doc => allDeals.push({ id: doc.id, ...doc.data() }));
            render();
        }

        window.openDeal = (id) => {
            const deal = allDeals.find(d => d.id === id);
            document.getElementById('modalImg').src = deal.imageUrl;
            document.getElementById('modalTitle').innerText = deal.title;
            document.getElementById('modalRegion').innerText = deal.region;
            document.getElementById('modalDesc').innerText = deal.description || "אין תיאור נוסף לדיל זה.";
            
            const today = new Date().toISOString().split('T')[0];
            const isExpired = deal.expiryDate < today;
            const phone = deal.phone || "";
            const cleanPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
            const whatsappLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent('היי, אני מעוניין בדיל: ' + deal.title)}`;

            document.getElementById('modalAction').innerHTML = `
                <a href="${isExpired ? '#' : whatsappLink}" target="_blank" 
                   class="flex items-center justify-center gap-3 w-full py-5 rounded-3xl font-black text-xl shadow-xl transition-all ${isExpired ? 'bg-gray-200 text-gray-400' : 'bg-[#25D366] text-white shadow-green-100'}">
                   ${isExpired ? 'הדיל נגמר' : 'תפסתי בוואטסאפ!'}
                </a>
            `;
            document.getElementById('dealModal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('dealModal').classList.remove('active');

        function render() {
            const container = document.getElementById('deals-container');
            const today = new Date().toISOString().split('T')[0];
            container.innerHTML = '';

            let filtered = allDeals.filter(d => {
                const matchSearch = d.title.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase());
                const matchRegion = currentFilter === 'הכל' || d.region === currentFilter;
                if(!showExpired && d.expiryDate < today) return false;
                return matchSearch && matchRegion;
            });

            filtered.forEach(data => {
                const isExpired = data.expiryDate < today;
                const phone = data.phone || "";
                const cleanPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
                const whatsappLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent('היי, אני מעוניין בדיל: ' + data.title)}`;

                container.innerHTML += `
                    <div class="deal-card ${isExpired ? 'opacity-60 grayscale' : ''} bg-white rounded-[40px] overflow-hidden shadow-sm border border-gray-100 flex flex-col h-full relative" onclick="openDeal('${data.id}')">
                        <div class="relative">
                            <img src="${data.imageUrl}" class="w-full h-64 object-cover">
                            <div class="absolute top-5 right-5 bg-white/95 px-4 py-2 rounded-2xl text-xs font-black text-blue-600 shadow-sm border border-blue-50">${data.region}</div>
                        </div>
                        <div class="p-8 flex flex-col flex-grow">
                            <h3 class="text-2xl font-black mb-4 text-gray-900 leading-tight">${data.title}</h3>
                            <div class="flex justify-between items-end mb-8 bg-blue-50/50 p-5 rounded-3xl border border-blue-50">
                                <div>
                                    <p class="text-[10px] text-blue-400 font-bold uppercase mb-1">מחיר תפסתי</p>
                                    <span class="text-3xl font-black text-blue-600 tracking-tighter">₪${data.discountPrice}</span>
                                    <span class="text-sm text-gray-300 line-through mr-1 font-bold">₪${data.originalPrice}</span>
                                </div>
                                <div class="text-[10px] font-black text-white bg-red-500 px-3 py-2 rounded-xl shadow-lg shadow-red-100 animate-pulse">עד: ${data.time}</div>
                            </div>
                            <a href="${isExpired ? '#' : whatsappLink}" target="_blank" onclick="event.stopPropagation()"
                               class="flex items-center justify-center gap-3 w-full ${isExpired ? 'bg-gray-200 text-gray-400' : 'bg-[#25D366] text-white shadow-xl shadow-green-100'} py-5 rounded-3xl font-black text-lg transition-all active:scale-95">
                               <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
                               <span>תפסתי בוואטסאפ!</span>
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        window.filterBy = (region) => {
            currentFilter = region;
            document.querySelectorAll('.city-tag').forEach(b => b.classList.toggle('active', b.innerText === region));
            render();
        };

        window.toggleExpired = () => {
            showExpired = !showExpired;
            document.getElementById('expBtn').innerText = showExpired ? 'חזרה לדילים פעילים' : 'היסטוריית דילים';
            render();
        };

        document.getElementById('searchInput').addEventListener('input', render);
        loadDeals();
    </script>
</body>
</html>
