<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תפסתי! - הדילים הכי חמים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #F9FAFB; }
        .city-tag.active { background-color: #2563EB; color: white; border-color: #2563EB; }
        .deal-card { transition: all 0.2s ease; cursor: pointer; }
        .deal-card:hover { transform: translateY(-3px); }
        .modal { display: none; position: fixed; inset: 0; background: white; z-index: 1000; flex-direction: column; overflow-y: auto; }
        @media (min-width: 768px) {
            .modal { background: rgba(0,0,0,0.8); padding: 40px; justify-content: center; align-items: center; }
            .modal-content { max-width: 600px; border-radius: 32px; max-height: 90vh; }
        }
        .modal.active { display: flex; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <div id="dealModal" class="modal" onclick="closeModal()">
        <div class="modal-content bg-white w-full h-full md:h-auto overflow-y-auto relative shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="fixed top-5 left-5 bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold z-50 backdrop-blur-md">✕</button>
            <img id="modalImg" src="" class="w-full h-72 md:h-80 object-cover">
            <div class="p-6 md:p-10">
                <div class="mb-6">
                    <span id="modalRegion" class="inline-block bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-xs font-black mb-3"></span>
                    <h2 id="modalTitle" class="text-3xl font-black text-gray-900 leading-tight"></h2>
                </div>
                <div class="flex items-center justify-between gap-4 mb-8 bg-gray-50 p-6 rounded-[24px] border border-gray-100">
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">מחיר בלעדי</p>
                        <div class="flex items-baseline gap-2">
                            <span id="modalDisc" class="text-4xl font-black text-blue-600 tracking-tighter"></span>
                            <span id="modalOrig" class="text-base text-gray-300 line-through font-bold"></span>
                        </div>
                    </div>
                    <div class="text-left border-r border-gray-200 pr-5">
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">זמן מוגבל</p>
                        <span id="modalTime" class="text-xl font-black text-red-500 italic block"></span>
                        <span id="modalDate" class="text-[11px] text-gray-400 font-bold"></span>
                    </div>
                </div>
                <div class="mb-10">
                    <h4 class="font-bold text-gray-900 mb-4 text-xl">פרטי ההצעה:</h4>
                    <p id="modalDesc" class="text-gray-600 leading-relaxed font-medium text-lg whitespace-pre-line"></p>
                </div>
                <div id="modalAction" class="sticky bottom-0 bg-white pt-4 pb-2"></div>
            </div>
        </div>
    </div>

    <header class="bg-white border-b py-5 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-5">
            <div class="flex justify-between items-center mb-5">
                <h1 class="text-2xl font-black text-blue-600 italic">תפסתי!</h1>
                <div class="flex gap-2">
                    <button onclick="toggleExpired()" id="expBtn" class="px-4 py-2 rounded-xl font-bold text-[11px] bg-gray-100 text-gray-500 transition-colors">היסטוריית דילים</button>
                    <a href="sup.html" class="px-4 py-2 rounded-xl font-bold text-[11px] bg-blue-600 text-white shadow-sm">ספקים</a>
                </div>
            </div>
            
            <div class="flex flex-col gap-4">
                <input type="text" id="searchInput" placeholder="חיפוש חופשי..." class="w-full bg-gray-100 border-none rounded-2xl py-3 px-5 outline-none font-bold focus:ring-2 focus:ring-blue-500 transition-all text-sm">
                <div class="flex gap-2 overflow-x-auto no-scrollbar">
                    <button onclick="filterBy('הכל')" class="city-tag active px-4 py-2 rounded-lg font-bold bg-white text-gray-400 border border-gray-100 whitespace-nowrap text-xs">הכל</button>
                    <button onclick="filterBy('מרכז')" class="city-tag px-4 py-2 rounded-lg font-bold bg-white text-gray-400 border border-gray-100 whitespace-nowrap text-xs">מרכז</button>
                    <button onclick="filterBy('צפון')" class="city-tag px-4 py-2 rounded-lg font-bold bg-white text-gray-400 border border-gray-100 whitespace-nowrap text-xs">צפון</button>
                    <button onclick="filterBy('דרום')" class="city-tag px-4 py-2 rounded-lg font-bold bg-white text-gray-400 border border-gray-100 whitespace-nowrap text-xs">דרום</button>
                    <button onclick="filterBy('השרון')" class="city-tag px-4 py-2 rounded-lg font-bold bg-white text-gray-400 border border-gray-100 whitespace-nowrap text-xs">השרון</button>
                    <button onclick="filterBy('שפלה')" class="city-tag px-4 py-2 rounded-lg font-bold bg-white text-gray-400 border border-gray-100 whitespace-nowrap text-xs">שפלה</button>
                    <button onclick="filterBy('ירושלים')" class="city-tag px-4 py-2 rounded-lg font-bold bg-white text-gray-400 border border-gray-100 whitespace-nowrap text-xs">ירושלים</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-5">
        <div id="deals-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.appspot.com", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDeals = [];
        let showExpired = false;
        let currentFilter = 'הכל';

        async function loadDeals() {
            const q = query(collection(db, "offers"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            allDeals = [];
            snap.forEach(doc => allDeals.push({ id: doc.id, ...doc.data() }));
            render();
        }

        window.openDeal = (id) => {
            const deal = allDeals.find(d => d.id === id);
            document.getElementById('modalImg').src = deal.imageUrl;
            document.getElementById('modalTitle').innerText = deal.title;
            document.getElementById('modalRegion').innerText = deal.region;
            document.getElementById('modalDisc').innerText = '₪' + deal.discountPrice;
            document.getElementById('modalOrig').innerText = '₪' + deal.originalPrice;
            document.getElementById('modalTime').innerText = deal.time || "--:--";
            document.getElementById('modalDate').innerText = "תוקף: " + (deal.expiryDate || "");
            document.getElementById('modalDesc').innerText = deal.description || "";
            
            const today = new Date().toISOString().split('T')[0];
            const isExpired = deal.expiryDate < today;
            const phone = deal.phone || "";
            const cleanPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
            const whatsappLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent('היי, אני מעוניין בדיל: ' + deal.title)}`;

            document.getElementById('modalAction').innerHTML = `
                <a href="${isExpired ? '#' : whatsappLink}" target="_blank" 
                   class="flex items-center justify-center gap-3 w-full py-5 rounded-[20px] font-black text-xl shadow-xl transition-all ${isExpired ? 'bg-gray-100 text-gray-300' : 'bg-[#25D366] text-white'}">
                   ${isExpired ? 'הדיל הסתיים' : 'תפסתי בוואטסאפ!'}
                </a>
            `;
            document.getElementById('dealModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            document.getElementById('dealModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        function render() {
            const container = document.getElementById('deals-container');
            const today = new Date().toISOString().split('T')[0];
            container.innerHTML = '';

            let filtered = allDeals.filter(d => {
                const matchSearch = d.title.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase());
                const matchRegion = currentFilter === 'הכל' || d.region === currentFilter;
                
                // לוגיקת ההפרדה:
                if (showExpired) {
                    // אם אנחנו במצב היסטוריה - הצג רק את מה שעבר זמנו
                    return matchSearch && matchRegion && d.expiryDate < today;
                } else {
                    // אם אנחנו במצב רגיל - הצג רק את מה שבתוקף (היום ומעלה)
                    return matchSearch && matchRegion && d.expiryDate >= today;
                }
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400 font-bold">לא נמצאו דילים ${showExpired ? 'בהיסטוריה' : 'פעילים'} כרגע...</div>`;
                return;
            }

            filtered.forEach(data => {
                const isExpired = data.expiryDate < today;
                const phone = data.phone || "";
                const cleanPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
                const whatsappLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent('היי, אני מעוניין בדיל: ' + data.title)}`;

                container.innerHTML += `
                    <div class="deal-card ${isExpired ? 'opacity-60' : ''} bg-white rounded-[24px] overflow-hidden shadow-sm border border-gray-100 flex flex-col relative" onclick="openDeal('${data.id}')">
                        <div class="relative h-44">
                            <img src="${data.imageUrl}" class="w-full h-full object-cover">
                            <div class="absolute top-3 right-3 bg-white/90 px-2.5 py-1 rounded-lg text-[9px] font-black text-blue-600">${data.region}</div>
                        </div>
                        <div class="p-4 flex flex-grow flex-col">
                            <h3 class="text-md font-bold text-gray-900 leading-tight mb-3 line-clamp-2">${data.title}</h3>
                            <div class="flex justify-between items-end mb-4">
                                <div>
                                    <span class="text-xl font-black text-blue-600">₪${data.discountPrice}</span>
                                    <span class="text-[10px] text-gray-300 line-through mr-1 font-bold">₪${data.originalPrice}</span>
                                </div>
                                <div class="text-[9px] font-bold text-red-500 bg-red-50 px-2 py-1 rounded-md">עד: ${data.time}</div>
                            </div>
                            <a href="${isExpired ? '#' : whatsappLink}" target="_blank" onclick="event.stopPropagation()"
                               class="flex items-center justify-center gap-2 w-full ${isExpired ? 'bg-gray-100 text-gray-300' : 'bg-[#25D366] text-white'} py-3 rounded-xl font-black text-xs transition-all active:scale-95">
                               <span>${isExpired ? 'הדיל הסתיים' : 'תפסתי בוואטסאפ!'}</span>
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        window.filterBy = (region) => {
            currentFilter = region;
            document.querySelectorAll('.city-tag').forEach(b => {
                b.classList.toggle('active', b.innerText === region);
                b.classList.toggle('text-gray-400', b.innerText !== region);
            });
            render();
        };

        window.toggleExpired = () => {
            showExpired = !showExpired;
            const btn = document.getElementById('expBtn');
            if (showExpired) {
                btn.innerText = 'חזרה לדילים פעילים';
                btn.classList.replace('bg-gray-100', 'bg-blue-100');
                btn.classList.replace('text-gray-500', 'text-blue-600');
            } else {
                btn.innerText = 'היסטוריית דילים';
                btn.classList.replace('bg-blue-100', 'bg-gray-100');
                btn.classList.replace('text-blue-600', 'text-gray-500');
            }
            render();
        };

        document.getElementById('searchInput').addEventListener('input', render);
        loadDeals();
    </script>
</body>
</html>
