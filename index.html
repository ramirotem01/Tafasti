<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תפסתי! - הדילים הכי חמים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #F9FAFB; }
        .city-tag.active { background-color: #2563EB; color: white; border-color: #2563EB; transform: scale(1.05); }
        .deal-card { transition: all 0.2s ease; cursor: pointer; }
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.7); z-index: 1000; 
            align-items: center; justify-content: center; padding: 20px;
            backdrop-blur: 4px;
        }
        .modal.active { display: flex; animation: fadeIn 0.2s ease; }
        .modal-content { 
            background: white; width: 100%; max-width: 450px; 
            border-radius: 28px; overflow: hidden; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10 text-right">

    <div id="dealModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 left-4 bg-white/90 hover:bg-white text-gray-900 w-11 h-11 rounded-full flex items-center justify-center font-bold z-50 shadow-md text-xl">✕</button>
            <img id="modalImg" src="" class="w-full h-60 object-cover">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="modalTitle" class="text-2xl font-extrabold text-gray-900 leading-tight"></h2>
                    <span id="modalRegion" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-xs font-black mr-2 uppercase"></span>
                </div>
                <div class="bg-gray-50 rounded-2xl p-5 mb-6 flex justify-between items-center border border-gray-100">
                    <div class="text-right">
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">מחיר דיל</p>
                        <span id="modalDisc" class="text-3xl font-black text-blue-600 tracking-tighter"></span>
                        <span id="modalOrig" class="text-sm text-gray-300 line-through mr-1 font-bold"></span>
                    </div>
                    <div class="text-left border-r pr-4 border-gray-200">
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">תוקף</p>
                        <span id="modalTime" class="text-xl font-black text-red-500 block"></span>
                        <span id="modalDate" class="text-[11px] text-gray-400 font-bold"></span>
                    </div>
                </div>
                <div class="max-h-40 overflow-y-auto no-scrollbar mb-6">
                    <p id="modalDesc" class="text-gray-600 text-lg leading-relaxed font-medium whitespace-pre-line"></p>
                </div>
                <div id="modalAction"></div>
            </div>
        </div>
    </div>

    <header class="bg-white border-b py-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-5">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-black text-blue-600 italic tracking-tighter uppercase">תפסתי!</h1>
                <div class="flex gap-3">
                    <button onclick="toggleExpired()" id="expBtn" class="px-5 py-3 rounded-2xl font-black text-xs bg-gray-100 text-gray-500 transition-all border border-transparent shadow-sm">היסטוריית דילים</button>
                    <a href="sup.html" class="px-5 py-3 rounded-2xl font-black text-xs bg-blue-600 text-white shadow-md text-center">ספקים</a>
                </div>
            </div>
            
            <div class="relative mb-8">
                <input type="text" id="searchInput" placeholder="מה בא לך לתפוס היום?..." 
                       class="w-full h-[72px] bg-white border-4 border-gray-100 rounded-[28px] px-10 outline-none font-extrabold focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all shadow-xl text-gray-800 text-xl text-right placeholder-gray-300">
                <div class="absolute left-8 top-1/2 -translate-y-1/2 text-blue-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
            </div>
            
            <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                <button onclick="filterBy('הכל')" class="city-tag active px-8 py-4 rounded-2xl font-black bg-white text-gray-400 border border-gray-200 whitespace-nowrap text-sm shadow-sm transition-all">הכל</button>
                <button onclick="filterBy('מרכז')" class="city-tag px-8 py-4 rounded-2xl font-black bg-white text-gray-400 border border-gray-200 whitespace-nowrap text-sm shadow-sm transition-all">מרכז</button>
                <button onclick="filterBy('צפון')" class="city-tag px-8 py-4 rounded-2xl font-black bg-white text-gray-400 border border-gray-200 whitespace-nowrap text-sm shadow-sm transition-all">צפון</button>
                <button onclick="filterBy('דרום')" class="city-tag px-8 py-4 rounded-2xl font-black bg-white text-gray-400 border border-gray-200 whitespace-nowrap text-sm shadow-sm transition-all">דרום</button>
                <button onclick="filterBy('השרון')" class="city-tag px-8 py-4 rounded-2xl font-black bg-white text-gray-400 border border-gray-200 whitespace-nowrap text-sm shadow-sm transition-all">השרון</button>
                <button onclick="filterBy('ירושלים')" class="city-tag px-8 py-4 rounded-2xl font-black bg-white text-gray-400 border border-gray-200 whitespace-nowrap text-sm shadow-sm transition-all">ירושלים</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-5">
        <div id="deals-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.appspot.com", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDeals = [];
        let showExpired = false;
        let currentFilter = 'הכל';

        const whatsappIcon = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 .018 5.393 0 12.03a11.782 11.782 0 001.591 5.97L0 24l6.102-1.6a11.777 11.777 0 005.941 1.599h.005c6.637 0 12.032-5.395 12.035-12.032a11.762 11.762 0 00-3.489-8.492"/></svg>`;

        async function loadDeals() {
            const q = query(collection(db, "offers"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            allDeals = [];
            snap.forEach(doc => allDeals.push({ id: doc.id, ...doc.data() }));
            render();
        }

        window.openDeal = (id) => {
            const deal = allDeals.find(d => d.id === id);
            const now = new Date();
            const todayStr = now.toLocaleDateString('en-CA');
            const currentTimeStr = now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', hour12: false });
            
            const isExpired = deal.expiryDate < todayStr || (deal.expiryDate === todayStr && deal.time < currentTimeStr);
            
            document.getElementById('modalImg').src = deal.imageUrl;
            document.getElementById('modalTitle').innerText = deal.title;
            document.getElementById('modalRegion').innerText = deal.region;
            document.getElementById('modalDisc').innerText = '₪' + deal.discountPrice;
            document.getElementById('modalOrig').innerText = '₪' + deal.originalPrice;
            document.getElementById('modalTime').innerText = deal.time || "--:--";
            document.getElementById('modalDate').innerText = "תוקף: " + deal.expiryDate;
            document.getElementById('modalDesc').innerText = deal.description || "";
            
            const phone = deal.phone || "";
            const cleanPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
            const whatsappLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent('היי, אני מעוניין בדיל: ' + deal.title)}`;

            document.getElementById('modalAction').innerHTML = `
                <a href="${isExpired ? '#' : whatsappLink}" target="_blank" 
                   class="flex items-center justify-center gap-3 w-full h-16 rounded-[22px] font-black text-xl shadow-xl transition-all ${isExpired ? 'bg-gray-200 text-gray-400 pointer-events-none' : 'bg-[#25D366] text-white hover:scale-105 active:scale-95'}">
                   ${isExpired ? 'הדיל הסתיים' : whatsappIcon + 'תפסתי בוואטסאפ!'}
                </a>
            `;
            document.getElementById('dealModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            document.getElementById('dealModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        function render() {
            const container = document.getElementById('deals-container');
            const now = new Date();
            const todayStr = now.toLocaleDateString('en-CA');
            const currentTimeStr = now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', hour12: false });

            container.innerHTML = '';

            let filtered = allDeals.filter(d => {
                const matchSearch = d.title.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase());
                const matchRegion = currentFilter === 'הכל' || d.region === currentFilter;
                
                // לוגיקה משולבת תאריך + שעה
                const isDealExpired = d.expiryDate < todayStr || (d.expiryDate === todayStr && d.time < currentTimeStr);

                return showExpired ? (matchSearch && matchRegion && isDealExpired) : (matchSearch && matchRegion && !isDealExpired);
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-32 text-gray-300 font-bold text-xl italic">אין דילים ${showExpired ? 'בהיסטוריה' : 'פעילים'} כרגע...</div>`;
                return;
            }

            filtered.forEach(data => {
                const isExpired = data.expiryDate < todayStr || (data.expiryDate === todayStr && data.time < currentTimeStr);
                container.innerHTML += `
                    <div class="deal-card bg-white rounded-[32px] overflow-hidden shadow-sm border border-gray-100 flex flex-col hover:shadow-xl transition-all" onclick="openDeal('${data.id}')">
                        <div class="relative h-52">
                            <img src="${data.imageUrl}" class="w-full h-full object-cover">
                            <div class="absolute top-4 right-4 bg-white/95 px-3 py-1 rounded-xl text-[10px] font-black text-blue-600 shadow-sm uppercase">${data.region}</div>
                        </div>
                        <div class="p-6">
                            <h3 class="font-extrabold text-gray-900 line-clamp-2 text-xl mb-4 h-14 leading-tight">${data.title}</h3>
                            <div class="flex justify-between items-end mb-6">
                                <div class="flex flex-col">
                                    <span class="text-xs text-gray-300 line-through font-bold leading-none">₪${data.originalPrice}</span>
                                    <span class="text-3xl font-black text-blue-600 tracking-tighter">₪${data.discountPrice}</span>
                                </div>
                                <div class="bg-red-50 px-3 py-2 rounded-xl border border-red-100 text-center">
                                    <span class="text-[10px] font-black text-red-500 block leading-none">עד שעה</span>
                                    <span class="text-sm font-black text-red-600">${data.time || '--:--'}</span>
                                </div>
                            </div>
                            <button class="w-full h-16 ${isExpired ? 'bg-gray-100 text-gray-400' : 'bg-[#25D366] text-white shadow-lg'} rounded-[22px] font-black text-base flex items-center justify-center gap-2 transition-all active:scale-95">
                                ${isExpired ? 'הדיל הסתיים' : whatsappIcon + 'לפרטים ותפיסה'}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        window.filterBy = (region) => {
            currentFilter = region;
            document.querySelectorAll('.city-tag').forEach(b => b.classList.toggle('active', b.innerText === region));
            render();
        };

        window.toggleExpired = () => {
            showExpired = !showExpired;
            const btn = document.getElementById('expBtn');
            btn.innerText = showExpired ? 'חזרה לדילים פעילים' : 'היסטוריית דילים';
            btn.classList.toggle('bg-blue-100', showExpired);
            btn.classList.toggle('text-blue-600', showExpired);
            render();
        };

        document.getElementById('searchInput').addEventListener('input', render);
        loadDeals();
    </script>
</body>
</html>
