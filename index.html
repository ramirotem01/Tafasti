<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תפסתי! - הדילים הכי חמים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #F9FAFB; }
        .city-tag.active { background-color: #2563EB; color: white; border-color: #2563EB; }
        .deal-card { transition: all 0.2s ease; cursor: pointer; }
        
        /* מודל צף וקומפקטי */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.7); z-index: 1000; 
            align-items: center; justify-content: center; padding: 20px;
            backdrop-blur: 4px;
        }
        .modal.active { display: flex; animation: fadeIn 0.2s ease; }
        .modal-content { 
            background: white; width: 100%; max-width: 450px; 
            border-radius: 28px; overflow: hidden; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <div id="dealModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 left-4 bg-white/90 hover:bg-white text-gray-900 w-9 h-9 rounded-full flex items-center justify-center font-bold z-50 shadow-md transition-all">✕</button>
            
            <img id="modalImg" src="" class="w-full h-48 object-cover">
            
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="modalTitle" class="text-xl font-extrabold text-gray-900 leading-tight"></h2>
                    <span id="modalRegion" class="bg-blue-50 text-blue-600 px-2.5 py-1 rounded-lg text-[10px] font-black whitespace-nowrap mr-2 uppercase"></span>
                </div>

                <div class="bg-gray-50 rounded-2xl p-4 mb-5 flex justify-between items-center border border-gray-100">
                    <div class="text-right">
                        <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">מחיר דיל</p>
                        <span id="modalDisc" class="text-2xl font-black text-blue-600"></span>
                        <span id="modalOrig" class="text-xs text-gray-300 line-through mr-1 font-bold"></span>
                    </div>
                    <div class="text-left">
                        <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">תוקף</p>
                        <span id="modalTime" class="text-lg font-black text-red-500 block"></span>
                        <span id="modalDate" class="text-[10px] text-gray-400 font-bold"></span>
                    </div>
                </div>

                <div class="max-h-32 overflow-y-auto no-scrollbar mb-6">
                    <p id="modalDesc" class="text-gray-600 text-sm leading-relaxed font-medium whitespace-pre-line text-right"></p>
                </div>

                <div id="modalAction"></div>
            </div>
        </div>
    </div>

    <header class="bg-white border-b py-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-5">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-black text-blue-600 italic">תפסתי!</h1>
                <div class="flex gap-2">
                    <button onclick="toggleExpired()" id="expBtn" class="px-3 py-2 rounded-xl font-bold text-[10px] bg-gray-100 text-gray-500">היסטוריה</button>
                    <a href="sup.html" class="px-3 py-2 rounded-xl font-bold text-[10px] bg-blue-600 text-white shadow-sm">ספקים</a>
                </div>
            </div>
            
            <input type="text" id="searchInput" placeholder="חפש דיל..." class="w-full bg-gray-100 border-none rounded-xl py-2.5 px-4 outline-none font-bold focus:ring-2 focus:ring-blue-500 transition-all text-sm mb-4">
            
            <div class="flex gap-2 overflow-x-auto no-scrollbar">
                <button onclick="filterBy('הכל')" class="city-tag active px-4 py-1.5 rounded-lg font-bold bg-white text-gray-400 border border-gray-100 whitespace-nowrap text-[11px]">הכל</button>
                <button onclick="filterBy('מרכז')" class="city-tag px-4 py-1.5 rounded-lg font-bold bg-white text-gray-400 border border-gray-100 whitespace-nowrap text-[11px]">מרכז</button>
                <button onclick="filterBy('צפון')" class="city-tag px-4 py-1.5 rounded-lg font-bold bg-white text-gray-400 border border-gray-100 whitespace-nowrap text-[11px]">צפון</button>
                <button onclick="filterBy('דרום')" class="city-tag px-4 py-1.5 rounded-lg font-bold bg-white text-gray-400 border border-gray-100 whitespace-nowrap text-[11px]">דרום</button>
                <button onclick="filterBy('השרון')" class="city-tag px-4 py-1.5 rounded-lg font-bold bg-white text-gray-400 border border-gray-100 whitespace-nowrap text-[11px]">השרון</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-5">
        <div id="deals-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.appspot.com", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDeals = [];
        let showExpired = false;
        let currentFilter = 'הכל';

        async function loadDeals() {
            const q = query(collection(db, "offers"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            allDeals = [];
            snap.forEach(doc => allDeals.push({ id: doc.id, ...doc.data() }));
            render();
        }

        window.openDeal = (id) => {
            const deal = allDeals.find(d => d.id === id);
            document.getElementById('modalImg').src = deal.imageUrl;
            document.getElementById('modalTitle').innerText = deal.title;
            document.getElementById('modalRegion').innerText = deal.region;
            document.getElementById('modalDisc').innerText = '₪' + deal.discountPrice;
            document.getElementById('modalOrig').innerText = '₪' + deal.originalPrice;
            document.getElementById('modalTime').innerText = deal.time || "--:--";
            document.getElementById('modalDate').innerText = deal.expiryDate || "";
            document.getElementById('modalDesc').innerText = deal.description || "";
            
            const todayStr = new Date().toISOString().split('T')[0];
            const isExpired = deal.expiryDate < todayStr;
            const phone = deal.phone || "";
            const cleanPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
            const whatsappLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent('היי, אני מעוניין בדיל: ' + deal.title)}`;

            document.getElementById('modalAction').innerHTML = `
                <a href="${isExpired ? '#' : whatsappLink}" target="_blank" 
                   class="flex items-center justify-center gap-2 w-full py-4 rounded-xl font-black text-lg shadow-lg transition-all ${isExpired ? 'bg-gray-100 text-gray-300 pointer-events-none' : 'bg-[#25D366] text-white'}">
                   ${isExpired ? 'הדיל הסתיים' : 'תפסתי בוואטסאפ!'}
                </a>
            `;
            document.getElementById('dealModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            document.getElementById('dealModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        function render() {
            const container = document.getElementById('deals-container');
            const todayStr = new Date().toISOString().split('T')[0];
            container.innerHTML = '';

            let filtered = allDeals.filter(d => {
                const matchSearch = d.title.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase());
                const matchRegion = currentFilter === 'הכל' || d.region === currentFilter;
                const isDealExpired = d.expiryDate < todayStr;
                return showExpired ? (matchSearch && matchRegion && isDealExpired) : (matchSearch && matchRegion && !isDealExpired);
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400 font-bold italic">לא נמצאו דילים...</div>`;
                return;
            }

            filtered.forEach(data => {
                const isExpired = data.expiryDate < todayStr;
                const whatsappLink = `https://wa.me/${data.phone}?text=היי`;

                container.innerHTML += `
                    <div class="deal-card bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col" onclick="openDeal('${data.id}')">
                        <img src="${data.imageUrl}" class="w-full h-40 object-cover">
                        <div class="p-4">
                            <h3 class="font-bold text-gray-900 line-clamp-2 text-sm mb-3 h-10">${data.title}</h3>
                            <div class="flex justify-between items-center mb-4">
                                <div><span class="text-lg font-black text-blue-600">₪${data.discountPrice}</span></div>
                                <div class="text-[9px] font-black text-red-500 bg-red-50 px-2 py-1 rounded-md">עד: ${data.time}</div>
                            </div>
                            <button class="w-full ${isExpired ? 'bg-gray-100' : 'bg-[#25D366]'} text-white py-2 rounded-lg font-bold text-xs uppercase tracking-tight">לפרטים ותפיסה</button>
                        </div>
                    </div>
                `;
            });
        }

        window.filterBy = (region) => {
            currentFilter = region;
            document.querySelectorAll('.city-tag').forEach(b => b.classList.toggle('active', b.innerText === region));
            render();
        };

        window.toggleExpired = () => {
            showExpired = !showExpired;
            document.getElementById('expBtn').innerText = showExpired ? 'דילים פעילים' : 'היסטוריה';
            render();
        };

        document.getElementById('searchInput').addEventListener('input', render);
        loadDeals();
    </script>
</body>
</html>
