<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tafasti! | בילוי ספונטני</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; padding-bottom: 80px; }
        .safe-area { max-width: 500px; margin: 0 auto; } /* Mobile focus */
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-top: 1px solid rgba(0,0,0,0.05); }
        .deal-card { border-radius: 2rem; overflow: hidden; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); transition: 0.3s; }
        .page { display: none; animation: fadeIn 0.3s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: #6366f1; }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center bg-white shadow-sm sticky top-0 z-40">
        <h1 class="text-3xl font-black italic text-indigo-600">Tafasti!</h1>
        <div class="w-10 h-10 bg-indigo-50 rounded-full flex items-center justify-center">🔍</div>
    </header>

    <div class="safe-area">
        <main id="home" class="page active p-6">
            <h2 class="text-4xl font-extrabold mb-2">היי, מה התוכניות?</h2>
            <p class="text-slate-500 mb-8 font-bold">מצאנו 12 דילים שווים להיום בסביבה שלך</p>
            
            <div id="home-deals" class="space-y-6">
                <div class="h-64 bg-slate-100 animate-pulse rounded-[2rem]"></div>
            </div>
        </main>

        <main id="explore" class="page p-6">
            <h2 class="text-3xl font-black mb-6">חיפוש אטרקציה</h2>
            <input type="text" placeholder="חפשו לפי עיר או סוג פעילות..." class="w-full p-5 rounded-2xl bg-white shadow-sm border-none mb-8 outline-none ring-2 ring-indigo-50">
            <div id="explore-grid" class="grid grid-cols-1 gap-6"></div>
        </main>

        <main id="deal-view" class="page">
            <div id="deal-detail-content"></div>
        </main>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 glass-nav h-20 flex justify-around items-center px-6 z-50">
        <button onclick="showPage('home')" class="nav-item active flex flex-col items-center gap-1">
            <span class="text-2xl">🏠</span>
            <span class="text-xs font-bold">בית</span>
        </button>
        <button onclick="showPage('explore')" class="nav-item flex flex-col items-center gap-1">
            <span class="text-2xl">🌍</span>
            <span class="text-xs font-bold">גילוי</span>
        </button>
        <a href="sup.html" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="text-2xl">🏢</span>
            <span class="text-xs font-bold">ספקים</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg",
            authDomain: "tafasti-20c41.firebaseapp.com",
            projectId: "tafasti-20c41",
            storageBucket: "tafasti-20c41.firebasestorage.app",
            messagingSenderId: "457032202921",
            appId: "1:457032202921:web:8f397ae80d9506a66d07b8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.showPage = (pageId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        };

        async function loadData() {
            const q = query(collection(db, "offers"), where("status", "==", "active"));
            const snap = await getDocs(q);
            const home = document.getElementById('home-deals');
            const explore = document.getElementById('explore-grid');
            home.innerHTML = '';
            explore.innerHTML = '';

            snap.forEach(doc => {
                const data = doc.data();
                const card = `
                    <div class="deal-card bg-white" onclick="viewDeal('${doc.id}')">
                        <div class="relative h-56">
                            <img src="${data.imageUrl}" class="w-full h-full object-cover">
                            <div class="absolute top-4 right-4 bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold">נותרו מקומות!</div>
                        </div>
                        <div class="p-5">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-xl font-bold">${data.title}</h3>
                                <span class="text-indigo-600 font-black text-xl">₪${data.discountPrice}</span>
                            </div>
                            <p class="text-slate-400 text-sm font-bold">${data.city} • היום ב-${data.time}</p>
                        </div>
                    </div>
                `;
                home.innerHTML += card;
                explore.innerHTML += card;
            });
        }

        window.viewDeal = async (id) => {
            const snap = await getDocs(collection(db, "offers"));
            let d;
            snap.forEach(doc => { if(doc.id === id) d = doc.data(); });
            
            document.getElementById('deal-detail-content').innerHTML = `
                <div class="relative">
                    <img src="${d.imageUrl}" class="w-full h-[40vh] object-cover">
                    <button onclick="showPage('home')" class="absolute top-6 right-6 bg-white w-10 h-10 rounded-full shadow-lg flex items-center justify-center font-bold">✕</button>
                </div>
                <div class="p-8 bg-white -mt-10 rounded-t-[3rem] relative z-10">
                    <h1 class="text-3xl font-black mb-4">${d.title}</h1>
                    <div class="flex gap-4 mb-6">
                        <span class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-bold">₪${d.discountPrice}</span>
                        <span class="text-slate-400 line-through py-2 italic">₪${d.originalPrice}</span>
                    </div>
                    <p class="text-slate-600 leading-relaxed mb-10 text-lg">${d.description}</p>
                    <div class="grid grid-cols-2 gap-4">
                        <a href="tel:${d.phone}" class="bg-indigo-600 text-white p-5 rounded-2xl text-center font-bold text-xl">📞 חיוג</a>
                        <a href="https://wa.me/${d.phone}" class="bg-green-500 text-white p-5 rounded-2xl text-center font-bold text-xl">💬 WhatsApp</a>
                    </div>
                </div>
            `;
            showPage('deal-view');
        };

        loadData();
    </script>
</body>
</html>
