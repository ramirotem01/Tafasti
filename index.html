<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tafasti | אטרקציות ברגע האחרון לילדים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script id="json-ld-data" type="application/ld+json"></script>

    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .gradient-text { background: linear-gradient(90deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .deal-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="sticky top-0 z-50 glass px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="text-3xl font-extrabold tracking-tighter cursor-pointer" onclick="showPage('home')">
            <span class="text-indigo-600">Tafasti</span><span class="text-pink-500">!</span>
        </div>
        <div class="hidden md:flex gap-6 font-semibold">
            <a href="#" class="hover:text-indigo-600" onclick="showPage('results')">כל הדילים</a>
            <a href="#" class="text-pink-600 font-bold">אזור ספקים</a>
        </div>
        <button class="bg-indigo-600 text-white px-5 py-2 rounded-full font-bold shadow-lg hover:bg-indigo-700 transition">חיפוש</button>
    </nav>

    <main id="home" class="tab-content active">
        <section class="px-6 py-16 text-center">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 leading-tight italic">נשארתם בלי תוכנית?<br><span class="gradient-text">תפסתי לכם דיל!</span></h1>
            <div class="max-w-3xl mx-auto relative mt-10">
                <input type="text" id="searchInput" placeholder="איזו אטרקציה מחפשים?" class="w-full p-6 pr-14 rounded-3xl shadow-2xl border-none focus:ring-4 focus:ring-indigo-200 outline-none text-lg">
                <button class="absolute left-4 top-4 bg-black text-white px-8 py-3 rounded-2xl font-bold" onclick="showPage('results')">חיפוש</button>
            </div>
        </section>

        <section class="px-6 py-12 max-w-7xl mx-auto">
            <h2 class="text-2xl font-bold mb-8">🔥 הדילים הכי חמים לעכשיו</h2>
            <div id="home-deals-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="text-slate-400 animate-pulse">טוען דילים שווים...</div>
            </div>
        </section>
    </main>

    <main id="results" class="tab-content px-6 py-12 max-w-7xl mx-auto">
        <h2 class="text-3xl font-extrabold mb-8">כל האטרקציות הפנויות</h2>
        <div id="results-grid" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
    </main>

    <main id="deal" class="tab-content px-6 py-12 max-w-4xl mx-auto">
        <div id="deal-content"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg",
            authDomain: "tafasti-20c41.firebaseapp.com",
            projectId: "tafasti-20c41",
            storageBucket: "tafasti-20c41.firebasestorage.app",
            messagingSenderId: "457032202921",
            appId: "1:457032202921:web:8f397ae80d9506a66d07b8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Function to render cards
        async function loadDeals() {
            const q = query(collection(db, "offers"), where("status", "==", "active"));
            const querySnapshot = await getDocs(q);
            const homeGrid = document.getElementById('home-deals-grid');
            const resultsGrid = document.getElementById('results-grid');
            
            homeGrid.innerHTML = '';
            resultsGrid.innerHTML = '';

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const cardHtml = `
                    <div class="deal-card bg-white rounded-[2.5rem] overflow-hidden shadow-xl cursor-pointer" onclick="showDeal('${doc.id}')">
                        <img src="${data.imageUrl}" class="h-48 w-full object-cover">
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-xl font-bold">${data.title}</h3>
                                <span class="text-indigo-600 font-bold text-xl">₪${data.discountPrice}</span>
                            </div>
                            <p class="text-slate-500 text-sm mb-4">${data.city} | היום ב-${data.time}</p>
                            <button class="w-full py-3 bg-slate-100 rounded-2xl font-bold hover:bg-indigo-600 hover:text-white transition">לפרטים ומימוש</button>
                        </div>
                    </div>
                `;
                homeGrid.innerHTML += cardHtml;
                resultsGrid.innerHTML += cardHtml;
            });
        }

        // Global function to show single deal (attached to window for onclick)
        window.showDeal = async (id) => {
            const querySnapshot = await getDocs(collection(db, "offers")); // Simplified for MVP
            let data;
            querySnapshot.forEach(doc => { if(doc.id === id) data = doc.data(); });

            if(data) {
                // Update SEO
                updateSEO(data);
                
                const dealContent = document.getElementById('deal-content');
                dealContent.innerHTML = `
                    <button class="mb-6 text-indigo-600 font-bold" onclick="showPage('home')">← חזרה</button>
                    <div class="bg-white rounded-[3rem] p-8 shadow-2xl border border-slate-100">
                        <img src="${data.imageUrl}" class="w-full h-80 object-cover rounded-[2rem] mb-8">
                        <div class="flex justify-between items-center mb-8">
                            <h1 class="text-4xl font-extrabold">${data.title}</h1>
                            <div class="text-center bg-indigo-50 p-4 rounded-3xl min-w-[120px]">
                                <p class="text-3xl font-black text-indigo-600">₪${data.discountPrice}</p>
                                <p class="text-sm line-through text-slate-400">₪${data.originalPrice}</p>
                            </div>
                        </div>
                        <p class="text-lg text-slate-600 mb-10">${data.description}</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <a href="tel:${data.phone}" class="flex items-center justify-center gap-3 bg-indigo-600 text-white p-5 rounded-2xl text-xl font-bold shadow-lg">📞 חייגו למימוש</a>
                            <a href="https://wa.me/${data.phone}" target="_blank" class="flex items-center justify-center gap-3 bg-green-500 text-white p-5 rounded-2xl text-xl font-bold shadow-lg">💬 וואטסאפ</a>
                        </div>
                        <div class="mt-8 text-center p-6 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200">
                            <p class="text-sm text-slate-500 mb-1">קוד קופון להצגה במקום:</p>
                            <div class="text-2xl font-mono font-black text-slate-700">TAFASTI-${data.city.toUpperCase()}</div>
                        </div>
                    </div>
                `;
                window.showPage('deal');
            }
        };

        function updateSEO(data) {
            const script = document.getElementById('json-ld-data');
            const ld = {
                "@context": "https://schema.org/",
                "@type": "Event",
                "name": data.title,
                "description": data.description,
                "image": data.imageUrl,
                "offers": {
                    "@type": "Offer",
                    "price": data.discountPrice,
                    "priceCurrency": "ILS"
                }
            };
            script.textContent = JSON.stringify(ld);
        }

        window.showPage = (id) => {
            document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        };

        loadDeals();
    </script>
</body>
</html>
