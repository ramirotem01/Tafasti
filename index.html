<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תפסתי! - הדילים הכי חמים עכשיו</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #F9FAFB; }
        .deal-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .deal-card:hover { transform: translateY(-8px); shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .search-focus:focus-within { border-color: #2563EB; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .hide-expired { display: none; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b py-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-black text-blue-600 italic tracking-tighter">תפסתי!</h1>
                <a href="sup.html" class="text-xs font-bold text-gray-400 hover:text-blue-600 transition bg-gray-50 px-3 py-2 rounded-xl">כניסת ספקים ←</a>
            </div>
            
            <div class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-grow search-focus transition-all duration-300 border-2 border-gray-100 rounded-2xl bg-gray-50 px-4 py-1 flex items-center">
                    <span class="ml-3 text-gray-400">🔍</span>
                    <input type="text" id="searchInput" placeholder="חפש עיר, מלון או דיל..." class="w-full bg-transparent py-3 outline-none font-bold text-gray-700">
                </div>
                <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                    <button onclick="filterByCity('הכל')" class="city-tag bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold whitespace-nowrap shadow-md shadow-blue-100 transition-all">הכל</button>
                    <button onclick="filterByCity('אילת')" class="city-tag bg-white text-gray-500 border border-gray-100 px-6 py-3 rounded-2xl font-bold whitespace-nowrap hover:bg-gray-50 transition-all">אילת</button>
                    <button onclick="filterByCity('ים המלח')" class="city-tag bg-white text-gray-500 border border-gray-100 px-6 py-3 rounded-2xl font-bold whitespace-nowrap hover:bg-gray-50 transition-all">ים המלח</button>
                    <button onclick="filterByCity('צפון')" class="city-tag bg-white text-gray-500 border border-gray-100 px-6 py-3 rounded-2xl font-bold whitespace-nowrap hover:bg-gray-50 transition-all">צפון</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div id="deals-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 text-center">
            <div class="col-span-full py-20">
                <div class="animate-spin w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p class="font-bold text-gray-400">מחפש עבורך את הדילים הכי שווים...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxMeoohFIuQcTJaAJ-Z4nd4Kmj79H1KYg", authDomain: "tafasti-20c41.firebaseapp.com", projectId: "tafasti-20c41", storageBucket: "tafasti-20c41.appspot.com", messagingSenderId: "457032202921", appId: "1:457032202921:web:8f397ae80d9506a66d07b8" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDeals = [];

        async function loadDeals() {
            const container = document.getElementById('deals-container');
            const q = query(collection(db, "offers"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            
            allDeals = [];
            snap.forEach(doc => allDeals.push({ id: doc.id, ...doc.data() }));
            renderDeals(allDeals);
        }

        function renderDeals(deals) {
            const container = document.getElementById('deals-container');
            container.innerHTML = '';
            
            const today = new Date().toISOString().split('T')[0];

            const filtered = deals.filter(d => {
                // סינון דילים שפג תוקפם
                return d.expiryDate >= today;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="col-span-full py-20 text-gray-400 font-bold">לא נמצאו דילים פעילים כרגע... שווה לחזור מאוחר יותר!</div>';
                return;
            }

            filtered.forEach(data => {
                const phone = data.phone || "";
                const cleanPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
                const whatsappMsg = encodeURIComponent(`היי, אני מעוניין בדיל: ${data.title} שפורסם בתפסתי!`);
                const whatsappLink = `https://wa.me/${cleanPhone}?text=${whatsappMsg}`;

                container.innerHTML += `
                    <div class="deal-card bg-white rounded-[32px] overflow-hidden shadow-sm border border-gray-100 flex flex-col h-full group">
                        <div class="relative overflow-hidden">
                            <img src="${data.imageUrl}" class="w-full h-56 object-cover transform group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://placehold.co/400x300?text=תפסתי!'">
                            <div class="absolute top-4 right-4 bg-white/95 backdrop-blur-md text-blue-600 px-4 py-1.5 rounded-2xl text-xs font-black shadow-sm border border-blue-50">
                                ${data.city}
                            </div>
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <h3 class="text-2xl font-black mb-2 text-gray-900 leading-tight">${data.title}</h3>
                            <p class="text-gray-400 text-sm mb-6 line-clamp-2 font-medium">${data.description || ''}</p>
                            
                            <div class="mt-auto">
                                <div class="flex justify-between items-end mb-6 bg-blue-50/50 p-4 rounded-2xl border border-blue-50">
                                    <div>
                                        <p class="text-[10px] text-blue-400 font-bold uppercase tracking-wider mb-1">מחיר תפסתי</p>
                                        <span class="text-3xl font-black text-blue-600 tracking-tighter">₪${data.discountPrice}</span>
                                        <span class="text-sm text-gray-300 line-through mr-1 font-bold">₪${data.originalPrice}</span>
                                    </div>
                                    <div class="text-[10px] font-black text-white bg-red-500 px-3 py-1.5 rounded-xl shadow-lg shadow-red-100 animate-pulse">
                                        תופס עד: ${data.time}
                                    </div>
                                </div>

                                <a href="${whatsappLink}" target="_blank" 
                                   class="flex items-center justify-center gap-3 w-full bg-[#25D366] hover:bg-[#128C7E] text-white py-4 rounded-2xl font-black transition-all transform active:scale-95 shadow-xl shadow-green-100">
                                   <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
                                   <span class="tracking-tight">תפסתי בוואטסאפ!</span>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // פונקציית חיפוש
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allDeals.filter(d => 
                d.title.toLowerCase().includes(term) || 
                d.city.toLowerCase().includes(term) || 
                (d.description && d.description.toLowerCase().includes(term))
            );
            renderDeals(filtered);
        });

        // פונקציית סינון לפי עיר
        window.filterByCity = (city) => {
            // עדכון עיצוב הכפתורים
            document.querySelectorAll('.city-tag').forEach(btn => {
                if(btn.innerText === city) {
                    btn.classList.replace('bg-white', 'bg-blue-600');
                    btn.classList.replace('text-gray-500', 'text-white');
                    btn.classList.add('shadow-md', 'shadow-blue-100');
                } else {
                    btn.classList.replace('bg-blue-600', 'bg-white');
                    btn.classList.replace('text-white', 'text-gray-500');
                    btn.classList.remove('shadow-md', 'shadow-blue-100');
                }
            });

            if(city === 'הכל') {
                renderDeals(allDeals);
            } else {
                const filtered = allDeals.filter(d => d.city === city);
                renderDeals(filtered);
            }
        };

        loadDeals();
    </script>
</body>
</html>
